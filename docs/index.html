    if (worstRank <= 2) return true;            // top-2 even losing every tie
    if (target === 'top2') return false;        // top-2 needs worstRank <= 2
    if (worstRank >= 4) return false;           // R32: could be 4th
    return ceilings ? thirdOnPointsClinches(mine, ownLetter, ceilings) : false; // worst-case 3rd
  };

  const rows = [];
  for (let n = 0; n < 3 ** k; n++) {
    let x = n;
    const ownPts = new Map(basePts);
    const results = [];
    for (let i = 0; i < k; i++) {
      const oc = COARSE[x % 3]; x = Math.floor(x / 3);
      applyOutcome(ownPts, own[i], oc);
      results.push(ownResultOf(own[i], oc, code));
    }
    let safe = true;
    for (const fp of enumeratePoints(ownPts, others)) {
      if (!reaches(fp)) { safe = false; break; }
    }
    rows.push({ results, total: ownPts.get(code), safe });
  }

  const safeRows = rows.filter((r) => r.safe);
  if (safeRows.length === 0) return { cond: null };

  const minSafe = Math.min(...safeRows.map((r) => r.total));
  if (rows.every((r) => r.safe === (r.total >= minSafe))) {
    const rp = resultsForDelta(minSafe - curPts, k);
    return { cond: rp || `${minSafe}+ points` };
  }

  // Non-monotone (arises for TOP-2 in the rock-paper-scissors trap): by result.
  if (k === 2) {
    const losses = (r) => r.results.filter((x) => x === 'loss').length;
    const wins = (r) => r.results.filter((x) => x === 'win').length;
    if (rows.every((r) => (losses(r) === 0) === r.safe)) return { cond: 'avoiding defeat in both games' };
    if (rows.every((r) => (wins(r) >= 1) === r.safe)) return { cond: 'a win in either game' };
    if (rows.every((r) => (wins(r) === 2) === r.safe)) return { cond: 'winning both games' };
  }
  return { cond: null };
}

// ----------------------------------------------------------------------------
// Next-round identification + triggers
// ----------------------------------------------------------------------------

/**
 * The next chronological round = unplayed matches sharing the EARLIEST date.
 * Tie-break ordering within the round by time (string compare is adequate for
 * the "HH:MM UTC±N" format only loosely; date is the grouping key that matters).
 */
function nextRoundMatches(unplayed) {
  if (unplayed.length === 0) return [];
  const dated = unplayed.filter((m) => m.date);
  const pool = dated.length ? dated : unplayed;
  let earliest = null;
  for (const m of pool) {
    if (earliest === null || (m.date && m.date < earliest)) earliest = m.date;
  }
  const round = pool.filter((m) => m.date === earliest);
  round.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  return round;
}

const ord = (n) => (n === 1 ? '1st' : n === 2 ? '2nd' : n === 3 ? '3rd' : `${n}th`);

/**
 * Re-run the clinch/eliminate test on the POST-NEXT-ROUND state to generate
 * AUTOMATIC, VERIFIED trigger strings: what becomes OFFICIAL after the next
 * round (with later games still to play).
 *
 * Approach: enumerate the coarse outcomes of JUST the next-round matches. For
 * each post-round points state, re-evaluate every team over the STILL-remaining
 * matches. We collect, per team, the SET of next-round coarse outcomes that
 * (a) clinch top 2, (b) clinch 1st, or (c) eliminate it — then describe the
 * trigger in terms of that team's own next-round result when it is the clean
 * driver, else as a combined condition.
 */
function buildTriggers(group, basePts, unplayed, teamMeta) {
  const round = nextRoundMatches(unplayed);
  if (round.length === 0) return { matchKeys: [], date: null, triggers: [] };

  const date = round[0].date || null;
  const roundKeys = new Set(round.map(matchKey));
  const later = unplayed.filter((m) => !roundKeys.has(matchKey(m)));

  // Enumerate next-round coarse outcomes; for each, compute the post-round base
  // points and evaluate every team over the LATER matches.
  const k = round.length;
  const combos = []; // { outcomes:[{key,outcome}], post:Map, perTeam:{code:{clinch,won,elim}} }
  for (let n = 0; n < 3 ** k; n++) {
    const post = new Map(basePts);
    const outcomes = [];
    let x = n;
    for (let i = 0; i < k; i++) {
      const oc = COARSE[x % 3];
      applyOutcome(post, round[i], oc);
      outcomes.push({ match: round[i], outcome: oc });
      x = Math.floor(x / 3);
    }
    const perTeam = {};
    for (const t of group.teams) {
      const ev = evaluateTeam(post, later, t.code);
      perTeam[t.code] = {
        clinch: ev.clinchedTop2,
        won: ev.wonGroup,
        elim: ev.eliminated,
      };
    }
    combos.push({ outcomes, perTeam });
  }

  // Helper: for a given team and a target predicate (clinch/won/elim), find the
  // set of next-round combos satisfying it, and try to express it compactly in
  // terms of that team's OWN next-round result (win/draw/loss), noting any
  // dependency on the other match.
  const teamName = (code) => (teamMeta.get(code)?.name) || code;

  // The team's OWN next-round result (win/draw/loss) within a specific combo.
  // We find the combo entry for the match the team actually plays and translate
  // THAT match's outcome — never apply another match's outcome to it.
  const ownResultInCombo = (code, combo) => {
    for (const o of combo.outcomes) {
      const m = o.match;
      if (m.home === code) return o.outcome === 'home' ? 'win' : o.outcome === 'away' ? 'loss' : 'draw';
      if (m.away === code) return o.outcome === 'away' ? 'win' : o.outcome === 'home' ? 'loss' : 'draw';
    }
    return null; // team does not play this round
  };
  const playsThisRound = (code) => round.some((r) => r.home === code || r.away === code);

  const triggers = [];

  for (const t of group.teams) {
    const code = t.code;
    const meta = teamMeta.get(code);
    // Already settled before the round? Then nothing NEW triggers for it.
    if (meta.status === 'won-group' || meta.status === 'qualified' || meta.status === 'advanced' || meta.status === 'eliminated') {
      continue;
    }

    // CLINCH-1st trigger (lead with the strongest fact).
    addTrigger(triggers, code, 'won', combos, round, ownResultInCombo, playsThisRound, teamName, group);
    // CLINCH top-2 trigger.
    addTrigger(triggers, code, 'clinch', combos, round, ownResultInCombo, playsThisRound, teamName, group);
    // ELIMINATION trigger.
    addTrigger(triggers, code, 'elim', combos, round, ownResultInCombo, playsThisRound, teamName, group);
  }

  if (triggers.length === 0) {
    triggers.push('Nothing is settled until the final round.');
  }

  return { matchKeys: round.map(matchKey), date, triggers };
}

/**
 * Build (and push, if true & compact) a single trigger for one team & predicate.
 * predicate: 'won' (clinch 1st) | 'clinch' (clinch top 2) | 'elim' (eliminated).
 *
 * We look at the subset of next-round combos where the predicate holds. If that
 * subset is exactly characterized by the team's OWN result(s) in the round
 * (independent of the other match), we phrase it cleanly ("X clinch a top-2 place
 * with a win or draw"). If it additionally requires the other match to go a
 * certain way, we phrase the dependency ("X can clinch with a win if Y lose").
 * If it's true only in scattered combos not cleanly describable, we conservatively
 * describe it as conditional on both results, listing the own-result and the
 * required other-match outcome(s). Triggers that never hold are skipped.
 */
function addTrigger(out, code, predicate, combos, round, ownResult, playsThisRound, teamName, group) {
  const holds = (c) => c.perTeam[code][predicate];

  const satisfying = combos.filter(holds);
  if (satisfying.length === 0) return;            // predicate never triggers next round
  if (satisfying.length === combos.length) {
    // Already true in every outcome -> it was already settled (shouldn't reach
    // here for unsettled teams), skip to avoid noise.
    return;
  }

  const name = teamName(code);
  const verb =
    predicate === 'won' ? 'clinch top spot' :
    predicate === 'clinch' ? 'clinch a top-2 place' :
    'drop out of the top-two race';

  // Map each combo to (ownResult, otherKey->otherResultLabel).
  const otherMatches = round.filter((r) => r.home !== code && r.away !== code);

  // Group satisfying combos by the team's own result (combo-aware; reads the
  // outcome of the match THIS team plays, not whichever outcome comes last).
  const byOwn = new Map(); // ownResult -> array of combos
  for (const c of satisfying) {
    const key = ownResult(code, c) || 'n/a';
    if (!byOwn.has(key)) byOwn.set(key, []);
    byOwn.get(key).push(c);
  }

  // For each own-result, is the predicate true for ALL other-match outcomes
  // (i.e. own result alone is sufficient)? Count combos per own-result vs how
  // many TOTAL combos share that own-result.
  const totalByOwn = new Map();
  for (const c of combos) {
    const key = ownResult(code, c) || 'n/a';
    totalByOwn.set(key, (totalByOwn.get(key) || 0) + 1);
  }

  const sufficientOwn = []; // own-results that ALONE guarantee the predicate
  const conditionalOwn = []; // own-results that only sometimes trigger (need other match)
  for (const [own, list] of byOwn) {
    if (list.length === totalByOwn.get(own)) sufficientOwn.push(own);
    else conditionalOwn.push(own);
  }

  const resultPhrase = (r) => (r === 'win' ? 'a win' : r === 'draw' ? 'a draw' : 'a loss');
  const order = { win: 0, draw: 1, loss: 2 };

  // Clean case: own result(s) alone are sufficient, nothing conditional.
  if (sufficientOwn.length > 0 && conditionalOwn.length === 0 && playsThisRound(code)) {
    const sorted = sufficientOwn.sort((a, b) => order[a] - order[b]);
    const phrase = sorted.map(resultPhrase).join(' or ');
    out.push(`${name} ${verb} with ${phrase}.`);
    return;
  }

  // Conditional case: own result needs help from the other match. Describe the
  // smallest such combo cleanly when there is exactly one own-result that needs a
  // single other-match condition.
  if (conditionalOwn.length > 0 && otherMatches.length === 1 && playsThisRound(code)) {
    const om = otherMatches[0];
    const describeOther = (outcome) => {
      if (outcome === 'draw') return `${teamName(om.home)} and ${teamName(om.away)} draw`;
      const winner = outcome === 'home' ? om.home : om.away;
      const loser = outcome === 'home' ? om.away : om.home;
      return `${teamName(winner)} beat ${teamName(loser)}`;
    };
    // Take the conditional own-result(s) and, for each, the required other outcomes.
    const clauses = [];
    for (const own of conditionalOwn.sort((a, b) => order[a] - order[b])) {
      const list = byOwn.get(own);
      const otherOutcomes = new Set();
      for (const c of list) {
        for (const o of c.outcomes) {
          if (o.match === om) otherOutcomes.add(o.outcome);
        }
      }
      const others = [...otherOutcomes].map(describeOther).join(' or ');
      clauses.push(`with ${resultPhrase(own)} if ${others}`);
    }
    // Prepend any unconditional own-results.
    let lead = '';
    if (sufficientOwn.length > 0) {
      const sorted = sufficientOwn.sort((a, b) => order[a] - order[b]);
      lead = `with ${sorted.map(resultPhrase).join(' or ')}`;
    }
    const body = [lead, ...clauses].filter(Boolean).join(', or ');
    out.push(`${name} can ${verb} ${body}.`);
    return;
  }

  // Team does NOT play this round (its fate turns purely on others' results), or
  // a shape we won't try to pretty-print. Describe it as conditional on the round.
  if (!playsThisRound(code)) {
    // Characterize the satisfying combos by the other matches' outcomes.
    const clauses = satisfying.map((c) =>
      c.outcomes
        .map((o) => {
          if (o.outcome === 'draw') return `${teamName(o.match.home)}-${teamName(o.match.away)} draw`;
          const w = o.outcome === 'home' ? o.match.home : o.match.away;
          const l = o.outcome === 'home' ? o.match.away : o.match.home;
          return `${teamName(w)} beat ${teamName(l)}`;
        })
        .join(' & ')
    );
    // Only emit if compact (<=2 clauses) to avoid noise.
    if (clauses.length <= 2) {
      out.push(`${name} ${verb} if ${clauses.join(' OR ')}.`);
    }
    return;
  }
  // Fallback: mixed/complex own+other shape we won't enumerate verbosely. Emit a
  // conservative conditional headline so the fact isn't lost.
  out.push(`${name} can ${verb} next round (result-dependent).`);
}

// ----------------------------------------------------------------------------
// needLine / statusLine phrasing
// ----------------------------------------------------------------------------

function buildStatusLine(status, mc) {
  switch (status) {
    case 'won-group': return mc ? 'Won the group' : 'Clinched 1st';
    case 'advanced': {
      // DETERMINISTICALLY through to the R32 (via a locked top-8 third place),
      // but the group seed (1st/2nd/3rd) is not yet settled. Lead with the clinch.
      if (mc && (mc.pWinGroup ?? 0) > 0.005) {
        return `Clinched a Round-of-32 place — ${pctMC(mc.pWinGroup)} to win the group`;
      }
      return 'Clinched a Round-of-32 place';
    }
    case 'qualified': {
      if (!mc) return 'Through to the R32';
      // Through on points; note any live chance to win the group.
      if ((mc.pWinGroup ?? 0) > 0.005) {
        return `Qualified for the Round of 32 — ${pctMC(mc.pWinGroup)} to win the group`;
      }
      return 'Qualified for the Round of 32';
    }
    case 'eliminated': {
      // Top 2 is gone. That is NOT tournament elimination — a best-third berth
      // (cross-group) may still be live, so reflect the MC advance odds when we
      // have them rather than declaring the team dead.
      if (mc) {
        const pAdv = mc.pAdvance ?? 0;
        if (pAdv > 0.005) return `Out of the top two — ${pctMC(pAdv)} to advance as a best-third`;
      }
      return 'Out of the top two';
    }
    default: {
      // Contention: drive a realistic headline from the Monte-Carlo advance odds,
      // never claiming top-2 when it is realistically impossible.
      if (mc) {
        const pAdv = mc.pAdvance ?? 0;
        const pTop2 = (mc.pGroup1 ?? 0) + (mc.pGroup2 ?? 0);
        if (pAdv >= 0.99) return `Virtually through — ${pctMC(pAdv)} to qualify`;
        if (pTop2 < 0.01) return `Realistically fighting for 3rd — ${pctMC(pAdv)} to advance`;
        if (pAdv >= 0.85) return `In good shape — ${pctMC(pAdv)} to qualify`;
        return `In contention — ${pctMC(pAdv)} to qualify`;
      }
      return 'Still alive';
    }
  }
}

/** Compact percent formatter, matching the UI / scenario-summary. */
function pctMC(p) {
  if (p == null) return '';
  if (p >= 0.995) return '99%';
  if (p > 0 && p <= 0.005) return '<1%';
  const v = p * 100;
  return (v >= 10 ? Math.round(v) : Math.round(v * 10) / 10) + '%';
}

/**
 * Express the MINIMAL set of own remaining results that GUARANTEES a final point
 * total of at least `delta` ABOVE the team's current total, over `remaining`
 * games. Returns a result phrase ("two wins", "a win and a draw", "two draws",
 * "a single draw", "at least one win") or null if not cleanly expressible.
 *
 * This is result language, never "needs N points FROM its last games".
 */
function resultsForDelta(delta, remaining) {
  if (delta <= 0) return null; // already safe
  if (remaining === 1) {
    if (delta > 3) return null;            // unreachable in one game
    if (delta === 3) return 'a win';        // only a win reaches 3
    if (delta === 2) return 'a win';        // a draw (1) falls short of 2
    if (delta === 1) return 'a draw (or better)';
    return null;
  }
  if (remaining === 2) {
    if (delta > 6) return null;
    if (delta === 6) return 'two wins';
    if (delta >= 4) return 'a win and a draw';   // 4 needs ≥ W+D; 5 same minimal guarantee
    if (delta === 3) return 'at least one win';   // a win (3) or fall short with draws
    if (delta === 2) return 'two draws (or better)';
    if (delta === 1) return 'a single draw (or better)';
    return null;
  }
  return null;
}

/**
 * The minimal own result needed to keep a TOP-2 finish mathematically alive —
 * i.e. to reach the (top-2) elimination threshold. Expressed as the negative:
 * what drops the team OUT OF THE TOP TWO.
 *
 * ⚠️ HONESTY: this module computes TOP-2 reachability only. Falling below the
 * threshold means top 2 is gone — NOT that the team is eliminated. A best-third
 * berth (cross-group, never asserted here) may still be live. So the phrasing
 * is always "out of the top two", never a bare "out" / "eliminated".
 */
function eliminationResultPhrase(deltaToFloor, remaining) {
  if (deltaToFloor <= 0) return null; // floor already secured -> no risk of dropping
  if (remaining === 2) {
    if (deltaToFloor === 3) return 'out of the top two without a win';
    if (deltaToFloor === 6) return 'out of the top two unless they win both';
    if (deltaToFloor === 2) return 'out of the top two with fewer than two points';
    if (deltaToFloor === 1) return 'out of the top two if winless';
  }
  if (remaining === 1) {
    if (deltaToFloor === 3) return 'out of the top two with anything less than a win';
    if (deltaToFloor >= 1) return 'out of the top two with a loss';
  }
  return null;
}

function buildNeedLine(status, remaining, curPts, mc, reqR32, reqTop2, reqFirst) {
  if (status === 'won-group') return 'Already won the group.';
  if (status === 'qualified') return 'Already through to the knockout round.';
  if (status === 'eliminated') return 'Cannot finish in the top two (a best-third place would be its only route through).';

  const overall = mc && mc.pAdvance != null ? ` — ${pctMC(mc.pAdvance)} to advance overall` : '';

  // A reward LADDER: what guarantees ADVANCEMENT (R32, with the best-third
  // cushion) → what clinches a TOP-2 seed → what clinches TOP SPOT (best seed).
  // Each rung carries its minimal own-result condition; adjacent rungs sharing a
  // condition collapse to the higher reward (same cost, better prize).
  const rungs = [];
  if (reqR32 && reqR32.cond) rungs.push({ cond: reqR32.cond, label: 'a Round-of-32 place' });
  if (reqTop2 && reqTop2.cond) rungs.push({ cond: reqTop2.cond, label: 'a top-2 place' });
  if (reqFirst && reqFirst.cond) rungs.push({ cond: reqFirst.cond, label: 'top spot' });

  const kept = [];
  for (const r of rungs) {
    if (kept.length && kept[kept.length - 1].cond === r.cond) kept[kept.length - 1] = r; // same cost → keep better prize
    else kept.push(r);
  }

  let safeClause;
  if (kept.length === 0) {
    safeClause = 'Can reach the Round of 32, but no result yet guarantees it';
  } else {
    safeClause = kept
      .map((r, i) => (i === 0 ? `${cap(r.cond)} guarantees ${r.label}` : `${cap(r.cond)} clinches ${r.label}`))
      .join('; ');
  }

  return `${safeClause}${overall}.`;
}

/** Capitalize first letter. */
function cap(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
}

// ----------------------------------------------------------------------------
// Cross-group best-third clinch (DETERMINISTIC only — see HONESTY CONTRACT)
// ----------------------------------------------------------------------------

const groupLetter = (g) => {
  const m = /Group\s+([A-L])/i.exec(g.name || '');
  return m ? m[1].toUpperCase() : null;
};

/**
 * Max points a THIRD-place team in this group can still finish on, over every
 * completion of its unplayed matches. (4-team group → sorted[2] is 3rd.) This is
 * the per-group ceiling used to bound how many other groups could field a third
 * that matches-or-beats a given team's worst-case third-place total.
 */
function maxThirdPoints(group) {
  const { pts } = currentPoints(group);
  const unplayed = group.matches.filter((m) => !m.played);
  let mx = -1;
  for (const finalPts of enumeratePoints(pts, unplayed)) {
    const sorted = [...finalPts.values()].sort((a, b) => b - a);
    if (sorted[2] > mx) mx = sorted[2];
  }
  return mx;
}

/** Map group-letter -> maxThirdPoints, across all groups. */
function thirdCeilings(allGroups) {
  const m = new Map();
  for (const g of allGroups) {
    const L = groupLetter(g);
    if (L) m.set(L, maxThirdPoints(g));
  }
  return m;
}

/**
 * Is `code` DETERMINISTICALLY guaranteed to reach the R32 — even if it cannot
 * lock a top-2 seed? Over every completion of its own group:
 *   - worstRank = it loses all ties (strictlyAbove + equal + 1).
 *   - If it can ever finish 4th -> NOT guaranteed (4th never advances).
 *   - If it can finish 3rd, take its LOWEST 3rd-place points total (the hardest
 *     case). It is a locked top-8 third iff at most 7 OTHER groups have a
 *     third-place ceiling >= that total (groups are independent, so all of them
 *     hitting their ceiling at once is achievable — the tight worst case).
 * Returns { clinched, viaThird, worstThirdPts } (clinched=false if no ceilings).
 */
function advanceClinchInfo(basePts, unplayed, code, ceilings, ownLetter) {
  if (!ceilings) return { clinched: false };
  let everFourth = false, everThird = false, worstThirdPts = Infinity;
  for (const finalPts of enumeratePoints(basePts, unplayed)) {
    const mine = finalPts.get(code);
    let strictlyAbove = 0, equal = 0;
    for (const [c, p] of finalPts) {
      if (c === code) continue;
      if (p > mine) strictlyAbove++;
      else if (p === mine) equal++;
    }
    const worstRank = strictlyAbove + equal + 1;
    if (worstRank >= 4) everFourth = true;
    else if (worstRank === 3) { everThird = true; if (mine < worstThirdPts) worstThirdPts = mine; }
  }
  if (everFourth) return { clinched: false };       // a 4th-place finish is possible
  if (!everThird) return { clinched: false };        // never below 2nd -> top-2 clinch path
  let canMatchOrBeat = 0;
  for (const [letter, ceil] of ceilings) {
    if (letter === ownLetter) continue;
    if (ceil >= worstThirdPts) canMatchOrBeat++;
  }
  return { clinched: canMatchOrBeat <= 7, viaThird: true, worstThirdPts, canMatchOrBeat };
}

/**
 * Minimal OWN result that guarantees finishing SOLE top on points (winning the
 * group), or null if no own result can guarantee it yet. Same own/others split
 * as magicAndThreshold, tested against isSoleTopOnPoints, phrased via
 * resultsForDelta ("a draw (or better)", "a win", "two wins", …).
 */
function clinchFirstResult(basePts, unplayed, code, curPts) {
  const own = unplayed.filter((m) => m.home === code || m.away === code);
  const others = unplayed.filter((m) => m.home !== code && m.away !== code);
  const byTotal = new Map(); // own-final-total -> { everNotFirst }
  for (const ownPts of enumeratePoints(basePts, own)) {
    const myTotal = ownPts.get(code);
    let everNotFirst = false;
    for (const finalPts of enumeratePoints(ownPts, others)) {
      if (!isSoleTopOnPoints(finalPts, code)) { everNotFirst = true; break; }
    }
    const agg = byTotal.get(myTotal) || { everNotFirst: false };
    agg.everNotFirst = agg.everNotFirst || everNotFirst;
    byTotal.set(myTotal, agg);
  }
  const totals = [...byTotal.keys()].sort((a, b) => a - b);
  let magicFirst = null;
  for (let i = 0; i < totals.length; i++) {
    let tailOK = true;
    for (let j = i; j < totals.length; j++) {
      if (byTotal.get(totals[j]).everNotFirst) { tailOK = false; break; }
    }
    if (tailOK) { magicFirst = totals[i]; break; }
  }
  if (magicFirst == null) return null;
  return resultsForDelta(magicFirst - curPts, own.length);
}

// ----------------------------------------------------------------------------
// Public entry
// ----------------------------------------------------------------------------

/**
 * @param {{name,teams,matches}} group
 * @returns {{teams:Array, nextRound:{matchKeys,date,triggers}, decided:boolean}}
 */function groupSituation(group, opts = {}) {
  const mcByCode = opts.mcByCode || null; // code -> perTeam entry, or null
  const { pts, played } = currentPoints(group);
  const unplayed = group.matches.filter((m) => !m.played);

  // Cross-group third-place ceilings (DETERMINISTIC best-third clinch). Only when
  // the caller supplies all 12 groups; otherwise we stay silent on best-thirds.
  const ceilings = opts.allGroups ? thirdCeilings(opts.allGroups) : null;
  const ownLetter = groupLetter(group);

  const teamMeta = new Map();

  if (marginMap.size === 0) return { possible: false, rules: [], ranks: [] };

  const entries = [...marginMap.entries()].sort((a, b) => a[0] - b[0]);
  const allRanks = new Set();
  for (const [, set] of entries) for (const r of set) allRanks.add(r);

  // Merge contiguous margins that share the SAME rank-set (singleton or tied)
  // into one threshold rule. A rule with one rank also exposes \`.rank\` for
  // convenience; a tied rule exposes only \`.ranks\`.
  const sig = (set) => [...set].sort((a, b) => a - b).join(',');
  const rules = [];
  let runStart = entries[0][0];
  let runSig = sig(entries[0][1]);
  let runRanks = [...entries[0][1]].sort((a, b) => a - b);
  let prevMargin = entries[0][0];
  const flush = (endMargin) => {
    const rule = { marginLo: runStart, marginHi: endMargin, ranks: runRanks };
    if (runRanks.length === 1) rule.rank = runRanks[0];
    rules.push(rule);
  };
  for (let i = 1; i < entries.length; i++) {
    const [m, set] = entries[i];
    if (sig(set) === runSig && m === prevMargin + 1) {
      prevMargin = m;
    } else {
      flush(prevMargin);
      runStart = m;
      runSig = sig(set);
      runRanks = [...set].sort((a, b) => a - b);
      prevMargin = m;
    }
  }
  flush(prevMargin);

  return {
    possible: true,
    ranks: [...allRanks].sort((a, b) => a - b),
    rules,
  };
}

function collectRanks(combos, code) {
  const s = new Set();
  for (const c of combos) s.add(c.rankByCode[code]);
  return [...s].sort((a, b) => a - b);
}

const ordinal = (n) =>
  n === 1 ? '1st' : n === 2 ? '2nd' : n === 3 ? '3rd' : \`\${n}th\`;

const rankWord = (rank) => ordinal(rank);

/**
 * English digest for a team playing in a single decisive match, e.g.
 * "1st with any win; 2nd on a draw; 3rd if they lose by 1; 4th if they lose by 2+".
 */
function describeSinglePlaying(byOutcome, maxGoals) {
  const parts = [];
  if (byOutcome.win.possible) parts.push(...phrasesForOutcome(byOutcome.win, 'win', maxGoals));
  if (byOutcome.draw.possible) parts.push(...phrasesForOutcome(byOutcome.draw, 'draw', maxGoals));
  if (byOutcome.loss.possible) parts.push(...phrasesForOutcome(byOutcome.loss, 'loss', maxGoals));
  return parts.join('; ');
}

/**
 * Turn a collapsed outcome (win/draw/loss) into English phrases.
 *  - draw: a single margin (0); usually one rank, multiple only under lots.
 *  - win/loss: margin-threshold rules, ordered best-rank-first, with the rule
 *    that reaches the enumeration edge (|margin| === maxGoals) rendered as "N+".
 */
function phrasesForOutcome(outcome, result, maxGoals) {
  if (result === 'draw') {
    const ranks = outcome.ranks;
    if (ranks.length === 1) return [\`\${rankWord(ranks[0])} on a draw\`];
    return [\`\${ranks.map(rankWord).join(' or ')} on a draw (depends on the other result)\`];
  }

  const rules = outcome.rules;

  // Constant rank across the whole outcome -> "Nth with any win/loss".
  const allDeterministic = rules.every((r) => r.rank != null);
  const uniqueRanks = new Set(rules.flatMap((r) => (r.rank != null ? [r.rank] : r.ranks)));
  if (allDeterministic && uniqueRanks.size === 1) {
    const rank = [...uniqueRanks][0];
    return [\`\${rankWord(rank)} with any \${result}\`];
  }

  // Order rules by goal-margin magnitude ascending (smallest margin first); this
  // reads naturally as the result gets more lopsided.
  const ordered = [...rules].sort((a, b) => Math.abs(a.marginLo) - Math.abs(b.marginLo));
  const verb = result === 'win' ? 'win' : 'lose';

  return ordered.map((r) => {
    const loMag = Math.abs(r.marginLo);
    const hiMag = Math.abs(r.marginHi);
    const lo = Math.min(loMag, hiMag);
    const hi = Math.max(loMag, hiMag);
    const reachesEdge = hi === maxGoals;
    let cond;
    if (lo === hi) cond = \`if they \${verb} by \${lo}\`;
    else if (reachesEdge) cond = \`if they \${verb} by \${lo}+\`;
    else cond = \`if they \${verb} by \${lo}–\${hi}\`;
    const label = r.rank != null ? rankWord(r.rank) : r.ranks.map(rankWord).join('/');
    return \`\${label} \${cond}\`;
  });
}

function describeNonPlaying(team, match, ranks, byMargin, maxGoals) {
  if (ranks.length === 1) {
    return \`\${rankWord(ranks[0])} regardless of \${match.home} v \${match.away}\`;
  }
  // Summarize by participant (home-perspective) margin bands.
  const sideCond = (lo, hi) => {
    // lo<=hi signed home margins within the band.
    const band = (mLo, mHi, who, edge) => {
      const a = Math.abs(mLo), b = Math.abs(mHi);
      const x = Math.min(a, b), y = Math.max(a, b);
      if (x === y) return \`\${who} win by \${x}\`;
      if (y === maxGoals && edge) return \`\${who} win by \${x}+\`;
      return \`\${who} win by \${x}–\${y}\`;
    };
    if (lo === 0 && hi === 0) return 'a draw';
    if (lo > 0) return band(lo, hi, match.home, true);   // home wins
    if (hi < 0) return band(lo, hi, match.away, true);   // away wins
    // Band straddles 0: it covers a draw plus wins on one (or both) sides.
    const segs = [];
    if (lo < 0) segs.push(band(lo, -1, match.away, lo === -maxGoals)); // away-win part
    if (lo <= 0 && hi >= 0) segs.push('a draw');
    if (hi > 0) segs.push(band(1, hi, match.home, hi === maxGoals));   // home-win part
    return segs.join(' or ');
  };
  const parts = byMargin.map((b) =>
    \`\${b.ranks.map(rankWord).join('/')} on \${sideCond(b.homeMarginLo, b.homeMarginHi)}\`
  );
  return parts.join('; ');
}

// --- two simultaneous upcoming matches -------------------------------------

/**
 * Collapse the grid for the TWO-match (final round) case for one team.
 *
 * We produce:
 *   joint: array of { outcomes, rank } where outcomes describes each match by
 *          result (and, where rank depends on it, margin) — collapsed so that
 *          all scorelines yielding the same rank for this team share an entry.
 *   needs: per achievable rank, a compact description of sufficient conditions.
 *
 * For readability we first reduce each match to (result, margin) from the
 * perspective of its HOME team, then group combos by (resultA, resultB) and,
 * within that, report the rank(s) and whether margin matters.
 */
function summarizeDouble(team, upcoming, combos) {
  const code = team.code;
  const [mA, mB] = upcoming;

  // Group by (homeResultA, homeResultB) coarse outcome; collect rank sets and
  // whether margins within that coarse cell affect the rank.
  const cells = new Map(); // key "rA|rB" -> { rA,rB, rankSet:Set, marginVaries:bool, detail:Map }
  for (const c of combos) {
    const [aHg, aAg] = c.scores[0];
    const [bHg, bAg] = c.scores[1];
    const rA = aHg > aAg ? 'win' : aHg < aAg ? 'loss' : 'draw'; // home A perspective
    const rB = bHg > bAg ? 'win' : bHg < bAg ? 'loss' : 'draw';
    const key = \`\${rA}|\${rB}\`;
    if (!cells.has(key)) cells.set(key, { rA, rB, rankSet: new Set(), detail: new Map() });
    const cell = cells.get(key);
    const rank = c.rankByCode[code];
    cell.rankSet.add(rank);
    // detail keyed by (marginA, marginB) for margin-sensitivity analysis
    const dk = \`\${aHg - aAg},\${bHg - bAg}\`;
    cell.detail.set(dk, rank);
  }

  const joint = [];
  for (const cell of cells.values()) {
    const ranks = [...cell.rankSet].sort((a, b) => a - b);
    const marginVaries = ranks.length > 1;
    joint.push({
      outcomes: [
        { key: matchKey(mA), home: mA.home, away: mA.away, result: cell.rA },
        { key: matchKey(mB), home: mB.home, away: mB.away, result: cell.rB },
      ],
      ranks,
      marginVaries,
    });
  }

  // "What they need": for each achievable rank, list the coarse outcome cells
  // where that rank is GUARANTEED (rank set === [rank]) vs merely possible.
  const ranks = collectRanks(combos, code);
  const needs = {};
  for (const rank of ranks) {
    const guaranteed = [];
    const possible = [];
    for (const j of joint) {
      if (j.ranks.length === 1 && j.ranks[0] === rank) guaranteed.push(j.outcomes);
      else if (j.ranks.includes(rank)) possible.push(j.outcomes);
    }
    needs[rank] = { guaranteed, possible };
  }

  const description = describeDouble(team, upcoming, ranks, joint);
  return { code, name: team.name, ranks, joint, needs, description };
}

function describeDouble(team, upcoming, ranks, joint) {
  const [mA, mB] = upcoming;
  const resultPhrase = (o) => {
    if (o.result === 'win') return \`\${o.home} beat \${o.away}\`;
    if (o.result === 'loss') return \`\${o.away} beat \${o.home}\`;
    return \`\${o.home}-\${o.away} draw\`;
  };
  // Build "rank: when ..." clauses, listing guaranteed coarse cells.
  const clauses = [];
  for (const rank of ranks) {
    const guaranteedCells = joint.filter((j) => j.ranks.length === 1 && j.ranks[0] === rank);
    if (guaranteedCells.length === 0) {
      clauses.push(\`\${rankWord(rank)} possible (margin-dependent)\`);
      continue;
    }
    const cellPhrases = guaranteedCells.map((j) => j.outcomes.map(resultPhrase).join(' & '));
    clauses.push(\`\${rankWord(rank)} if: \${cellPhrases.join('  OR  ')}\`);
  }
  return clauses.join(' | ');
}


/* ===== allocation.js (filesystem read replaced by baked table) ===== */

// allocation.js
// FIFA 2026 World Cup "Annex C" third-place allocation: maps which eight
// third-placed groups qualify to which round-of-32 third-place slot they fill.
//
// allocation.json is keyed by the canonical combination key: the 8 qualifying
// group letters, sorted alphabetically and concatenated (e.g. "ABCDEFGH").
// Each value maps a slot label ("1A","1B","1D","1E","1G","1I","1K","1L") to the
// GROUP LETTER whose third-placed team fills that slot.
//
// ES module. No dependencies beyond node: builtins.


let _allocation = null;
function getAllocation() {
  return __ALLOCATION__;
}

/**
 * Normalize an array/Set/string of group letters to the canonical key:
 * uppercased, de-duplicated implicitly by validation, sorted, concatenated.
 * @param {Iterable<string>|string} groups
 * @returns {string} canonical 8-letter key
 */
function canonicalKey(groups) {
  let arr;
  if (typeof groups === "string") {
    arr = groups.split(/[^A-Za-z]+/).filter(Boolean);
    if (arr.length <= 1) arr = groups.replace(/[^A-Za-z]/g, "").split(""); // "ABCDEFGH"
  } else {
    arr = [...groups];
  }
  const letters = arr.map((g) => String(g).trim().toUpperCase());
  for (const l of letters) {
    if (!/^[A-L]$/.test(l)) throw new Error(\`invalid group letter: \${JSON.stringify(l)}\`);
  }
  const uniq = [...new Set(letters)];
  if (uniq.length !== 8) {
    throw new Error(\`expected 8 distinct group letters, got \${uniq.length}: \${uniq.join("")}\`);
  }
  return uniq.sort().join("");
}

/**
 * Look up the Annex C slot->group mapping for a given set of qualifying
 * third-place groups.
 * @param {Iterable<string>|string} qualifiedGroupLetters - the 8 group letters
 *   whose third-placed teams qualified.
 * @returns {Record<string,string>} mapping slot label -> group letter
 */
function lookupAllocation(qualifiedGroupLetters) {
  const key = canonicalKey(qualifiedGroupLetters);
  const table = getAllocation();
  const entry = table[key];
  if (!entry) {
    throw new Error(\`combination \${key} not found in Annex C allocation table\`);
  }
  return { ...entry };
}

/**
 * Combine the allocation with the bracket to resolve, for each R32 match that
 * has a "third" slot, which group's third-placed team is assigned there.
 *
 * The bracket's R32 third slots are conventionally labelled by the group
 * WINNER they oppose: a match whose other side is { type:"winner", group:X }
 * has third slot label "1X". We use that to index the allocation.
 *
 * @param {Iterable<string>|string} qualifiedGroupLetters
 * @param {object} bracket - parsed bracket.json
 * @returns {Array<{match:number, slotLabel:string, group:string, candidates:string[]}>}
 */
function resolveThirdPlaceSlots(qualifiedGroupLetters, bracket) {
  const alloc = lookupAllocation(qualifiedGroupLetters);
  const out = [];
  const r32 = (bracket && bracket.rounds && bracket.rounds.R32) || [];
  for (const m of r32) {
    let thirdSide = null;
    let winnerSide = null;
    for (const side of [m.home, m.away]) {
      if (side && side.type === "third") thirdSide = side;
      if (side && side.type === "winner") winnerSide = side;
    }
    if (!thirdSide) continue;
    if (!winnerSide) {
      throw new Error(\`match \${m.match} has a third slot but no winner side to label it\`);
    }
    const slotLabel = "1" + winnerSide.group;
    const group = alloc[slotLabel];
    if (!group) {
      throw new Error(\`no allocation for slot \${slotLabel} (match \${m.match})\`);
    }
    // sanity: the assigned group must be one of FIFA's listed candidates
    if (Array.isArray(thirdSide.from) && !thirdSide.from.includes(group)) {
      throw new Error(
        \`match \${m.match} slot \${slotLabel}: allocated group \${group} not in candidate list \${thirdSide.from.join("/")}\`
      );
    }
    out.push({ match: m.match, slotLabel, group, candidates: thirdSide.from || null });
  }
  return out;
}


/* ===== model.js ===== */

// model.js
// Probabilistic projection engine for the 2026 World Cup bracket:
//   - an Elo-driven Poisson scoreline model ("supremacy" model), and
//   - a Monte Carlo tournament simulator built on top of engine.js + allocation.
//
// BROWSER-SAFE ES module. NO node: imports, no fs/process in exported logic.
// It imports ONLY from engine.js (pure) and receives the Annex-C allocation
// resolution as an injected dependency, so it never touches the filesystem.
//
// The caller (verify-model.mjs in Node, or the HTML build in the browser) is
// responsible for loading bracket.json/allocation.json and passing in a
// \`resolveThirdPlaceSlots(groupLetters, bracket)\` function via opts.
//
// All randomness flows through an injected rng function ()->[0,1). We NEVER
// call Math.random internally, so a fixed seed reproduces a run exactly.
// ----------------------------------------------------------------------------
// Tunable constants (exported so they can be overridden / re-fit)
// ----------------------------------------------------------------------------

// Elo points -> goal-supremacy slope. 0.0036 goals per Elo point ≈ 1.44 goals
// of expected-margin per 400 Elo (a 400-Elo gap is the classic "10x odds" gap).const ELO_SUPREMACY_COEF = 0.0036;

// League-average total goals per match (both teams). World Cup group/KO games
// historically average ~2.5–2.7; 2.6 is a reasonable central value.const BASE_TOTAL_GOALS = 2.6;

// Floor on either side's Poisson mean so even a huge underdog can score.const MIN_LAMBDA = 0.15;

// Default host-nation Elo bonus (points). Applied to USA/MEX/CAN in every match
// via opts.hostCodes. Home-field in soccer is worth roughly +0.3–0.4 goals;
// at the supremacy slope above, ~80 Elo ≈ +0.29 goals of supremacy. Kept modest
// because co-hosting across 3 countries dilutes a true single-venue advantage.const DEFAULT_HOST_BONUS = 80;

// Round index map for "furthest round reached".const ROUND_INDEX = Object.freeze({
  R32: 0,
  R16: 1,
  QF: 2,
  SF: 3,
  Final: 4,
  Champion: 5,
});

// ----------------------------------------------------------------------------
// 1. Seedable PRNG — mulberry32
// ----------------------------------------------------------------------------

/**
 * mulberry32 — a tiny, fast, decent-quality seedable PRNG.
 * @param {number} seed  any 32-bit-ish integer
 * @returns {() => number} function returning a float in [0, 1)
 */function makeRng(seed) {
  let a = seed >>> 0;
  return function rng() {
    a |= 0;
    a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ----------------------------------------------------------------------------
// 2. Poisson sampler — Knuth's algorithm
// ----------------------------------------------------------------------------

/**
 * Sample a Poisson(lambda) integer using Knuth's multiplicative method.
 * Fine for the small lambdas (~0.2–2.5) we draw here.
 * @param {number} lambda  mean (>= 0)
 * @param {() => number} rng
 * @returns {number} non-negative integer goal count
 */function samplePoisson(lambda, rng) {
  if (lambda <= 0) return 0;
  const L = Math.exp(-lambda);
  let k = 0;
  let p = 1;
  do {
    k++;
    p *= rng();
  } while (p > L);
  return k - 1;
}

// ----------------------------------------------------------------------------
// 3. Expected goals — the "supremacy" model
// ----------------------------------------------------------------------------

/**
 * Map two Elo ratings (plus optional per-side host bonuses) to a pair of
 * Poisson means.
 * @param {number} eloA
 * @param {number} eloB
 * @param {object} [opts]
 *   opts.hostBonusA, opts.hostBonusB  additive Elo bonuses (default 0)
 *   opts.eloSupremacyCoef, opts.baseTotalGoals, opts.minLambda  overrides
 * @returns {{lambdaA:number, lambdaB:number}}
 */function expectedGoals(eloA, eloB, opts = {}) {
  const coef = opts.eloSupremacyCoef ?? ELO_SUPREMACY_COEF;
  const total = opts.baseTotalGoals ?? BASE_TOTAL_GOALS;
  const minL = opts.minLambda ?? MIN_LAMBDA;

  const effA = eloA + (opts.hostBonusA ?? 0);
  const effB = eloB + (opts.hostBonusB ?? 0);

  const supremacy = coef * (effA - effB);
  const lambdaA = Math.max(minL, (total + supremacy) / 2);
  const lambdaB = Math.max(minL, (total - supremacy) / 2);
  return { lambdaA, lambdaB };
}

// ----------------------------------------------------------------------------
// 4 & 5. Scoreline samplers
// ----------------------------------------------------------------------------

/**
 * Sample a group-stage scoreline (independent Poisson draws).
 * @returns {{ga:number, gb:number}}
 */function sampleMatch(eloA, eloB, rng, opts = {}) {
  const { lambdaA, lambdaB } = expectedGoals(eloA, eloB, opts);
  return { ga: samplePoisson(lambdaA, rng), gb: samplePoisson(lambdaB, rng) };
}

/**
 * Sample a knockout scoreline; if drawn, resolve by an Elo-weighted shootout.
 * The drawn scoreline is preserved in {ga,gb}; only \`winner\` reflects the
 * shootout. Penalties use effective Elo (host bonus included).
 * @returns {{ga:number, gb:number, winner:'A'|'B'}}
 */function sampleKnockout(eloA, eloB, rng, opts = {}) {
  const { ga, gb } = sampleMatch(eloA, eloB, rng, opts);
  if (ga > gb) return { ga, gb, winner: 'A' };
  if (gb > ga) return { ga, gb, winner: 'B' };
  // Tied -> shootout modeled as an Elo-weighted coin.
  const effA = eloA + (opts.hostBonusA ?? 0);
  const effB = eloB + (opts.hostBonusB ?? 0);
  const pA = 1 / (1 + Math.pow(10, -(effA - effB) / 400));
  return { ga, gb, winner: rng() < pA ? 'A' : 'B' };
}

// ----------------------------------------------------------------------------
// Internal helpers
// ----------------------------------------------------------------------------

/** Host bonus for a given team code under opts.hostCodes (a Set). */
function hostBonusFor(code, opts) {
  if (opts.hostCodes && opts.hostCodes.has && opts.hostCodes.has(code)) {
    return opts.hostBonus ?? DEFAULT_HOST_BONUS;
  }
  return 0;
}

/** Group letter ("A".."L") from a group object whose name is "Group X". */
function groupLetter(group) {
  const m = /Group\\s+([A-L])/i.exec(group.name);
  return m ? m[1].toUpperCase() : group.name.trim().slice(-1).toUpperCase();
}

/**
 * Deep-ish copy of the groups array sufficient for a single sim: teams are kept
 * by reference (read-only: code/name/elo), matches are cloned (we mutate goals
 * + played). Avoids cloning the immutable team records every sim.
 */
function cloneGroupsForSim(groups) {
  return groups.map((g) => ({
    name: g.name,
    teams: g.teams,
    matches: g.matches.map((m) => ({
      home: m.home,
      away: m.away,
      homeGoals: m.homeGoals,
      awayGoals: m.awayGoals,
      played: m.played,
    })),
  }));
}

// ----------------------------------------------------------------------------
// 6. One full tournament simulation
// ----------------------------------------------------------------------------

/**
 * Simulate ONE complete tournament from the current state.
 *
 * @param {Array} groups   engine-schema group objects (teams carry \`elo\`)
 * @param {object} bracket parsed bracket.json
 * @param {() => number} rng
 * @param {object} opts
 *   opts.hostCodes   Set<code> of host countries (always get host bonus)
 *   opts.hostBonus   Elo bonus magnitude (default DEFAULT_HOST_BONUS)
 *   opts.resolveThirdPlaceSlots(groupLetters, bracket) -> [{match,group,...}]
 *       (injected so this module stays browser/fs-free)
 *   plus any expectedGoals overrides.
 * @returns {{
 *   groupRank: Record<string,number>,
 *   groupPoints: Record<string,number>,
 *   qualifiedAs: Record<string,'winner'|'runnerup'|'third'|null>,
 *   r32: Array<{match:number, home:string, away:string}>,
 *   reached: Record<string,number>,
 *   champion: string,
 *   knockout: Array<{match:number, round:string, home:string, away:string, winner:string}>
 * }}
 */function simulateTournament(groups, bracket, rng, opts = {}) {
  const resolveThirds = opts.resolveThirdPlaceSlots;
  if (typeof resolveThirds !== 'function') {
    throw new Error('opts.resolveThirdPlaceSlots(groupLetters, bracket) is required');
  }

  const eloByCode = new Map();
  for (const g of groups) for (const t of g.teams) eloByCode.set(t.code, t.elo);
  const eloOf = (code) => eloByCode.get(code);

  // --- group stage: sample every unplayed match -----------------------------
  const sim = cloneGroupsForSim(groups);
  for (const g of sim) {
    for (const m of g.matches) {
      if (m.played) continue;
      const hb = hostBonusFor(m.home, opts);
      const ab = hostBonusFor(m.away, opts);
      const { ga, gb } = sampleMatch(eloOf(m.home), eloOf(m.away), rng, {
        ...opts,
        hostBonusA: hb,
        hostBonusB: ab,
      });
      m.homeGoals = ga;
      m.awayGoals = gb;
      m.played = true;
    }
  }

  // --- standings -------------------------------------------------------------
  const winnerOfGroup = {};   // letter -> code
  const runnerUpOfGroup = {}; // letter -> code
  const groupRank = {};       // code -> 1..4
  const groupPoints = {};     // code -> final group points
  const qualifiedAs = {};     // code -> role | null
  const standings = {};       // letter -> ranked array

  for (const g of sim) {
    const letter = groupLetter(g);
    const standing = computeGroupStanding(g);
    standings[letter] = standing;
    for (const s of standing) {
      groupRank[s.code] = s.rank;
      groupPoints[s.code] = s.points;
      qualifiedAs[s.code] = null;
      if (s.rank === 1) winnerOfGroup[letter] = s.code;
      else if (s.rank === 2) runnerUpOfGroup[letter] = s.code;
    }
    qualifiedAs[winnerOfGroup[letter]] = 'winner';
    qualifiedAs[runnerUpOfGroup[letter]] = 'runnerup';
  }

  // --- best 8 third-place teams ---------------------------------------------
  const thirds = rankThirdPlaceTeams(sim); // each has .group (= "Group X"), .qualifies
  const qualifiedThirds = thirds.filter((t) => t.qualifies);
  // map group LETTER -> qualifying third-place team code
  const thirdCodeByLetter = {};
  const qualifiedLetters = [];
  for (const t of qualifiedThirds) {
    const letter = /Group\\s+([A-L])/i.exec(t.group)?.[1]?.toUpperCase()
      ?? String(t.group).trim().slice(-1).toUpperCase();
    thirdCodeByLetter[letter] = t.code;
    qualifiedLetters.push(letter);
    qualifiedAs[t.code] = 'third';
  }

  // --- Annex C: which group's third fills each R32 third slot ---------------
  const thirdSlots = resolveThirds(qualifiedLetters, bracket); // [{match, group}]
  const thirdCodeForMatch = {};
  for (const s of thirdSlots) thirdCodeForMatch[s.match] = thirdCodeByLetter[s.group];

  // --- build the 16 R32 fixtures --------------------------------------------
