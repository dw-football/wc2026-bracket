    const c = [...set][0];
    if (c === 'W') return \`\${home} beat \${away}\`;
    if (c === 'L') return \`\${away} beat \${home}\`;
    return \`\${home} and \${away} draw\`;
  }
  // size 2 -> express as the natural negation of the excluded outcome.
  if (!set.has('L')) return \`\${home} avoid defeat\${withOpp ? \` against \${away}\` : ''}\`; // {W,D}
  if (!set.has('W')) return \`\${away} avoid defeat\${withOpp ? \` against \${home}\` : ''}\`; // {D,L}
  return \`\${home} or \${away} win\`; // {W,L}, no draw
}

/**
 * Render ONE subcube (over the relevant matches) into a condition phrase from
 * the subject team's point of view. Matches set to "any" are dropped. Multiple
 * surviving conditions are joined with "and". Returns '' if the subcube drops
 * every match (i.e. the rank is unconditional given the branch).
 */
function renderSubcube(subcube, code, unplayed, relevant, nameOf) {
  const parts = [];
  for (let i = 0; i < relevant.length; i++) {
    const m = unplayed[relevant[i]];
    const homeSet = new Set(subcube[i]);
    if (homeSet.size === 3) continue; // dropped
    const subjectPlays = m.home === code || m.away === code;
    if (subjectPlays) {
      const subjSet = new Set([...homeSet].map((c) => fromSubjectPerspective(c, m, code)));
      const opp = nameOf(m.home === code ? m.away : m.home);
      parts.push(ownMatchPhrase(subjSet, opp));
    } else {
      parts.push(otherMatchPhrase(homeSet, m, nameOf));
    }
  }
  return parts.filter(Boolean).join(' and ');
}

/** Join the subcube clauses for a single rank with "or". When more than one
 *  clause survives and any clause itself contains "and", parenthesize the
 *  multi-condition clauses so the top-level "or" can't be misread. */
function renderRankCover(subcubes, code, unplayed, relevant, nameOf) {
  const phrases = subcubes
    .map((sc) => renderSubcube(sc, code, unplayed, relevant, nameOf))
    .filter((p) => p !== '');
  // De-dup.
  const seen = new Set();
  const uniq = [];
  for (const p of phrases) {
    if (!seen.has(p)) {
      seen.add(p);
      uniq.push(p);
    }
  }
  if (uniq.length <= 1) return uniq.join(' or ');
  return uniq.map((p) => (p.includes(' and ') ? \`(\${p})\` : p)).join(' or ');
}

// ---------------------------------------------------------------------------
// Per-rank cover construction (coarse, margin-free)
// ---------------------------------------------------------------------------

/**
 * For a team whose rank is decided purely by coarse outcomes (no margin flips),
 * compute the minimal subcube cover for EACH achievable rank.
 *
 * @returns Map<rank, subcube[]>
 */
function coverByRank(cells, ranks, numMatches) {
  // rank -> array of coarse tuples
  const cellsByRank = new Map();
  const allKeys = new Set();
  for (const cell of cells.values()) {
    const r = [...cell.rankSet][0]; // margin-free => singleton
    allKeys.add(cell.coarse.join('|'));
    if (!cellsByRank.has(r)) cellsByRank.set(r, []);
    cellsByRank.get(r).push(cell.coarse);
  }
  const result = new Map();
  for (const r of ranks) {
    const target = cellsByRank.get(r) || [];
    if (target.length === 0) continue;
    const off = new Set([...allKeys].filter((k) => !target.some((t) => t.join('|') === k)));
    result.set(r, minimalCover(target, off, numMatches));
  }
  return result;
}

// ---------------------------------------------------------------------------
// Detail builder — REFRAMED prose (best outcome first, then downside)
// ---------------------------------------------------------------------------

/**
 * Build a plain-English detail string for a conditional / best-3rd team whose
 * rank depends on \`relevant\` matches. Leads with the best reachable rank and
 * its simplest controllable condition, then states the downside; appends the
 * deeper fall only when an extra match-result triggers it.
 *
 * Aim: one, at most two sentences. Falls back to a compact margin note rather
 * than a long enumeration if minimization can't shorten things.
 */
function describeConditional(code, name, unplayed, scenarios, relevant, nameOf) {
  const ranks = [...new Set(scenarios.map((s) => s.rankByCode[code]))].sort((a, b) => a - b);
  const { cells, marginMatters } = buildRelevantCells(code, unplayed, scenarios, relevant);
  const numMatches = relevant.length;

  const ownIdx = relevant.findIndex(
    (j) => unplayed[j].home === code || unplayed[j].away === code
  );

  // Margin-free and the subject plays one of the relevant matches: organize the
  // statement around the subject's OWN (controllable) result. This is where the
  // per-outcome minimization pays off — the OTHER match is dropped from any
  // own-result slice in which it doesn't change the rank.
  if (!marginMatters && ownIdx >= 0) {
    return describeByOwnResult(code, ranks, cells, unplayed, relevant, ownIdx, nameOf);
  }

  // Margin-free, subject doesn't play (rank driven entirely by other matches):
  // per-rank minimal cover, best rank first.
  if (!marginMatters) {
    const covers = coverByRank(cells, ranks, numMatches);
    return describeByRankCover(code, ranks, covers, unplayed, relevant, nameOf);
  }

  // Margin matters. Single match the subject plays -> concrete thresholds.
  if (numMatches === 1) {
    return describeSingleWithMargin(code, unplayed[relevant[0]], cells, ranks, nameOf);
  }
  // Two relevant matches, subject plays one of them, and a goal margin flips the
  // rank inside some coarse cell. Organize the statement around the subject's OWN
  // result (subject-first), append the other-match dependency, and surface any
  // margin-only path with an explicit concrete result + a goal-difference caveat
  // (never a bare "on goal difference").
  if (ownIdx >= 0) {
    return describeByOwnResultMargin(code, ranks, scenarios, unplayed, relevant, ownIdx, nameOf);
  }
  return describeWithMarginFallback(code, ranks, cells, unplayed, relevant, nameOf);
}

// ---------------------------------------------------------------------------
// Own-result-centric renderer (margin-free, subject plays a relevant match)
// ---------------------------------------------------------------------------

/**
 * Subject-perspective verb noun phrase for a coarse outcome set, capitalized for
 * sentence-initial use when \`cap\` is true.
 *   {W} -> "a win" / "A win"; {W,D} -> "a win or draw"; etc.
 */
function ownResultWord(subjSet, capitalize = false) {
  let w;
  if (subjSet.size === 1) {
    const c = [...subjSet][0];
    w = c === 'W' ? 'a win' : c === 'D' ? 'a draw' : 'a loss';
  } else if (subjSet.has('W') && subjSet.has('D')) w = 'a win or draw';
  else if (subjSet.has('D') && subjSet.has('L')) w = 'a draw or loss';
  else if (subjSet.has('W') && subjSet.has('L')) w = 'a win or loss';
  else w = 'any result';
  return capitalize ? w.charAt(0).toUpperCase() + w.slice(1) : w;
}

/**
 * Build the per-own-result slices. For each subject result present (W/D/L), the
 * "other" matches partition the slice into ranks. We collapse each slice to:
 *   { subjSet, primaryRank, exceptions: [{rank, otherPhrases}] }
 * where primaryRank is the slice's DOMINANT rank (no condition needed) and
 * exceptions are the minority ranks gated by an other-match condition. Slices
 * that share an identical (primaryRank, no-exception) shape and the same subjSet
 * neighbourhood are merged by the caller via subjSet union.
 */
function sliceByOwnResult(code, cells, unplayed, relevant, ownIdx, nameOf) {
  const otherIdx = relevant.map((_, i) => i).filter((i) => i !== ownIdx);
  const ownMatch = unplayed[relevant[ownIdx]];

  // own coarse (home perspective) -> { other coarse tuple -> rank }
  const byOwn = new Map();
  for (const cell of cells.values()) {
    const ownC = cell.coarse[ownIdx];
    if (!byOwn.has(ownC)) byOwn.set(ownC, []);
    byOwn.get(ownC).push({ other: otherIdx.map((i) => cell.coarse[i]), rank: [...cell.rankSet][0] });
  }

  const slices = [];
  for (const [ownC, entries] of byOwn) {
    const subjC = fromSubjectPerspective(ownC, ownMatch, code);
    const rankCount = new Map();
    for (const e of entries) rankCount.set(e.rank, (rankCount.get(e.rank) || 0) + 1);
    const ranksHere = [...rankCount.keys()].sort((a, b) => a - b);

    if (ranksHere.length === 1) {
      slices.push({ subjC, primaryRank: ranksHere[0], exceptions: [] });
      continue;
    }
    // dominant rank = most cells (ties -> the better/lower rank, which is more
    // newsworthy as the default). Minorities become conditioned exceptions.
    let dominant = ranksHere[0];
    let dom = -1;
    for (const r of ranksHere) {
      const c = rankCount.get(r);
      if (c > dom || (c === dom && r < dominant)) {
        dom = c;
        dominant = r;
      }
    }
    const exceptions = [];
    for (const r of ranksHere) {
      if (r === dominant) continue;
      // minimal cover of this minority rank within the slice (other matches only)
      const target = entries.filter((e) => e.rank === r).map((e) => e.other);
      const off = new Set(
        entries.filter((e) => e.rank !== r).map((e) => e.other.join('|'))
      );
      const cover = minimalCover(target, off, otherIdx.length);
      const phrases = cover
        .map((sc) =>
          otherIdx
            .map((i, k) => otherMatchPhrase(new Set(sc[k]), unplayed[relevant[i]], nameOf))
            .filter(Boolean)
            .join(' and ')
        )
        .filter((p) => p !== '');
      exceptions.push({ rank: r, otherPhrases: phrases });
    }
    slices.push({ subjC, primaryRank: dominant, exceptions });
  }
  return { slices, ownMatch };
}

/**
 * Render the own-result slices into one or two sentences, leading with the best
 * reachable rank and ending with the worst.
 */
function describeByOwnResult(code, ranks, cells, unplayed, relevant, ownIdx, nameOf) {
  const { slices, ownMatch } = sliceByOwnResult(code, cells, unplayed, relevant, ownIdx, nameOf);
  const opp = nameOf(ownMatch.home === code ? ownMatch.away : ownMatch.home);

  // Merge slices that have the SAME primaryRank and NO exceptions — their own
  // results combine ("a win or draw" instead of two clauses).
  const merged = [];
  const plain = new Map(); // primaryRank -> Set of subjC (only for exception-free slices)
  for (const sl of slices) {
    if (sl.exceptions.length === 0) {
      if (!plain.has(sl.primaryRank)) plain.set(sl.primaryRank, new Set());
      plain.get(sl.primaryRank).add(sl.subjC);
    } else {
      merged.push(sl);
    }
  }
  for (const [rank, subjCs] of plain) {
    merged.push({ subjSet: subjCs, primaryRank: rank, exceptions: [] });
  }

  // Build a clause per slice; sort best-rank-first by the slice's BEST attainable
  // rank (primary or any exception).
  const sliceBest = (sl) =>
    Math.min(sl.primaryRank, ...sl.exceptions.map((e) => e.rank));
  const sliceWorst = (sl) =>
    Math.max(sl.primaryRank, ...sl.exceptions.map((e) => e.rank));
  merged.sort((a, b) => sliceBest(a) - sliceBest(b) || sliceWorst(a) - sliceWorst(b));

  const subjSetOf = (sl) => sl.subjSet || new Set([sl.subjC]);

  const clauses = merged.map((sl, idx) => {
    const subjSet = subjSetOf(sl);
    const word = ownResultWord(subjSet, idx > 0); // capitalize follow-on clauses
    if (sl.exceptions.length === 0) {
      // "2nd with a win or draw vs South Africa" / for a downside: phrased as the
      // own result leading.
      if (idx === 0) return \`\${ordinal(sl.primaryRank)} with \${ownResultWordPhrase(subjSet, opp)}\`;
      // follow-on: "A loss drops them to 3rd"
      return \`\${word} drops them to \${ordinal(sl.primaryRank)}\`;
    }
    // primary + exceptions:
    //   lead:      "1st with a win over Brazil — or 2nd if Morocco beat Haiti"
    //   follow-on: "a loss is 3rd — or 4th if Czech Republic beat Mexico"
    let s;
    if (idx === 0) {
      s = \`\${ordinal(sl.primaryRank)} with \${ownResultWordPhrase(subjSet, opp)}\`;
    } else {
      s = \`\${word} drops them to \${ordinal(sl.primaryRank)}\`;
    }
    for (const ex of sl.exceptions) {
      const cond = ex.otherPhrases.join(' or ');
      s += \` — or \${ordinal(ex.rank)} if \${cond}\`;
    }
    return s;
  });

  return clauses.join('; ') + '.';
}

/** "a win or draw vs South Africa" — own result set with opponent attached. */
function ownResultWordPhrase(subjSet, opp) {
  return ownMatchPhrase(subjSet, opp) || 'any result';
}

/**
 * Subject does NOT play any relevant match — rank is driven entirely by other
 * teams' matches. Render best rank first via the per-rank minimal cover.
 */
function describeByRankCover(code, ranks, covers, unplayed, relevant, nameOf) {
  const parts = [];
  for (const r of ranks) {
    const p = renderRankCover(covers.get(r) || [], code, unplayed, relevant, nameOf);
    parts.push(p === '' ? \`\${ordinal(r)} otherwise\` : \`\${ordinal(r)} if \${p}\`);
  }
  return parts.join('; ') + '.';
}

// ---------------------------------------------------------------------------
// Margin-threshold rendering (single match the subject plays)
// ---------------------------------------------------------------------------

/**
 * Single relevant match where goal margin changes the rank. Express coarse
 * outcomes first, then add margin thresholds inside the cell that needs them.
 * Concrete thresholds ("if they win by 2+") replace any vague language.
 */
function describeSingleWithMargin(code, match, cells, ranks, nameOf) {
  const subjectPlays = match.home === code || match.away === code;
  const opp = nameOf(match.home === code ? match.away : match.home);
  const order = { W: 0, D: 1, L: 2 };
  const sorted = [...cells.values()].sort((a, b) => order[a.coarse[0]] - order[b.coarse[0]]);
  const clauses = [];
  for (const cell of sorted) {
    const homeCoarse = cell.coarse[0];
    const subjCoarse = subjectPlays ? fromSubjectPerspective(homeCoarse, match, code) : homeCoarse;
    if (cell.rankSet.size === 1) {
      const r = [...cell.rankSet][0];
      if (subjectPlays) {
        clauses.push(\`\${ordinal(r)} with \${ownMatchPhrase(new Set([subjCoarse]), opp)}\`);
      } else {
        clauses.push(\`\${ordinal(r)} if \${otherMatchPhrase(new Set([homeCoarse]), match, nameOf)}\`);
      }
      continue;
    }
    // margin splits this coarse cell -> describe by margin band (subject persp.)
    const byMargin = [...cell.byMargin.entries()]
      .map(([mk, set]) => ({ margin: Number(mk), rank: [...set][0] }))
      .sort((a, b) => a.margin - b.margin);
    const bands = [];
    for (const e of byMargin) {
      const last = bands[bands.length - 1];
      if (last && last.rank === e.rank && e.margin === last.hi + 1) last.hi = e.margin;
      else bands.push({ lo: e.margin, hi: e.margin, rank: e.rank });
    }
    const verb = subjectPlays
      ? subjCoarse === 'W'
        ? 'win'
        : subjCoarse === 'L'
          ? 'lose'
          : 'draw'
      : homeCoarse === 'W'
        ? 'win'
        : 'lose';
    for (const b of bands) {
      const loMag = Math.abs(b.lo);
      const hiMag = Math.abs(b.hi);
      const lo = Math.min(loMag, hiMag);
      const hi = Math.max(loMag, hiMag);
      let cond;
      if (lo === hi) cond = \`\${verb} by \${lo}\`;
      else if (hi >= MAX_GOALS) cond = \`\${verb} by \${lo}+\`;
      else cond = \`\${verb} by \${lo}-\${hi}\`;
      const subj = subjectPlays ? 'they' : nameOf(match.home);
      clauses.push(\`\${ordinal(b.rank)} if \${subj} \${cond}\`);
    }
  }
  return clauses.join('; ') + '.';
}

/**
 * Two relevant matches where a goal margin flips the rank inside some coarse
 * cell — the genuinely hard case. Full enumeration is unreadable, so we state
 * the best CLEANLY-GUARANTEED outcome tightly, then collapse the rest into a
 * single compact "...otherwise Nth/Mth on goal difference" tail. Honest and
 * short; never an over-claim and never a 2-D margin grid.
 */
function describeWithMarginFallback(code, ranks, cells, unplayed, relevant, nameOf) {
  const numMatches = relevant.length;

  // Cells where each rank is the SOLE (coarse-guaranteed) outcome.
  const cleanByRank = new Map();
  for (const cell of cells.values()) {
    if (cell.rankSet.size === 1) {
      const r = [...cell.rankSet][0];
      if (!cleanByRank.has(r)) cleanByRank.set(r, []);
      cleanByRank.get(r).push(cell.coarse);
    }
  }

  // Tight cover of a rank's guaranteed cells: every other cell is off.
  const renderGuaranteed = (tuples) => {
    if (!tuples || tuples.length === 0) return '';
    const keep = new Set(tuples.map((t) => t.join('|')));
    const off = new Set();
    for (const cell of cells.values()) {
      const k = cell.coarse.join('|');
      if (!keep.has(k)) off.add(k);
    }
    return renderRankCover(minimalCover(tuples, off, numMatches), code, unplayed, relevant, nameOf);
  };

  // Render each rank in rank order (best first): a tight clean clause where the
  // rank is guaranteed, or a compact goal-difference note where it is only ever
  // margin-decided.
  const clauses = [];
  const marginOnly = [];
  for (const r of ranks) {
    const g = renderGuaranteed(cleanByRank.get(r));
    if (g !== '') clauses.push({ rank: r, text: \`\${ordinal(r)} with \${g}\` });
    else marginOnly.push(r);
  }

  if (clauses.length === 0) {
    // Nothing cleanly guaranteed -> entirely a goal-difference matter.
    return \`\${ranks.map(ordinal).join('/')} depending on goal difference.\`;
  }

  // Insert margin-only ranks at their rank position with a GD note.
  for (const r of marginOnly) {
    clauses.push({ rank: r, text: \`\${ordinal(r)} on goal difference\` });
  }
  clauses.sort((a, b) => a.rank - b.rank);
  return clauses.map((c) => c.text).join('; ') + '.';
}

// ---------------------------------------------------------------------------
// Own-result-centric renderer for the MARGIN case (subject plays one of two
// relevant matches; a goal margin flips the rank inside some coarse cell).
// ---------------------------------------------------------------------------

/**
 * Build, per subject own-result (W/D/L, subject perspective), the map
 *   otherCoarse ('W'|'D'|'L', other-match HOME perspective) -> Set<rank>.
 * A set of size > 1 means that (own, other) coarse cell is decided on goal
 * difference (margin split).
 */
function sliceOwnVsOther(code, scenarios, unplayed, relevant, ownIdx) {
  const ownU = relevant[ownIdx];
  const otherI = relevant.find((_, i) => i !== ownIdx);
  const ownMatch = unplayed[ownU];
  const otherMatch = unplayed[otherI];
  const byOwn = new Map(); // subjOwn -> Map(otherCoarse -> Set<rank>)
  for (const s of scenarios) {
    const subjOwn = fromSubjectPerspective(s.coarse[ownU], ownMatch, code);
    const oth = s.coarse[otherI];
    if (!byOwn.has(subjOwn)) byOwn.set(subjOwn, new Map());
    const m = byOwn.get(subjOwn);
    if (!m.has(oth)) m.set(oth, new Set());
    m.get(oth).add(s.rankByCode[code]);
  }
  return { byOwn, ownMatch, otherMatch };
}

/**
 * Render the subject's own result (a single coarse 'W'|'D'|'L', subject persp.)
 * as a noun phrase naming the opponent, e.g. "a win over South Korea",
 * "a draw against South Korea", "a loss".
 */
function ownSinglePhrase(subjC, opp) {
  if (subjC === 'W') return \`a win over \${opp}\`;
  if (subjC === 'D') return \`a draw against \${opp}\`;
  return \`a loss\`;
}

/**
 * Margin case, subject plays one of two relevant matches. Produce one clause per
 * achievable rank (best -> worst), each SUBJECT-FIRST: it leads with the rank and
 * the subject's own result, then appends the other-match dependency with a
 * natural connector. Any path that exists only on a goal-difference tiebreak is
 * stated with its concrete results and an explicit "(... and even then on goal
 * difference)" caveat — never a bare "on goal difference".
 */
function describeByOwnResultMargin(code, ranks, scenarios, unplayed, relevant, ownIdx, nameOf) {
  const { byOwn, ownMatch, otherMatch } = sliceOwnVsOther(code, scenarios, unplayed, relevant, ownIdx);
  const opp = nameOf(ownMatch.home === code ? ownMatch.away : ownMatch.home);
  const COARSE_ORDER = { W: 0, D: 1, L: 2 };
  const sortCoarse = (a, b) => COARSE_ORDER[a] - COARSE_ORDER[b];

  // Per rank, gather the own-results that reach it, separating CLEAN cells
  // (rankSet === {r}) from GD-only cells (r is the BETTER member of a split cell,
  // i.e. reachable only on a favourable goal difference).
  const perRank = new Map(); // r -> { clean: Map<own,Set<other>>, gd: Map<own,Set<other>> }
  for (const r of ranks) perRank.set(r, { clean: new Map(), gd: new Map() });
  for (const [subjOwn, otherMap] of byOwn) {
    for (const [oth, rankSet] of otherMap) {
      const sorted = [...rankSet].sort((a, b) => a - b);
      const best = sorted[0];
      for (const r of sorted) {
        const slot = perRank.get(r);
        if (!slot) continue;
        const bucket = rankSet.size === 1 ? slot.clean : r === best ? slot.gd : null;
        if (!bucket) continue; // worse member of a split: owned by the better rank
        if (!bucket.has(subjOwn)) bucket.set(subjOwn, new Set());
        bucket.get(subjOwn).add(oth);
      }
    }
  }

  // Render one rank's clean own-results into a subject-first clause body, with
  // the chosen dependency connector ("provided" for the lead clause, "if"
  // otherwise). Returns { body, groups } where groups counts distinct
  // own-result/condition segments (used to decide the "otherwise" tail).
  const cleanBody = (slot, connector) => {
    // Merge own-results that share an IDENTICAL other-condition.
    const byCond = new Map(); // condKey -> { owns: [coarse], otherSet }
    for (const [own, otherSet] of slot.clean) {
      const key = [...otherSet].sort().join('');
      if (!byCond.has(key)) byCond.set(key, { owns: [], otherSet });
      byCond.get(key).owns.push(own);
    }
    const segs = [];
    for (const { owns, otherSet } of byCond.values()) {
      owns.sort(sortCoarse);
      const ownP = ownMergedPhrase(owns, opp);
      const cond = otherCondition(otherSet, otherMatch, nameOf);
      // "provided" reads with a comma; "if"/"unless" read without one.
      const sep = connector === 'provided' ? ', provided' : \` \${connector}\`;
      segs.push(cond ? \`\${ownP}\${sep} \${cond}\` : ownP);
    }
    return { body: segs.join(', or '), groups: byCond.size };
  };

  // The worst clean rank becomes a bare "otherwise Nth" tail only when its body
  // is MULTI-CONDITION (messy) — a single decisive own-result is stated concretely.
  const cleanRanks = ranks.filter((r) => perRank.get(r).clean.size > 0);
  const worstClean = cleanRanks.length ? Math.max(...cleanRanks) : null;
  let tailRank = null;
  if (worstClean !== null && cleanRanks.length >= 2) {
    const { groups } = cleanBody(perRank.get(worstClean), 'if');
    if (groups >= 2) tailRank = worstClean;
  }

  // Order: clean ranks best -> worst, then GD-only ranks (low-probability) after,
  // then the "otherwise" tail. Track clause index for connector choice.
  const cleanList = cleanRanks.filter((r) => r !== tailRank);
  const gdRanks = ranks.filter((r) => perRank.get(r).clean.size === 0 && perRank.get(r).gd.size > 0);

  const clauses = [];
  let idx = 0;
  for (const r of cleanList) {
    const connector = idx === 0 ? 'provided' : 'if';
    const { body } = cleanBody(perRank.get(r), connector);
    clauses.push(\`\${ordinal(r)} with \${body}\`);
    idx++;
  }
  for (const r of gdRanks) {
    const slot = perRank.get(r);
    const [own, otherSet] = [...slot.gd.entries()].sort((a, b) => sortCoarse(a[0], b[0]))[0];
    const cond = otherCondition(otherSet, otherMatch, nameOf);
    const path = cond ? \`\${ownGerundPhrase(own, opp)} while \${cond}\` : ownGerundPhrase(own, opp);
    clauses.push(\`\${ordinal(r)} only by \${path} (and even then on goal difference)\`);
  }
  let out = clauses.join('; ');
  if (tailRank !== null) out += \`; otherwise \${ordinal(tailRank)}\`;
  return out + '.';
}

/** Merge own-result coarse values into one phrase: {W}->"a win over X",
 *  {W,D}->"a win or draw against X", {D,L}->"a draw or loss against X", etc. */
function ownMergedPhrase(owns, opp) {
  const set = new Set(owns);
  if (set.size === 1) return ownSinglePhrase([...set][0], opp);
  const order = ['W', 'D', 'L'];

}

const COARSE = ['home', 'draw', 'away']; // outcome of an unplayed match

/** Points delta applied to a points-map for one coarse outcome of a match. */
function applyOutcome(ptsMap, match, outcome) {
  if (outcome === 'home') ptsMap.set(match.home, ptsMap.get(match.home) + 3);
  else if (outcome === 'away') ptsMap.set(match.away, ptsMap.get(match.away) + 3);
  else {
    ptsMap.set(match.home, ptsMap.get(match.home) + 1);
    ptsMap.set(match.away, ptsMap.get(match.away) + 1);
  }
}

/**
 * Enumerate every coarse (W/D/L) combination of a list of unplayed matches.
 * Yields a fresh final-points Map for each combo (base points + outcome deltas).
 * k matches -> 3^k combos (k<=6 -> <=729).
 */
function* enumeratePoints(basePts, unplayed) {
  const k = unplayed.length;
  const total = 3 ** k;
  for (let n = 0; n < total; n++) {
    const final = new Map(basePts);
    let x = n;
    for (let i = 0; i < k; i++) {
      applyOutcome(final, unplayed[i], COARSE[x % 3]);
      x = Math.floor(x / 3);
    }
    yield final;
  }
}

// ----------------------------------------------------------------------------
// Points-only top-2 test for ONE final-points map
// ----------------------------------------------------------------------------

/**
 * Given a final-points Map (code -> pts), classify a team's standing on POINTS
 * ALONE. Returns:
 *   'in'     -> strictly inside top 2 (fewer than TOP_N teams have MORE points,
 *               and it is not tied with anyone on the cut line below it)
 *   'tie'    -> on the top-2/3rd boundary as a POINTS TIE involving this team
 *               (would-be in, but a goal-difference tiebreak could intrude)
 *   'out'    -> strictly outside top 2 on points
 *
 * Cut-line semantics for a 4-team group (top 2 advance):
 *   - strictlyAbove = teams with MORE points than this team.
 *   - If strictlyAbove >= TOP_N            -> 'out' (cannot be top 2 here).
 *   - Else (strictlyAbove < TOP_N): this team is at worst the (strictlyAbove+1)th
 *     seed before tiebreaks. It is strictly 'in' only if granting EVERY team
 *     level with it the benefit of the doubt still leaves it inside the top 2,
 *     i.e. there is no points tie spanning the 2nd/3rd boundary that includes it.
 *     Concretely: let \`equal\` = teams with the SAME points (excluding itself).
 *     The block [strictlyAbove .. strictlyAbove+equal] occupies seeds
 *     (strictlyAbove+1) .. (strictlyAbove+equal+1). If that block's top seed
 *     (strictlyAbove+1) <= TOP_N but its bottom seed > TOP_N, the block straddles
 *     the cut -> 'tie'. If the whole block is within top 2 -> 'in'. If the block
 *     starts beyond top 2 -> 'out'.
 */
function classifyPoints(finalPts, code) {
  const mine = finalPts.get(code);
  let strictlyAbove = 0;
  let equal = 0;
  for (const [c, p] of finalPts) {
    if (c === code) continue;
    if (p > mine) strictlyAbove++;
    else if (p === mine) equal++;
  }
  const topSeed = strictlyAbove + 1;            // best seed this team could hold
  const bottomSeed = strictlyAbove + equal + 1; // worst seed within its points block
  if (topSeed > TOP_N) return 'out';            // even best case is below the cut
  if (bottomSeed <= TOP_N) return 'in';         // whole block clears the cut
  return 'tie';                                 // block straddles the 2nd/3rd line
}

/** Best seed (1-based) the team holds on points alone (strictlyAbove + 1). */
function bestSeed(finalPts, code) {
  const mine = finalPts.get(code);
  let strictlyAbove = 0;
  for (const [c, p] of finalPts) {
    if (c === code) continue;
    if (p > mine) strictlyAbove++;
  }
  return strictlyAbove + 1;
}

/**
 * True if this team is STRICTLY ahead of every other team on points (sole 1st).
 * Per spec, a points TIE at the top is NOT "won the group" — only a clear,
 * tiebreak-free lead clinches 1st. So we require every other team to have
 * strictly FEWER points (no equal-on-points rival at the top).
 */
function isSoleTopOnPoints(finalPts, code) {
  const mine = finalPts.get(code);
  for (const [c, p] of finalPts) {
    if (c === code) continue;
    if (p >= mine) return false; // anyone level-or-above blocks a clean 1st
  }
  return true;
}

// ----------------------------------------------------------------------------
// Clinch / eliminate tests over ALL remaining combinations
// ----------------------------------------------------------------------------

/**
 * Evaluate a team across all combinations of the given unplayed matches.
 * Returns flags used to derive status:
 *   clinchedTop2  : 'in' in EVERY combination (never even a tie on the cut).
 *   wonGroup      : top on points in EVERY combination (no one can pass it).
 *   eliminated    : 'in'/'tie' never reachable -> top 2 impossible in all combos.
 *   reachableTie  : at least one combo where it is exactly on the cut-line tie.
 */
function evaluateTeam(basePts, unplayed, code) {
  let clinchedTop2 = true;
  let wonGroup = true;
  let canReachTop2 = false; // 'in' OR 'tie' in at least one combo
  for (const finalPts of enumeratePoints(basePts, unplayed)) {
    const cls = classifyPoints(finalPts, code);
    if (cls !== 'in') clinchedTop2 = false;     // a tie or out breaks the clinch
    if (!isSoleTopOnPoints(finalPts, code)) wonGroup = false;
    if (cls === 'in' || cls === 'tie') canReachTop2 = true;
  }
  return {
    clinchedTop2,
    wonGroup,
    eliminated: !canReachTop2,
  };
}

// ----------------------------------------------------------------------------
// Magic number / elimination threshold (per contender)
// ----------------------------------------------------------------------------

/**
 * For a team, compute over its OWN remaining matches:
 *   magicNumber          : the minimum FINAL points total P such that, IF the
 *                          team finishes on >= P, it is GUARANTEED top 2 on
 *                          points regardless of all OTHER results. null if even
 *                          winning out is not guaranteed-safe (a points tie could
 *                          still intrude at the max) — flagged via tieAtMagic.
 *   tieAtMagic           : true if, at the magicNumber total, the guarantee rests
 *                          on a points tie (could come down to goal difference).
 *   eliminationThreshold : the smallest FINAL points total at which the team can
 *                          STILL reach top 2 (in/tie) under some other-results
 *                          combination. Finishing strictly BELOW this -> out.
 *   maxFinal             : the maximum final points the team can reach (win out).
 *
 * Method: separate the team's OWN remaining matches from the OTHERS'. For each
 * coarse outcome set of the team's own matches we get a candidate final total
 * for the team; for each such total we test, across ALL combinations of the
 * OTHER matches, whether the team is always 'in' (guaranteed-safe), sometimes
 * only 'tie' (tie-dependent), or can be 'out' (not safe).
 */
function magicAndThreshold(basePts, unplayed, code) {
  const own = unplayed.filter((m) => m.home === code || m.away === code);
  const others = unplayed.filter((m) => m.home !== code && m.away !== code);

  // Map: team's own-final-points total -> aggregate safety across other combos.
  // safety: 'safe' (always in), 'tie' (always in-or-tie, at least one tie),
  //         'unsafe' (some combo out).
  const byTotal = new Map(); // total -> { everIn:bool, everTie:bool, everOut:bool }

  for (const ownPts of enumeratePoints(basePts, own)) {
    const myTotal = ownPts.get(code);
    // Now vary the OTHER matches on top of this own-result state.
    let everIn = false, everTie = false, everOut = false;
    for (const finalPts of enumeratePoints(ownPts, others)) {
      const cls = classifyPoints(finalPts, code);
      if (cls === 'in') everIn = true;
      else if (cls === 'tie') everTie = true;
      else everOut = true;
    }
    const agg = byTotal.get(myTotal) || { everIn: false, everTie: false, everOut: false };
    agg.everIn = agg.everIn || everIn;
    agg.everTie = agg.everTie || everTie;
    agg.everOut = agg.everOut || everOut;
    byTotal.set(myTotal, agg);
  }

  const totals = [...byTotal.keys()].sort((a, b) => a - b);
  const maxFinal = totals[totals.length - 1];

  // magicNumber: smallest total whose aggregate is guaranteed-safe (no 'out'
  // across other combos). If that guarantee includes a tie at the cut, flag it.
  let magicNumber = null;
  let tieAtMagic = false;
  for (const t of totals) {
    const a = byTotal.get(t);
    if (!a.everOut) {           // finishing on t (or above, monotone) is safe
      magicNumber = t;
      tieAtMagic = a.everTie && !a.everIn ? true : false;
      // Note: if everIn true and everOut false, it's an unconditional clinch at t;
      // a stray tie among higher-total branches doesn't taint the magic line.
      break;
    }
  }

  // eliminationThreshold: smallest total at which top 2 is still REACHABLE
  // (everIn or everTie under some other combo). Below it -> mathematically out.
  let eliminationThreshold = null;
  for (const t of totals) {
    const a = byTotal.get(t);
    if (a.everIn || a.everTie) {
      eliminationThreshold = t;
      break;
    }
  }

  return { magicNumber, tieAtMagic, eliminationThreshold, maxFinal, ownCount: own.length };
}

// ----------------------------------------------------------------------------
// Next-round identification + triggers
// ----------------------------------------------------------------------------

/**
 * The next chronological round = unplayed matches sharing the EARLIEST date.
 * Tie-break ordering within the round by time (string compare is adequate for
 * the "HH:MM UTC±N" format only loosely; date is the grouping key that matters).
 */
function nextRoundMatches(unplayed) {
  if (unplayed.length === 0) return [];
  const dated = unplayed.filter((m) => m.date);
  const pool = dated.length ? dated : unplayed;
  let earliest = null;
  for (const m of pool) {
    if (earliest === null || (m.date && m.date < earliest)) earliest = m.date;
  }
  const round = pool.filter((m) => m.date === earliest);
  round.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  return round;
}

const ord = (n) => (n === 1 ? '1st' : n === 2 ? '2nd' : n === 3 ? '3rd' : \`\${n}th\`);

/**
 * Re-run the clinch/eliminate test on the POST-NEXT-ROUND state to generate
 * AUTOMATIC, VERIFIED trigger strings: what becomes OFFICIAL after the next
 * round (with later games still to play).
 *
 * Approach: enumerate the coarse outcomes of JUST the next-round matches. For
 * each post-round points state, re-evaluate every team over the STILL-remaining
 * matches. We collect, per team, the SET of next-round coarse outcomes that
 * (a) clinch top 2, (b) clinch 1st, or (c) eliminate it — then describe the
 * trigger in terms of that team's own next-round result when it is the clean
 * driver, else as a combined condition.
 */
function buildTriggers(group, basePts, unplayed, teamMeta) {
  const round = nextRoundMatches(unplayed);
  if (round.length === 0) return { matchKeys: [], date: null, triggers: [] };

  const date = round[0].date || null;
  const roundKeys = new Set(round.map(matchKey));
  const later = unplayed.filter((m) => !roundKeys.has(matchKey(m)));

  // Enumerate next-round coarse outcomes; for each, compute the post-round base
  // points and evaluate every team over the LATER matches.
  const k = round.length;
  const combos = []; // { outcomes:[{key,outcome}], post:Map, perTeam:{code:{clinch,won,elim}} }
  for (let n = 0; n < 3 ** k; n++) {
    const post = new Map(basePts);
    const outcomes = [];
    let x = n;
    for (let i = 0; i < k; i++) {
      const oc = COARSE[x % 3];
      applyOutcome(post, round[i], oc);
      outcomes.push({ match: round[i], outcome: oc });
      x = Math.floor(x / 3);
    }
    const perTeam = {};
    for (const t of group.teams) {
      const ev = evaluateTeam(post, later, t.code);
      perTeam[t.code] = {
        clinch: ev.clinchedTop2,
        won: ev.wonGroup,
        elim: ev.eliminated,
      };
    }
    combos.push({ outcomes, perTeam });
  }

  // Helper: for a given team and a target predicate (clinch/won/elim), find the
  // set of next-round combos satisfying it, and try to express it compactly in
  // terms of that team's OWN next-round result (win/draw/loss), noting any
  // dependency on the other match.
  const teamName = (code) => (teamMeta.get(code)?.name) || code;

  // The team's OWN next-round result (win/draw/loss) within a specific combo.
  // We find the combo entry for the match the team actually plays and translate
  // THAT match's outcome — never apply another match's outcome to it.
  const ownResultInCombo = (code, combo) => {
    for (const o of combo.outcomes) {
      const m = o.match;
      if (m.home === code) return o.outcome === 'home' ? 'win' : o.outcome === 'away' ? 'loss' : 'draw';
      if (m.away === code) return o.outcome === 'away' ? 'win' : o.outcome === 'home' ? 'loss' : 'draw';
    }
    return null; // team does not play this round
  };
  const playsThisRound = (code) => round.some((r) => r.home === code || r.away === code);

  const triggers = [];

  for (const t of group.teams) {
    const code = t.code;
    const meta = teamMeta.get(code);
    // Already settled before the round? Then nothing NEW triggers for it.
    if (meta.status === 'won-group' || meta.status === 'qualified' || meta.status === 'eliminated') {
      continue;
    }

    // CLINCH-1st trigger (lead with the strongest fact).
    addTrigger(triggers, code, 'won', combos, round, ownResultInCombo, playsThisRound, teamName, group);
    // CLINCH top-2 trigger.
    addTrigger(triggers, code, 'clinch', combos, round, ownResultInCombo, playsThisRound, teamName, group);
    // ELIMINATION trigger.
    addTrigger(triggers, code, 'elim', combos, round, ownResultInCombo, playsThisRound, teamName, group);
  }

  if (triggers.length === 0) {
    triggers.push('Nothing is settled until the final round.');
  }

  return { matchKeys: round.map(matchKey), date, triggers };
}

/**
 * Build (and push, if true & compact) a single trigger for one team & predicate.
 * predicate: 'won' (clinch 1st) | 'clinch' (clinch top 2) | 'elim' (eliminated).
 *
 * We look at the subset of next-round combos where the predicate holds. If that
 * subset is exactly characterized by the team's OWN result(s) in the round
 * (independent of the other match), we phrase it cleanly ("X clinch a top-2 place
 * with a win or draw"). If it additionally requires the other match to go a
 * certain way, we phrase the dependency ("X can clinch with a win if Y lose").
 * If it's true only in scattered combos not cleanly describable, we conservatively
 * describe it as conditional on both results, listing the own-result and the
 * required other-match outcome(s). Triggers that never hold are skipped.
 */
function addTrigger(out, code, predicate, combos, round, ownResult, playsThisRound, teamName, group) {
  const holds = (c) => c.perTeam[code][predicate];

  const satisfying = combos.filter(holds);
  if (satisfying.length === 0) return;            // predicate never triggers next round
  if (satisfying.length === combos.length) {
    // Already true in every outcome -> it was already settled (shouldn't reach
    // here for unsettled teams), skip to avoid noise.
    return;
  }

  const name = teamName(code);
  const verb =
    predicate === 'won' ? 'clinch top spot' :
    predicate === 'clinch' ? 'clinch a top-2 place' :
    'be eliminated';

  // Map each combo to (ownResult, otherKey->otherResultLabel).
  const otherMatches = round.filter((r) => r.home !== code && r.away !== code);

  // Group satisfying combos by the team's own result (combo-aware; reads the
  // outcome of the match THIS team plays, not whichever outcome comes last).
  const byOwn = new Map(); // ownResult -> array of combos
  for (const c of satisfying) {
    const key = ownResult(code, c) || 'n/a';
    if (!byOwn.has(key)) byOwn.set(key, []);
    byOwn.get(key).push(c);
  }

  // For each own-result, is the predicate true for ALL other-match outcomes
  // (i.e. own result alone is sufficient)? Count combos per own-result vs how
  // many TOTAL combos share that own-result.
  const totalByOwn = new Map();
  for (const c of combos) {
    const key = ownResult(code, c) || 'n/a';
    totalByOwn.set(key, (totalByOwn.get(key) || 0) + 1);
  }

  const sufficientOwn = []; // own-results that ALONE guarantee the predicate
  const conditionalOwn = []; // own-results that only sometimes trigger (need other match)
  for (const [own, list] of byOwn) {
    if (list.length === totalByOwn.get(own)) sufficientOwn.push(own);
    else conditionalOwn.push(own);
  }

  const resultPhrase = (r) => (r === 'win' ? 'a win' : r === 'draw' ? 'a draw' : 'a loss');
  const order = { win: 0, draw: 1, loss: 2 };

  // Clean case: own result(s) alone are sufficient, nothing conditional.
  if (sufficientOwn.length > 0 && conditionalOwn.length === 0 && playsThisRound(code)) {
    const sorted = sufficientOwn.sort((a, b) => order[a] - order[b]);
    const phrase = sorted.map(resultPhrase).join(' or ');
    out.push(\`\${name} \${verb} with \${phrase}.\`);
    return;
  }

  // Conditional case: own result needs help from the other match. Describe the
  // smallest such combo cleanly when there is exactly one own-result that needs a
  // single other-match condition.
  if (conditionalOwn.length > 0 && otherMatches.length === 1 && playsThisRound(code)) {
    const om = otherMatches[0];
    const describeOther = (outcome) => {
      if (outcome === 'draw') return \`\${teamName(om.home)} and \${teamName(om.away)} draw\`;
      const winner = outcome === 'home' ? om.home : om.away;
      const loser = outcome === 'home' ? om.away : om.home;
      return \`\${teamName(winner)} beat \${teamName(loser)}\`;
    };
    // Take the conditional own-result(s) and, for each, the required other outcomes.
    const clauses = [];
    for (const own of conditionalOwn.sort((a, b) => order[a] - order[b])) {
      const list = byOwn.get(own);
      const otherOutcomes = new Set();
      for (const c of list) {
        for (const o of c.outcomes) {
          if (o.match === om) otherOutcomes.add(o.outcome);
        }
      }
      const others = [...otherOutcomes].map(describeOther).join(' or ');
      clauses.push(\`with \${resultPhrase(own)} if \${others}\`);
    }
    // Prepend any unconditional own-results.
    let lead = '';
    if (sufficientOwn.length > 0) {
      const sorted = sufficientOwn.sort((a, b) => order[a] - order[b]);
      lead = \`with \${sorted.map(resultPhrase).join(' or ')}\`;
    }
    const body = [lead, ...clauses].filter(Boolean).join(', or ');
    out.push(\`\${name} can \${verb} \${body}.\`);
    return;
  }

  // Team does NOT play this round (its fate turns purely on others' results), or
  // a shape we won't try to pretty-print. Describe it as conditional on the round.
  if (!playsThisRound(code)) {
    // Characterize the satisfying combos by the other matches' outcomes.
    const clauses = satisfying.map((c) =>
      c.outcomes
        .map((o) => {
          if (o.outcome === 'draw') return \`\${teamName(o.match.home)}-\${teamName(o.match.away)} draw\`;
          const w = o.outcome === 'home' ? o.match.home : o.match.away;
          const l = o.outcome === 'home' ? o.match.away : o.match.home;
          return \`\${teamName(w)} beat \${teamName(l)}\`;
        })
        .join(' & ')
    );
    // Only emit if compact (<=2 clauses) to avoid noise.
    if (clauses.length <= 2) {
      out.push(\`\${name} \${verb} if \${clauses.join(' OR ')}.\`);
    }
    return;
  }
  // Fallback: mixed/complex own+other shape we won't enumerate verbosely. Emit a
  // conservative conditional headline so the fact isn't lost.
  out.push(\`\${name} can \${verb} next round (result-dependent).\`);
}

// ----------------------------------------------------------------------------
// needLine / statusLine phrasing
// ----------------------------------------------------------------------------

function buildStatusLine(status, mc) {
  switch (status) {
    case 'won-group': return mc ? 'Won the group' : 'Clinched 1st';
    case 'qualified': {
      if (!mc) return 'Through to the R32';
      // Through on points; note any live chance to win the group.
      if ((mc.pWinGroup ?? 0) > 0.005) {
        return \`Qualified for the Round of 32 — \${pctMC(mc.pWinGroup)} to win the group\`;
      }
      return 'Qualified for the Round of 32';
    }
    case 'eliminated': return 'Eliminated';
    default: {
      // Contention: drive a realistic headline from the Monte-Carlo advance odds,
      // never claiming top-2 when it is realistically impossible.
      if (mc) {
        const pAdv = mc.pAdvance ?? 0;
        const pTop2 = (mc.pGroup1 ?? 0) + (mc.pGroup2 ?? 0);
        if (pAdv >= 0.99) return \`Virtually through — \${pctMC(pAdv)} to qualify\`;
        if (pTop2 < 0.01) return \`Realistically fighting for 3rd — \${pctMC(pAdv)} to advance\`;
        if (pAdv >= 0.85) return \`In good shape — \${pctMC(pAdv)} to qualify\`;
        return \`In contention — \${pctMC(pAdv)} to qualify\`;
      }
      return 'Still alive';
    }
  }
}

/** Compact percent formatter, matching the UI / scenario-summary. */
function pctMC(p) {
  if (p == null) return '';
  if (p >= 0.995) return '99%';
  if (p > 0 && p <= 0.005) return '<1%';
  const v = p * 100;
  return (v >= 10 ? Math.round(v) : Math.round(v * 10) / 10) + '%';
}

/**
 * Express the MINIMAL set of own remaining results that GUARANTEES a final point
 * total of at least \`delta\` ABOVE the team's current total, over \`remaining\`
 * games. Returns a result phrase ("two wins", "a win and a draw", "two draws",
 * "a single draw", "at least one win") or null if not cleanly expressible.
 *
 * This is result language, never "needs N points FROM its last games".
 */
function resultsForDelta(delta, remaining) {
  if (delta <= 0) return null; // already safe
  if (remaining === 1) {
    if (delta > 3) return null;            // unreachable in one game
    if (delta === 3) return 'a win';        // only a win reaches 3
    if (delta === 2) return 'a win';        // a draw (1) falls short of 2
    if (delta === 1) return 'a draw (or better)';
    return null;
  }
  if (remaining === 2) {
    if (delta > 6) return null;
    if (delta === 6) return 'two wins';
    if (delta >= 4) return 'a win and a draw';   // 4 needs ≥ W+D; 5 same minimal guarantee
    if (delta === 3) return 'at least one win';   // a win (3) or fall short with draws
    if (delta === 2) return 'two draws (or better)';
    if (delta === 1) return 'a single draw (or better)';
    return null;
  }
  return null;
}

/**
 * The minimal own result that AVOIDS elimination — i.e. reaching the
 * elimination threshold. Expressed as the negative: what leaves them out.
 * Returns a phrase like "out if winless" / "out without a win" / null.
 */
function eliminationResultPhrase(deltaToFloor, remaining) {
  if (deltaToFloor <= 0) return null; // floor already secured -> no risk of dropping
  if (remaining === 2) {
    if (deltaToFloor === 3) return 'out without a win';        // need ≥3: winless => out
    if (deltaToFloor === 6) return 'out unless they win both'; // need both wins to survive
    if (deltaToFloor === 2) return 'out if they take fewer than two points';
    if (deltaToFloor === 1) return 'out if winless';
  }
  if (remaining === 1) {
    if (deltaToFloor === 3) return 'out with anything less than a win';
    if (deltaToFloor >= 1) return 'out with a loss';
  }
  return null;
}

function buildNeedLine(status, mt, remaining, curPts, mc) {
  if (status === 'won-group') return 'Already won the group.';
  if (status === 'qualified') return 'Already through to the knockout round.';
  if (status === 'eliminated') return 'Cannot finish in the top two; eliminated.';

  const overall = mc && mc.pAdvance != null ? \` — \${pctMC(mc.pAdvance)} to advance overall\` : '';

  // --- safe (magic) clause, result-based ---------------------------------
  let safeClause;
  if (mt.magicNumber != null) {
    const delta = mt.magicNumber - curPts;
    const resultPhrase = resultsForDelta(delta, remaining);
    const tieFlag = mt.tieAtMagic ? ' (could come down to goal difference)' : '';
    if (resultPhrase) {
      // "Two draws (or better) guarantees advancing" / "Needs two wins to be safe".
      if (/\\bor better\\b/.test(resultPhrase)) {
        safeClause = \`\${cap(resultPhrase)} guarantees a top-2 place\${tieFlag}\`;
      } else {
        safeClause = \`Needs \${resultPhrase} to be safe\${tieFlag}\`;
      }
    } else {
      // Fallback: absolute finishing total, never "from its last games".
      safeClause = \`Needs to finish on \${mt.magicNumber}+ points to be safe\${tieFlag}\`;
    }
  } else {
    safeClause = 'Can reach a top-2 place but no points total guarantees it (could come down to goal difference)';
  }

  // --- elimination floor clause ------------------------------------------
  // Only meaningful if the team can still finish BELOW the floor; if curPts is
  // already >= the threshold the floor cannot bite, so we omit it (the bug fix).
  let floorClause = '';

    ROUNDS.forEach(function(rd,ci){
      if(rd[0]==='R32') return;
      (BRACKET.rounds[rd[0]]||[]).forEach(function(m){
        [m.home,m.away].forEach(function(side){
          if(side.type!=='winnerOf') return;
          var fy=lay.cy[side.match]; var ty=lay.cy[m.match];
          if(fy==null||ty==null) return;
          var x1=colX(ci-1)+COL_W, x2=colX(ci), xm=(x1+x2)/2;
          var y1=TITLE_H+fy, y2=TITLE_H+ty;
          var p=svgEl('path',{ d:'M'+x1+','+y1+' H'+xm+' V'+y2+' H'+x2,
            fill:'none', stroke:'#2a2f3a', 'stroke-width':'1.5' });
          svg.appendChild(p);
        });
      });
    });

    // match boxes
    ROUNDS.forEach(function(rd,ci){
      (BRACKET.rounds[rd[0]]||[]).forEach(function(m){
        var cyv=lay.cy[m.match]; if(cyv==null) return;
        var x=colX(ci), top=TITLE_H+cyv-MATCH_H/2;
        svg.appendChild(matchGroup(rd[0], m, x, top, slotInfo[m.match]||{}));
      });
    });

    // 3rd-place playoff (M103 = losers of the two semis): drawn small and
    // unobtrusively below the Final column so it never distorts the main tree.
    var tp=(BRACKET.rounds.ThirdPlace||[])[0];
    if(tp){
      var finalCi=ROUNDS.length-1;
      var tx=colX(finalCi);
      var ty=TITLE_H + lay.totalH - PAD_Y - MATCH_H; // just above the bottom pad
      svg.appendChild(svgText(tx+Math.round(4*_PS), ty-Math.round(15*_PS), '3rd place',
        { fill:'#9aa3b2','font-size':String(FS(10)),'font-weight':'700' }));
      svg.appendChild(thirdPlaceGroup(tp, tx, ty, slotInfo[tp.match]||{}));
    }

    return svg;
  }

  function matchGroup(round, m, x, top, info){
    var g=svgEl('g',{});
    // header (match number) above the box
    g.appendChild(svgText(x+Math.round(4*_PS), top-Math.round(3*_PS), 'M'+m.match, { fill:'#6b7280','font-size':String(FS(9)) }));
    // outer box
    g.appendChild(svgEl('rect',{ x:x, y:top, width:COL_W, height:MATCH_H, rx:Math.round(6*_PS),
      fill:'#1d212b', stroke:'#2a2f3a','stroke-width':String(_PS) }));
    // divider between the two slots
    g.appendChild(svgEl('line',{ x1:x, y1:top+SLOT_H, x2:x+COL_W, y2:top+SLOT_H,
      stroke:'#2a2f3a','stroke-width':'1' }));
    g.appendChild(slotGroup(round, m, 'home', info.home||{code:null,p:0}, x, top));
    g.appendChild(slotGroup(round, m, 'away', info.away||{code:null,p:0}, x, top+SLOT_H));
    return g;
  }

  // 3rd-place playoff box — same structure as a regular match box but visually
  // muted (dashed border) so it reads as an aside, not part of the main tree.
  function thirdPlaceGroup(m, x, top, info){
    var g=svgEl('g',{});
    g.appendChild(svgText(x+Math.round(4*_PS), top-Math.round(3*_PS), 'M'+m.match, { fill:'#6b7280','font-size':String(FS(9)) }));
    g.appendChild(svgEl('rect',{ x:x, y:top, width:COL_W, height:MATCH_H, rx:Math.round(6*_PS),
      fill:'#15181f', stroke:'#2a2f3a','stroke-width':String(_PS),'stroke-dasharray':Math.round(4*_PS)+' '+Math.round(3*_PS) }));
    g.appendChild(svgEl('line',{ x1:x, y1:top+SLOT_H, x2:x+COL_W, y2:top+SLOT_H,
      stroke:'#2a2f3a','stroke-width':'1' }));
    g.appendChild(slotGroup('ThirdPlace', m, 'home', info.home||{code:null,p:0}, x, top));
    g.appendChild(slotGroup('ThirdPlace', m, 'away', info.away||{code:null,p:0}, x, top+SLOT_H));
    return g;
  }

  // R32-ONLY seed/group designation built from the bracket.json slot definition.
  // winner G -> "G1"; runnerup G -> "G2"; third [list] -> "3rd a/b/e/f/i" with the
  // single candidate letter the projected occupant comes from highlighted.
  // Returns 0 for non-R32 rounds or unrecognized slot types.
  // Renders into g starting at chipX; returns the x-offset (px) the code/name
  // text should start at (so a third-place label can push them further right).
  function renderSeedLabel(g, round, slotDef, occupantCode, chipX, midY){
    if(round!=='R32' || !slotDef) return 0;
    var fs=FS(9.5);
    if(slotDef.type==='winner' || slotDef.type==='runnerup'){
      var lab=(slotDef.group||'?')+(slotDef.type==='winner'?'1':'2');
      g.appendChild(svgText(chipX, midY, lab,
        { fill:'#6b7280','font-size':String(fs),'font-weight':'700' }));
      // fixed-width reservation for a 2-char chip
      return Math.round(20*_PS);
    }
    if(slotDef.type==='third' && Array.isArray(slotDef.from)){
      var occLetter = occupantCode ? (groupLetterByCode[occupantCode]||null) : null;
      var t=svgEl('text',{ x:chipX, y:midY, 'font-size':String(fs) });
      // "3rd " prefix
      var pre=svgEl('tspan',{ fill:'#6b7280' }); pre.textContent='3rd '; t.appendChild(pre);
      slotDef.from.forEach(function(L,i){
        if(i>0){ var sep=svgEl('tspan',{ fill:'#3a3f4a' }); sep.textContent='/'; t.appendChild(sep); }
        var hot = occLetter && L.toUpperCase()===occLetter;
        var ts=svgEl('tspan',{ fill: hot?'#4ea1ff':'#6b7280', 'font-weight': hot?'700':'400' });
        ts.textContent=L.toLowerCase(); t.appendChild(ts);
      });
      g.appendChild(t);
      // "3rd " + N letters + (N-1) separators, ~ per-char width
      var chars = 4 + slotDef.from.length + (slotDef.from.length-1);
      return Math.round((chars*5.3+6)*_PS);
    }
    return 0;
  }

  function slotGroup(round, m, side, si, x, sy){
    var g=svgEl('g',{ 'class':'slot-hit' });
    var code=si.code;
    var midY=sy+SLOT_H/2+Math.round(4*_PS);
    var pad=Math.round(7*_PS);
    // transparent hit/hover bg
    g.appendChild(svgEl('rect',{ 'class':'slot-bg', x:x, y:sy, width:COL_W, height:SLOT_H,
      fill:'transparent' }));
    // pick highlight (My Picks: this side is the chosen winner)
    if(state.mode==='picks' && si.picked){
      g.appendChild(svgEl('rect',{ x:x+1, y:sy+1, width:COL_W-2, height:SLOT_H-2, rx:Math.round(4*_PS),
        fill:'none', stroke:'#1f6b3a','stroke-width':String(1.5*_PS) }));
    }
    // accent bar
    g.appendChild(svgEl('rect',{ x:x+Math.round(3*_PS), y:sy+Math.round(4*_PS), width:Math.round(3*_PS), height:SLOT_H-Math.round(8*_PS), rx:1.5*_PS,
      fill: code? accentFor(code) : '#6b7280' }));

    // R32-ONLY: seed/group designation chip BEFORE the team code.
    var seedW=renderSeedLabel(g, round, (round==='R32'? m[side] : null), code, x+Math.round(11*_PS), midY);
    var codeX=x+Math.round(13*_PS)+seedW, nameX=x+Math.round(44*_PS)+seedW;

    // CLINCHED (projected, p≈100%): pop the team (bold + accent + glow) and DROP %.
    var clinched = state.mode==='projected' && code && si.p>=0.9995;

    // code
    if(clinched){
      var glow=svgText(codeX, midY, code,
        { fill:'#4ea1ff','font-size':String(FS(12.5)),'font-weight':'800',
          stroke:'#4ea1ff','stroke-width':String(0.6*_PS),'opacity':'0.35' });
      g.appendChild(glow);
      g.appendChild(svgText(codeX, midY, code,
        { fill:'#7fc0ff','font-size':String(FS(12.5)),'font-weight':'800' }));
    } else {
      g.appendChild(svgText(codeX, midY, code||'—',
        { fill: code? '#e7eaf0':'#6b7280', 'font-size':String(FS(12)),'font-weight':'700' }));
    }
    // name (clipped via truncation)
    var nm=code?(nameByCode[code]||''):'TBD';
    var nameMaxW=COL_W-(nameX-x)-(clinched?Math.round(10*_PS):Math.round(40*_PS));
    g.appendChild(svgText(nameX, midY, truncName(nm, nameMaxW),
      { fill: clinched?'#cfe6ff':'#9aa3b2','font-size':String(FS(10)),'font-weight': clinched?'600':'400' }));
    // probability (projected) at right — clinched slots show no %.
    if(state.mode==='projected' && code && !clinched){
      g.appendChild(svgText(x+COL_W-pad, midY, pct(si.p),
        { fill:'#4ea1ff','font-size':String(FS(11)),'text-anchor':'end' }));
    }
    // interaction
    if(state.mode==='projected'){
      g.addEventListener('click', function(ev){
        if(si.cands && si.cands.length) showCandidates(ev, si.cands, m.match, side);
      });
    } else {
      g.addEventListener('click', function(){ if(code){ state.picks[m.match]=code; render(); } });
      if(code){ var ttl=svgEl('title',{}); ttl.textContent='Click to advance '+(nameByCode[code]||code); g.appendChild(ttl); }
    }
    return g;
  }

  // crude SVG text truncation by estimated glyph width (~5.6px @ 10px font)
  function truncName(s, maxW){
    if(!s) return '';
    var per=5.6*_PS, max=Math.max(2, Math.floor(maxW/per));
    if(s.length<=max) return s;
    return s.slice(0, Math.max(1,max-1))+'…';
  }

  // ================= EXPORT =================
  // The live bracket <svg> is the single source of truth, so all three exports
  // serialize/rasterize/print exactly the current on-screen view (mode + picks).
  var _lastSlotInfo=null;

  function liveSVG(){ return document.querySelector('.bracket-svg'); }

  // Serialize the live SVG into a standalone document string. Geometry + colors
  // are inline attributes already; we only need to ensure width/height + font.
  function serializeSVG(){
    var src=liveSVG(); if(!src) return null;
    var clone=src.cloneNode(true);
    clone.setAttribute('xmlns', SVG_NS);
    clone.setAttribute('font-family', FONT);
    // make sure explicit pixel width/height are present for standalone renderers
    var vb=(src.getAttribute('viewBox')||'').split(/\s+/);
    if(vb.length===4){ clone.setAttribute('width', vb[2]); clone.setAttribute('height', vb[3]); }
    var xml=new XMLSerializer().serializeToString(clone);
    return '<?xml version="1.0" encoding="UTF-8"?>\n'+xml;
  }

  function downloadBlob(blob, filename){
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a'); a.href=url; a.download=filename;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);
  }

  function exportSVG(){
    var xml=serializeSVG(); if(!xml){ alert('Bracket not ready yet.'); return; }
    downloadBlob(new Blob([xml],{type:'image/svg+xml;charset=utf-8'}), 'wc2026-bracket.svg');
  }

  function exportPNG(){
    var src=liveSVG(); if(!src){ alert('Bracket not ready yet.'); return; }
    var vb=(src.getAttribute('viewBox')||'').split(/\s+/);
    var w=+vb[2]||src.clientWidth, h=+vb[3]||src.clientHeight;
    var scale=2; // device scale -> crisp raster
    var xml=serializeSVG();
    var img=new Image();
    var svgBlob=new Blob([xml],{type:'image/svg+xml;charset=utf-8'});
    var url=URL.createObjectURL(svgBlob);
    img.onload=function(){
      var canvas=document.createElement('canvas');
      canvas.width=Math.round(w*scale); canvas.height=Math.round(h*scale);
      var ctx=canvas.getContext('2d');
      ctx.fillStyle='#0f1115'; ctx.fillRect(0,0,canvas.width,canvas.height); // solid bg
      ctx.setTransform(scale,0,0,scale,0,0);
      ctx.drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      canvas.toBlob(function(blob){ if(blob) downloadBlob(blob,'wc2026-bracket.png'); }, 'image/png');
    };
    img.onerror=function(){ URL.revokeObjectURL(url); alert('PNG export failed to rasterize the SVG.'); };
    img.src=url;
  }

  function exportPDF(){
    // The print stylesheet (@media print) lays the bracket out un-scrolled in
    // landscape; the browser's print dialog offers "Save as PDF".
    window.print();
  }

  function exportBar(){
    var bar=document.createElement('div'); bar.className='export-bar';
    var lbl=document.createElement('span'); lbl.className='lbl'; lbl.textContent='Export:';
    bar.appendChild(lbl);
    [['Download SVG',exportSVG],['Download PNG',exportPNG],['Save as PDF',exportPDF]].forEach(function(b){
      var btn=document.createElement('button'); btn.className='btn'; btn.textContent=b[0];
      btn.onclick=b[1]; bar.appendChild(btn);
    });
    return bar;
  }

  function showCandidates(ev, cands, matchNo, side){
    closePop();
    var pop=document.createElement('div'); pop.className='pop';
    pop.innerHTML='<span class="x">&times;</span><h4>M'+matchNo+' &middot; '+side+' slot &mdash; top candidates</h4>';
    cands.slice(0,5).forEach(function(c){
      if(!c||!c.code) return;
      var row=document.createElement('div'); row.className='cand';
      row.innerHTML='<span class="code" style="color:'+accentFor(c.code)+'">'+c.code+'</span>'+
        '<span class="nm">'+esc(nameByCode[c.code]||'')+'</span>'+

    });

  function outsidePop(e){ var p=document.querySelector('.pop'); if(p&&!p.contains(e.target)) closePop(); }
  function closePop(){ var p=document.querySelector('.pop'); if(p) p.remove(); }

  // ---------------- GROUP STAGE ----------------
  function renderGroups(){
    var sec=document.createElement('div'); sec.className='section active';
    if(state.mode==='picks'){
      var note=document.createElement('div'); note.className='callout';
      note.innerHTML='Edit any <b>unplayed</b> match score below (steppers) to recompute standings, the 3rd-place table, the Annex&nbsp;C allocation, and the bracket live. You can also <b>add a not-yet-in-feed result</b> by hand at the bottom of a group.';
      sec.appendChild(note);

  function groupCard(g){
    var card=document.createElement('div'); card.className='gcard';
    var st=computeGroupStanding(g);
    var h=document.createElement('h3'); h.textContent=g.name; card.appendChild(h);
    var t=document.createElement('table');
    t.innerHTML='<thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead>';
    var tb=document.createElement('tbody');

      var tr=document.createElement('tr'); if(s.rank<=2) tr.className='q'+s.rank;
      var lots=s.tiedByLots?' <span class="lots" title="Level on all criteria incl. fair-play — separated only by drawing of lots (a real coin-flip)">⚖</span>':'';
      tr.innerHTML='<td>'+s.rank+'</td>'+
        '<td><span style="color:'+accentFor(s.code)+';font-weight:700">'+s.code+'</span> <span class="muted tiny">'+esc(s.name)+'</span>'+lots+'</td>'+
        '<td>'+s.played+'</td><td>'+s.won+'</td><td>'+s.drawn+'</td><td>'+s.lost+'</td>'+
        '<td>'+s.gf+'</td><td>'+s.ga+'</td><td>'+(s.gd>0?'+':'')+s.gd+'</td><td><b>'+s.points+'</b></td>';
      tb.appendChild(tr);
    });
    t.appendChild(tb); card.appendChild(t);

    if(state.mode==='picks'){
      // editors for each match

  function matchEditor(g,m){
    var row=document.createElement('div'); row.className='editor'+(m.played?' played':'');
    var hg=(m.homeGoals==null?0:m.homeGoals), ag=(m.awayGoals==null?0:m.awayGoals);
    function stepper(val, onCh){
      var s=document.createElement('span'); s.className='stepper';
      var dec=document.createElement('button'); dec.textContent='−';
      var inp=document.createElement('input'); inp.type='number'; inp.min='0'; inp.value=val;
      var inc=document.createElement('button'); inc.textContent='+';
      dec.onclick=function(){ var v=Math.max(0,(+inp.value||0)-1); inp.value=v; onCh(v); };
      inc.onclick=function(){ var v=Math.max(0,(+inp.value||0)+1); inp.value=v; onCh(v); };
      inp.onchange=function(){ var v=Math.max(0,Math.floor(+inp.value||0)); inp.value=v; onCh(v); };
      s.appendChild(dec); s.appendChild(inp); s.appendChild(inc); return s;
    }
    var lblH=document.createElement('span'); lblH.className='lbl'; lblH.style.color=accentFor(m.home); lblH.textContent=m.home;
    var lblA=document.createElement('span'); lblA.className='lbl'; lblA.style.color=accentFor(m.away); lblA.textContent=m.away;
    var newH=hg, newA=ag;
    function commit(){ m.homeGoals=newH; m.awayGoals=newA; m.played=true; state.mc=null; render(); }
    row.appendChild(lblH);
    row.appendChild(stepper(hg,function(v){newH=v;commit();}));
    var vs=document.createElement('span'); vs.className='vs'; vs.textContent=':'; row.appendChild(vs);
    row.appendChild(stepper(ag,function(v){newA=v;commit();}));
    row.appendChild(lblA);
    var tag=document.createElement('span'); tag.className='tag';
    tag.textContent = m.played? (m.manual?'manual':'played') : 'projected→edit';
    row.appendChild(tag);
    if(m.played){
      var clr=document.createElement('button'); clr.className='btn tiny'; clr.style.padding='2px 6px'; clr.textContent='clear';
      clr.onclick=function(){ m.played=false; m.homeGoals=null; m.awayGoals=null; m.manual=false; state.mc=null; render(); };
      row.appendChild(clr);
    }
    return row;
  }

  function manualAdd(g){

  function thirdsPanel(gs){
