    rank: idx + 1,
    qualifies: idx < 8,
  }));
}

// ----------------------------------------------------------------------------
// Scenario grid
// ----------------------------------------------------------------------------

const matchKey = (m) => \`\${m.home}-\${m.away}\`;

/** All scorelines 0-0 .. maxGoals-maxGoals, inclusive. */
function* scorelines(maxGoals) {
  for (let h = 0; h <= maxGoals; h++) {
    for (let a = 0; a <= maxGoals; a++) {
      yield [h, a];
    }
  }
}

/**
 * Classify a scoreline for the team identified by \`code\` in a given match.
 * @returns {{result:'win'|'draw'|'loss', margin:number}} margin is the signed
 *          goal margin from the team's perspective (positive = ahead).
 */
function outcomeFor(code, match, hg, ag) {
  if (match.home === code) {
    const margin = hg - ag;
    return { result: margin > 0 ? 'win' : margin < 0 ? 'loss' : 'draw', margin };
  }
  // team is the away side
  const margin = ag - hg;
  return { result: margin > 0 ? 'win' : margin < 0 ? 'loss' : 'draw', margin };
}

/**
 * scenarioGrid — enumerate every scoreline combination for the unplayed
 * match(es) named by \`upcomingMatchKeys\`, holding played matches fixed, and
 * collapse the resulting WITHIN-GROUP ranks into a per-team summary.
 *
 * IMPORTANT: This asserts ONLY within-group rank (1/2/3/4). It says nothing
 * about 3rd-place qualification or knockout opponents (cross-group concerns).
 *
 * @param {object} group
 * @param {string[]} upcomingMatchKeys  1 or 2 keys \`\${home}-\${away}\` of unplayed matches
 * @param {number} [maxGoals=6]
 * @returns {object} {
 *   teams: { [code]: teamSummary },
 *   matches: [matchKey,...],          // the enumerated matches, in order
 *   describe(code): string,           // English digest for a team
 * }
 *
 * teamSummary shape:
 *   {
 *     code, name,
 *     ranks: number[],                // distinct ranks achievable (sorted)
 *     // single-match case:
 *     byOutcome: { win:{ranks,marginRules}, draw:{rank|ranks}, loss:{ranks,marginRules} }
 *     // two-match case:
 *     joint: [ { outcomes:[{key,result,margin?}...], rank } ... ]  // raw-ish, collapsed by rank
 *     needs: { rankN: <condition tree> }   // "what they need" digest per achievable rank
 *   }
 */
function scenarioGrid(group, upcomingMatchKeys, maxGoals = 6) {
  if (!Array.isArray(upcomingMatchKeys) || upcomingMatchKeys.length < 1 || upcomingMatchKeys.length > 2) {
    throw new Error('upcomingMatchKeys must contain 1 or 2 match keys');
  }

  // Resolve the upcoming match objects (must exist and be unplayed).
  const upcoming = upcomingMatchKeys.map((key) => {
    const m = group.matches.find((mm) => matchKey(mm) === key);
    if (!m) throw new Error(\`upcoming match not found: \${key}\`);
    return m;
  });

  const playedMatches = group.matches.filter((m) => m.played);
  const teams = group.teams;

  // Enumerate. For each combination we build a synthetic match list = played +
  // the upcoming matches with assigned scores, compute the standing, and read
  // off each team's rank.
  //
  // We record, per combination, the full scoreline tuple and the resulting rank
  // for every team.
  const combos = []; // { scores:[[hg,ag],...], rankByCode:{code:rank} }

  const enumerate = (idx, acc) => {
    if (idx === upcoming.length) {
      const synthetic = playedMatches.concat(
        upcoming.map((m, k) => ({
          home: m.home,
          away: m.away,
          homeGoals: acc[k][0],
          awayGoals: acc[k][1],
          played: true,
        }))
      );
      const standing = computeGroupStanding({ ...group, matches: synthetic });
      const rankByCode = {};
      for (const t of standing) rankByCode[t.code] = t.rank;
      combos.push({ scores: acc.map((s) => s.slice()), rankByCode });
      return;
    }
    for (const sl of scorelines(maxGoals)) {
      acc.push(sl);
      enumerate(idx + 1, acc);
      acc.pop();
    }
  };
  enumerate(0, []);

  // Build per-team summaries.
  const teamSummaries = {};
  for (const team of teams) {
    teamSummaries[team.code] =
      upcoming.length === 1
        ? summarizeSingle(team, upcoming[0], combos, maxGoals)
        : summarizeDouble(team, upcoming, combos);
  }

  return {
    matches: upcoming.map(matchKey),
    teams: teamSummaries,
    describe(code) {
      const s = teamSummaries[code];
      if (!s) throw new Error(\`unknown team: \${code}\`);
      return s.description;
    },
  };
}

// --- single upcoming match -------------------------------------------------

/**
 * Collapse the grid for the SINGLE-match case for one team.
 *
 * For a team PLAYING in the match, outcome is win/draw/loss and within each
 * outcome rank can vary only by margin -> we collapse to margin thresholds.
 * For a team NOT playing, its rank can still vary with the scoreline (it affects
 * GD/GF of the two participants), so we map the participants' margin -> rank.
 */
function summarizeSingle(team, match, combos, maxGoals) {
  const code = team.code;
  const isPlaying = match.home === code || match.away === code;

  if (isPlaying) {
    // Group combos by outcome, then within outcome by team-margin -> rank.
    const buckets = { win: new Map(), draw: new Map(), loss: new Map() };
    for (const c of combos) {
      const [hg, ag] = c.scores[0];
      const { result, margin } = outcomeFor(code, match, hg, ag);
      const m = buckets[result];
      const rank = c.rankByCode[code];
      if (!m.has(margin)) m.set(margin, new Set());
      m.get(margin).add(rank);
    }

    const byOutcome = {};
    for (const result of ['win', 'draw', 'loss']) {
      byOutcome[result] = collapseMarginMap(buckets[result], result);
    }

    const ranks = collectRanks(combos, code);
    const description = describeSinglePlaying(byOutcome, maxGoals);
    return { code, name: team.name, isPlaying: true, ranks, byOutcome, description };
  }

  // Non-playing team: rank depends on the participants' result/margin.
  // Map (participantMargin from home perspective) -> set of ranks.
  const map = new Map();
  for (const c of combos) {
    const [hg, ag] = c.scores[0];
    const homeMargin = hg - ag; // signed, home perspective
    const rank = c.rankByCode[code];
    const keyM = homeMargin;
    if (!map.has(keyM)) map.set(keyM, new Set());
    map.get(keyM).add(rank);
  }
  const ranks = collectRanks(combos, code);
  // Collapse contiguous home-margins sharing the same rank-set into bands.
  const sortedM = [...map.entries()].sort((a, b) => a[0] - b[0]);
  const sig = (set) => [...set].sort((a, b) => a - b).join(',');
  const byMargin = [];
  let bStart = sortedM[0][0];
  let bSig = sig(sortedM[0][1]);
  let bRanks = [...sortedM[0][1]].sort((a, b) => a - b);
  let bPrev = sortedM[0][0];
  const flushBand = (end) => byMargin.push({ homeMarginLo: bStart, homeMarginHi: end, ranks: bRanks });
  for (let i = 1; i < sortedM.length; i++) {
    const [m, set] = sortedM[i];
    if (sig(set) === bSig && m === bPrev + 1) {
      bPrev = m;
    } else {
      flushBand(bPrev);
      bStart = m; bSig = sig(set); bRanks = [...set].sort((a, b) => a - b); bPrev = m;
    }
  }
  flushBand(bPrev);
  const description = describeNonPlaying(team, match, ranks, byMargin, maxGoals);
  return { code, name: team.name, isPlaying: false, ranks, byMargin, description };
}

/**
 * Given a Map<margin,Set<rank>> for a single outcome, collapse to clean rules.
 * In the common deterministic case each margin yields exactly one rank, so we
 * collapse contiguous margins that share a rank into threshold "runs".
 *
 * Margins are signed from the team's perspective: wins are positive (+1..+max),
 * losses negative (-1..-max), a draw is exactly 0. Each rule records \`marginLo\`
 * <= \`marginHi\` (the contiguous signed-margin span) and either a single \`rank\`
 * (deterministic run) or a \`ranks\` array (margin alone didn't decide — rare,
 * happens only when other-table lots intrude).
 */
function collapseMarginMap(marginMap, result) {
  if (marginMap.size === 0) return { possible: false, rules: [], ranks: [] };

  const entries = [...marginMap.entries()].sort((a, b) => a[0] - b[0]);
  const allRanks = new Set();
  for (const [, set] of entries) for (const r of set) allRanks.add(r);

  // Merge contiguous margins that share the SAME rank-set (singleton or tied)
  // into one threshold rule. A rule with one rank also exposes \`.rank\` for
  // convenience; a tied rule exposes only \`.ranks\`.
  const sig = (set) => [...set].sort((a, b) => a - b).join(',');
  const rules = [];
  let runStart = entries[0][0];
  let runSig = sig(entries[0][1]);
  let runRanks = [...entries[0][1]].sort((a, b) => a - b);
  let prevMargin = entries[0][0];
  const flush = (endMargin) => {
    const rule = { marginLo: runStart, marginHi: endMargin, ranks: runRanks };
    if (runRanks.length === 1) rule.rank = runRanks[0];
    rules.push(rule);
  };
  for (let i = 1; i < entries.length; i++) {
    const [m, set] = entries[i];
    if (sig(set) === runSig && m === prevMargin + 1) {
      prevMargin = m;
    } else {
      flush(prevMargin);
      runStart = m;
      runSig = sig(set);
      runRanks = [...set].sort((a, b) => a - b);
      prevMargin = m;
    }
  }
  flush(prevMargin);

  return {
    possible: true,
    ranks: [...allRanks].sort((a, b) => a - b),
    rules,
  };
}

function collectRanks(combos, code) {
  const s = new Set();
  for (const c of combos) s.add(c.rankByCode[code]);
  return [...s].sort((a, b) => a - b);
}

const ordinal = (n) =>
  n === 1 ? '1st' : n === 2 ? '2nd' : n === 3 ? '3rd' : \`\${n}th\`;

const rankWord = (rank) => ordinal(rank);

/**
 * English digest for a team playing in a single decisive match, e.g.
 * "1st with any win; 2nd on a draw; 3rd if they lose by 1; 4th if they lose by 2+".
 */
function describeSinglePlaying(byOutcome, maxGoals) {
  const parts = [];
  if (byOutcome.win.possible) parts.push(...phrasesForOutcome(byOutcome.win, 'win', maxGoals));
  if (byOutcome.draw.possible) parts.push(...phrasesForOutcome(byOutcome.draw, 'draw', maxGoals));
  if (byOutcome.loss.possible) parts.push(...phrasesForOutcome(byOutcome.loss, 'loss', maxGoals));
  return parts.join('; ');
}

/**
 * Turn a collapsed outcome (win/draw/loss) into English phrases.
 *  - draw: a single margin (0); usually one rank, multiple only under lots.
 *  - win/loss: margin-threshold rules, ordered best-rank-first, with the rule
 *    that reaches the enumeration edge (|margin| === maxGoals) rendered as "N+".
 */
function phrasesForOutcome(outcome, result, maxGoals) {
  if (result === 'draw') {
    const ranks = outcome.ranks;
    if (ranks.length === 1) return [\`\${rankWord(ranks[0])} on a draw\`];
    return [\`\${ranks.map(rankWord).join(' or ')} on a draw (depends on the other result)\`];
  }

  const rules = outcome.rules;

  // Constant rank across the whole outcome -> "Nth with any win/loss".
  const allDeterministic = rules.every((r) => r.rank != null);
  const uniqueRanks = new Set(rules.flatMap((r) => (r.rank != null ? [r.rank] : r.ranks)));
  if (allDeterministic && uniqueRanks.size === 1) {
    const rank = [...uniqueRanks][0];
    return [\`\${rankWord(rank)} with any \${result}\`];
  }

  // Order rules by goal-margin magnitude ascending (smallest margin first); this
  // reads naturally as the result gets more lopsided.
  const ordered = [...rules].sort((a, b) => Math.abs(a.marginLo) - Math.abs(b.marginLo));
  const verb = result === 'win' ? 'win' : 'lose';

  return ordered.map((r) => {
    const loMag = Math.abs(r.marginLo);
    const hiMag = Math.abs(r.marginHi);
    const lo = Math.min(loMag, hiMag);
    const hi = Math.max(loMag, hiMag);
    const reachesEdge = hi === maxGoals;
    let cond;
    if (lo === hi) cond = \`if they \${verb} by \${lo}\`;
    else if (reachesEdge) cond = \`if they \${verb} by \${lo}+\`;
    else cond = \`if they \${verb} by \${lo}–\${hi}\`;
    const label = r.rank != null ? rankWord(r.rank) : r.ranks.map(rankWord).join('/');
    return \`\${label} \${cond}\`;
  });
}

function describeNonPlaying(team, match, ranks, byMargin, maxGoals) {
  if (ranks.length === 1) {
    return \`\${rankWord(ranks[0])} regardless of \${match.home} v \${match.away}\`;
  }
  // Summarize by participant (home-perspective) margin bands.
  const sideCond = (lo, hi) => {
    // lo<=hi signed home margins within the band.
    const band = (mLo, mHi, who, edge) => {
      const a = Math.abs(mLo), b = Math.abs(mHi);
      const x = Math.min(a, b), y = Math.max(a, b);
      if (x === y) return \`\${who} win by \${x}\`;
      if (y === maxGoals && edge) return \`\${who} win by \${x}+\`;
      return \`\${who} win by \${x}–\${y}\`;
    };
    if (lo === 0 && hi === 0) return 'a draw';
    if (lo > 0) return band(lo, hi, match.home, true);   // home wins
    if (hi < 0) return band(lo, hi, match.away, true);   // away wins
    // Band straddles 0: it covers a draw plus wins on one (or both) sides.
    const segs = [];
    if (lo < 0) segs.push(band(lo, -1, match.away, lo === -maxGoals)); // away-win part
    if (lo <= 0 && hi >= 0) segs.push('a draw');
    if (hi > 0) segs.push(band(1, hi, match.home, hi === maxGoals));   // home-win part
    return segs.join(' or ');
  };
  const parts = byMargin.map((b) =>
    \`\${b.ranks.map(rankWord).join('/')} on \${sideCond(b.homeMarginLo, b.homeMarginHi)}\`
  );
  return parts.join('; ');
}

// --- two simultaneous upcoming matches -------------------------------------

/**
 * Collapse the grid for the TWO-match (final round) case for one team.
 *
 * We produce:
 *   joint: array of { outcomes, rank } where outcomes describes each match by
 *          result (and, where rank depends on it, margin) — collapsed so that
 *          all scorelines yielding the same rank for this team share an entry.
 *   needs: per achievable rank, a compact description of sufficient conditions.
 *
 * For readability we first reduce each match to (result, margin) from the
 * perspective of its HOME team, then group combos by (resultA, resultB) and,
 * within that, report the rank(s) and whether margin matters.
 */
function summarizeDouble(team, upcoming, combos) {
  const code = team.code;
  const [mA, mB] = upcoming;

  // Group by (homeResultA, homeResultB) coarse outcome; collect rank sets and
  // whether margins within that coarse cell affect the rank.
  const cells = new Map(); // key "rA|rB" -> { rA,rB, rankSet:Set, marginVaries:bool, detail:Map }
  for (const c of combos) {
    const [aHg, aAg] = c.scores[0];
    const [bHg, bAg] = c.scores[1];
    const rA = aHg > aAg ? 'win' : aHg < aAg ? 'loss' : 'draw'; // home A perspective
    const rB = bHg > bAg ? 'win' : bHg < bAg ? 'loss' : 'draw';
    const key = \`\${rA}|\${rB}\`;
    if (!cells.has(key)) cells.set(key, { rA, rB, rankSet: new Set(), detail: new Map() });
    const cell = cells.get(key);
    const rank = c.rankByCode[code];
    cell.rankSet.add(rank);
    // detail keyed by (marginA, marginB) for margin-sensitivity analysis
    const dk = \`\${aHg - aAg},\${bHg - bAg}\`;
    cell.detail.set(dk, rank);
  }

  const joint = [];
  for (const cell of cells.values()) {
    const ranks = [...cell.rankSet].sort((a, b) => a - b);
    const marginVaries = ranks.length > 1;
    joint.push({
      outcomes: [
        { key: matchKey(mA), home: mA.home, away: mA.away, result: cell.rA },
        { key: matchKey(mB), home: mB.home, away: mB.away, result: cell.rB },
      ],
      ranks,
      marginVaries,
    });
  }

  // "What they need": for each achievable rank, list the coarse outcome cells
  // where that rank is GUARANTEED (rank set === [rank]) vs merely possible.
  const ranks = collectRanks(combos, code);
  const needs = {};
  for (const rank of ranks) {
    const guaranteed = [];
    const possible = [];
    for (const j of joint) {
      if (j.ranks.length === 1 && j.ranks[0] === rank) guaranteed.push(j.outcomes);
      else if (j.ranks.includes(rank)) possible.push(j.outcomes);
    }
    needs[rank] = { guaranteed, possible };
  }

  const description = describeDouble(team, upcoming, ranks, joint);
  return { code, name: team.name, ranks, joint, needs, description };
}

function describeDouble(team, upcoming, ranks, joint) {
  const [mA, mB] = upcoming;
  const resultPhrase = (o) => {
    if (o.result === 'win') return \`\${o.home} beat \${o.away}\`;
    if (o.result === 'loss') return \`\${o.away} beat \${o.home}\`;
    return \`\${o.home}-\${o.away} draw\`;
  };
  // Build "rank: when ..." clauses, listing guaranteed coarse cells.
  const clauses = [];
  for (const rank of ranks) {
    const guaranteedCells = joint.filter((j) => j.ranks.length === 1 && j.ranks[0] === rank);
    if (guaranteedCells.length === 0) {
      clauses.push(\`\${rankWord(rank)} possible (margin-dependent)\`);
      continue;
    }
    const cellPhrases = guaranteedCells.map((j) => j.outcomes.map(resultPhrase).join(' & '));
    clauses.push(\`\${rankWord(rank)} if: \${cellPhrases.join('  OR  ')}\`);
  }
  return clauses.join(' | ');
}


/* ===== allocation.js (filesystem read replaced by baked table) ===== */

// allocation.js
// FIFA 2026 World Cup "Annex C" third-place allocation: maps which eight
// third-placed groups qualify to which round-of-32 third-place slot they fill.
//
// allocation.json is keyed by the canonical combination key: the 8 qualifying
// group letters, sorted alphabetically and concatenated (e.g. "ABCDEFGH").
// Each value maps a slot label ("1A","1B","1D","1E","1G","1I","1K","1L") to the
// GROUP LETTER whose third-placed team fills that slot.
//
// ES module. No dependencies beyond node: builtins.


let _allocation = null;
function getAllocation() {
  return __ALLOCATION__;
}

/**
 * Normalize an array/Set/string of group letters to the canonical key:
 * uppercased, de-duplicated implicitly by validation, sorted, concatenated.
 * @param {Iterable<string>|string} groups
 * @returns {string} canonical 8-letter key
 */
function canonicalKey(groups) {
  let arr;
  if (typeof groups === "string") {
    arr = groups.split(/[^A-Za-z]+/).filter(Boolean);
    if (arr.length <= 1) arr = groups.replace(/[^A-Za-z]/g, "").split(""); // "ABCDEFGH"
  } else {
    arr = [...groups];
  }
  const letters = arr.map((g) => String(g).trim().toUpperCase());
  for (const l of letters) {
    if (!/^[A-L]$/.test(l)) throw new Error(\`invalid group letter: \${JSON.stringify(l)}\`);
  }
  const uniq = [...new Set(letters)];
  if (uniq.length !== 8) {
    throw new Error(\`expected 8 distinct group letters, got \${uniq.length}: \${uniq.join("")}\`);
  }
  return uniq.sort().join("");
}

/**
 * Look up the Annex C slot->group mapping for a given set of qualifying
 * third-place groups.
 * @param {Iterable<string>|string} qualifiedGroupLetters - the 8 group letters
 *   whose third-placed teams qualified.
 * @returns {Record<string,string>} mapping slot label -> group letter
 */
function lookupAllocation(qualifiedGroupLetters) {
  const key = canonicalKey(qualifiedGroupLetters);
  const table = getAllocation();
  const entry = table[key];
  if (!entry) {
    throw new Error(\`combination \${key} not found in Annex C allocation table\`);
  }
  return { ...entry };
}

/**
 * Combine the allocation with the bracket to resolve, for each R32 match that
 * has a "third" slot, which group's third-placed team is assigned there.
 *
 * The bracket's R32 third slots are conventionally labelled by the group
 * WINNER they oppose: a match whose other side is { type:"winner", group:X }
 * has third slot label "1X". We use that to index the allocation.
 *
 * @param {Iterable<string>|string} qualifiedGroupLetters
 * @param {object} bracket - parsed bracket.json
 * @returns {Array<{match:number, slotLabel:string, group:string, candidates:string[]}>}
 */
function resolveThirdPlaceSlots(qualifiedGroupLetters, bracket) {
  const alloc = lookupAllocation(qualifiedGroupLetters);
  const out = [];
  const r32 = (bracket && bracket.rounds && bracket.rounds.R32) || [];
  for (const m of r32) {
    let thirdSide = null;
    let winnerSide = null;
    for (const side of [m.home, m.away]) {
      if (side && side.type === "third") thirdSide = side;
      if (side && side.type === "winner") winnerSide = side;
    }
    if (!thirdSide) continue;
    if (!winnerSide) {
      throw new Error(\`match \${m.match} has a third slot but no winner side to label it\`);
    }
    const slotLabel = "1" + winnerSide.group;
    const group = alloc[slotLabel];
    if (!group) {
      throw new Error(\`no allocation for slot \${slotLabel} (match \${m.match})\`);
    }
    // sanity: the assigned group must be one of FIFA's listed candidates
    if (Array.isArray(thirdSide.from) && !thirdSide.from.includes(group)) {
      throw new Error(
        \`match \${m.match} slot \${slotLabel}: allocated group \${group} not in candidate list \${thirdSide.from.join("/")}\`
      );
    }
    out.push({ match: m.match, slotLabel, group, candidates: thirdSide.from || null });
  }
  return out;
}


/* ===== model.js ===== */

// model.js
// Probabilistic projection engine for the 2026 World Cup bracket:
//   - an Elo-driven Poisson scoreline model ("supremacy" model), and
//   - a Monte Carlo tournament simulator built on top of engine.js + allocation.
//
// BROWSER-SAFE ES module. NO node: imports, no fs/process in exported logic.
// It imports ONLY from engine.js (pure) and receives the Annex-C allocation
// resolution as an injected dependency, so it never touches the filesystem.
//
// The caller (verify-model.mjs in Node, or the HTML build in the browser) is
// responsible for loading bracket.json/allocation.json and passing in a
// \`resolveThirdPlaceSlots(groupLetters, bracket)\` function via opts.
//
// All randomness flows through an injected rng function ()->[0,1). We NEVER
// call Math.random internally, so a fixed seed reproduces a run exactly.

// ----------------------------------------------------------------------------
// Tunable constants (exported so they can be overridden / re-fit)
// ----------------------------------------------------------------------------

// Elo points -> goal-supremacy slope. 0.0036 goals per Elo point ≈ 1.44 goals
// of expected-margin per 400 Elo (a 400-Elo gap is the classic "10x odds" gap).
const ELO_SUPREMACY_COEF = 0.0036;

// League-average total goals per match (both teams). World Cup group/KO games
// historically average ~2.5–2.7; 2.6 is a reasonable central value.
const BASE_TOTAL_GOALS = 2.6;

// Floor on either side's Poisson mean so even a huge underdog can score.
const MIN_LAMBDA = 0.15;

// Default host-nation Elo bonus (points). Applied to USA/MEX/CAN in every match
// via opts.hostCodes. Home-field in soccer is worth roughly +0.3–0.4 goals;
// at the supremacy slope above, ~80 Elo ≈ +0.29 goals of supremacy. Kept modest
// because co-hosting across 3 countries dilutes a true single-venue advantage.
const DEFAULT_HOST_BONUS = 80;

// Round index map for "furthest round reached".
const ROUND_INDEX = Object.freeze({
  R32: 0,
  R16: 1,
  QF: 2,
  SF: 3,
  Final: 4,
  Champion: 5,
});

// ----------------------------------------------------------------------------
// 1. Seedable PRNG — mulberry32
// ----------------------------------------------------------------------------

/**
 * mulberry32 — a tiny, fast, decent-quality seedable PRNG.
 * @param {number} seed  any 32-bit-ish integer
 * @returns {() => number} function returning a float in [0, 1)
 */
function makeRng(seed) {
  let a = seed >>> 0;
  return function rng() {
    a |= 0;
    a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ----------------------------------------------------------------------------
// 2. Poisson sampler — Knuth's algorithm
// ----------------------------------------------------------------------------

/**
 * Sample a Poisson(lambda) integer using Knuth's multiplicative method.
 * Fine for the small lambdas (~0.2–2.5) we draw here.
 * @param {number} lambda  mean (>= 0)
 * @param {() => number} rng
 * @returns {number} non-negative integer goal count
 */
function samplePoisson(lambda, rng) {
  if (lambda <= 0) return 0;
  const L = Math.exp(-lambda);
  let k = 0;
  let p = 1;
  do {
    k++;
    p *= rng();
  } while (p > L);
  return k - 1;
}

// ----------------------------------------------------------------------------
// 3. Expected goals — the "supremacy" model
// ----------------------------------------------------------------------------

/**
 * Map two Elo ratings (plus optional per-side host bonuses) to a pair of
 * Poisson means.
 * @param {number} eloA
 * @param {number} eloB
 * @param {object} [opts]
 *   opts.hostBonusA, opts.hostBonusB  additive Elo bonuses (default 0)
 *   opts.eloSupremacyCoef, opts.baseTotalGoals, opts.minLambda  overrides
 * @returns {{lambdaA:number, lambdaB:number}}
 */
function expectedGoals(eloA, eloB, opts = {}) {
  const coef = opts.eloSupremacyCoef ?? ELO_SUPREMACY_COEF;
  const total = opts.baseTotalGoals ?? BASE_TOTAL_GOALS;
  const minL = opts.minLambda ?? MIN_LAMBDA;

  const effA = eloA + (opts.hostBonusA ?? 0);
  const effB = eloB + (opts.hostBonusB ?? 0);

  const supremacy = coef * (effA - effB);
  const lambdaA = Math.max(minL, (total + supremacy) / 2);
  const lambdaB = Math.max(minL, (total - supremacy) / 2);
  return { lambdaA, lambdaB };
}

// ----------------------------------------------------------------------------
// 4 & 5. Scoreline samplers
// ----------------------------------------------------------------------------

/**
 * Sample a group-stage scoreline (independent Poisson draws).
 * @returns {{ga:number, gb:number}}
 */
function sampleMatch(eloA, eloB, rng, opts = {}) {
  const { lambdaA, lambdaB } = expectedGoals(eloA, eloB, opts);
  return { ga: samplePoisson(lambdaA, rng), gb: samplePoisson(lambdaB, rng) };
}

/**
 * Sample a knockout scoreline; if drawn, resolve by an Elo-weighted shootout.
 * The drawn scoreline is preserved in {ga,gb}; only \`winner\` reflects the
 * shootout. Penalties use effective Elo (host bonus included).
 * @returns {{ga:number, gb:number, winner:'A'|'B'}}
 */
function sampleKnockout(eloA, eloB, rng, opts = {}) {
  const { ga, gb } = sampleMatch(eloA, eloB, rng, opts);
  if (ga > gb) return { ga, gb, winner: 'A' };
  if (gb > ga) return { ga, gb, winner: 'B' };
  // Tied -> shootout modeled as an Elo-weighted coin.
  const effA = eloA + (opts.hostBonusA ?? 0);
  const effB = eloB + (opts.hostBonusB ?? 0);
  const pA = 1 / (1 + Math.pow(10, -(effA - effB) / 400));
  return { ga, gb, winner: rng() < pA ? 'A' : 'B' };
}

// ----------------------------------------------------------------------------
// Internal helpers
// ----------------------------------------------------------------------------

/** Host bonus for a given team code under opts.hostCodes (a Set). */
function hostBonusFor(code, opts) {
  if (opts.hostCodes && opts.hostCodes.has && opts.hostCodes.has(code)) {
    return opts.hostBonus ?? DEFAULT_HOST_BONUS;
  }
  return 0;
}

/** Group letter ("A".."L") from a group object whose name is "Group X". */
function groupLetter(group) {
  const m = /Group\\s+([A-L])/i.exec(group.name);
  return m ? m[1].toUpperCase() : group.name.trim().slice(-1).toUpperCase();
}

/**
 * Deep-ish copy of the groups array sufficient for a single sim: teams are kept
 * by reference (read-only: code/name/elo), matches are cloned (we mutate goals
 * + played). Avoids cloning the immutable team records every sim.
 */
function cloneGroupsForSim(groups) {
  return groups.map((g) => ({
    name: g.name,
    teams: g.teams,
    matches: g.matches.map((m) => ({
      home: m.home,
      away: m.away,
      homeGoals: m.homeGoals,
      awayGoals: m.awayGoals,
      played: m.played,
    })),
  }));
}

// ----------------------------------------------------------------------------
// 6. One full tournament simulation
// ----------------------------------------------------------------------------

/**
 * Simulate ONE complete tournament from the current state.
 *
 * @param {Array} groups   engine-schema group objects (teams carry \`elo\`)
 * @param {object} bracket parsed bracket.json
 * @param {() => number} rng
 * @param {object} opts
 *   opts.hostCodes   Set<code> of host countries (always get host bonus)
 *   opts.hostBonus   Elo bonus magnitude (default DEFAULT_HOST_BONUS)
 *   opts.resolveThirdPlaceSlots(groupLetters, bracket) -> [{match,group,...}]
 *       (injected so this module stays browser/fs-free)
 *   plus any expectedGoals overrides.
 * @returns {{
 *   groupRank: Record<string,number>,
 *   qualifiedAs: Record<string,'winner'|'runnerup'|'third'|null>,
 *   r32: Array<{match:number, home:string, away:string}>,
 *   reached: Record<string,number>,
 *   champion: string
 * }}
 */
function simulateTournament(groups, bracket, rng, opts = {}) {
  const resolveThirds = opts.resolveThirdPlaceSlots;
  if (typeof resolveThirds !== 'function') {
    throw new Error('opts.resolveThirdPlaceSlots(groupLetters, bracket) is required');
  }

  const eloByCode = new Map();
  for (const g of groups) for (const t of g.teams) eloByCode.set(t.code, t.elo);
  const eloOf = (code) => eloByCode.get(code);

  // --- group stage: sample every unplayed match -----------------------------
  const sim = cloneGroupsForSim(groups);
  for (const g of sim) {
    for (const m of g.matches) {
      if (m.played) continue;
      const hb = hostBonusFor(m.home, opts);
      const ab = hostBonusFor(m.away, opts);
      const { ga, gb } = sampleMatch(eloOf(m.home), eloOf(m.away), rng, {
        ...opts,
        hostBonusA: hb,
        hostBonusB: ab,
      });
      m.homeGoals = ga;
      m.awayGoals = gb;
      m.played = true;
    }
  }

  // --- standings -------------------------------------------------------------
  const winnerOfGroup = {};   // letter -> code
  const runnerUpOfGroup = {}; // letter -> code
  const groupRank = {};       // code -> 1..4
  const qualifiedAs = {};     // code -> role | null
  const standings = {};       // letter -> ranked array

  for (const g of sim) {
    const letter = groupLetter(g);
    const standing = computeGroupStanding(g);
    standings[letter] = standing;
    for (const s of standing) {
      groupRank[s.code] = s.rank;
      qualifiedAs[s.code] = null;
      if (s.rank === 1) winnerOfGroup[letter] = s.code;
      else if (s.rank === 2) runnerUpOfGroup[letter] = s.code;
    }
    qualifiedAs[winnerOfGroup[letter]] = 'winner';
    qualifiedAs[runnerUpOfGroup[letter]] = 'runnerup';
  }

  // --- best 8 third-place teams ---------------------------------------------
  const thirds = rankThirdPlaceTeams(sim); // each has .group (= "Group X"), .qualifies
  const qualifiedThirds = thirds.filter((t) => t.qualifies);
  // map group LETTER -> qualifying third-place team code
  const thirdCodeByLetter = {};
  const qualifiedLetters = [];
  for (const t of qualifiedThirds) {
    const letter = /Group\\s+([A-L])/i.exec(t.group)?.[1]?.toUpperCase()
      ?? String(t.group).trim().slice(-1).toUpperCase();
    thirdCodeByLetter[letter] = t.code;
    qualifiedLetters.push(letter);
    qualifiedAs[t.code] = 'third';
  }

  // --- Annex C: which group's third fills each R32 third slot ---------------
  const thirdSlots = resolveThirds(qualifiedLetters, bracket); // [{match, group}]
  const thirdCodeForMatch = {};
  for (const s of thirdSlots) thirdCodeForMatch[s.match] = thirdCodeByLetter[s.group];

  // --- build the 16 R32 fixtures --------------------------------------------
  const slotCode = (side, matchNo) => {
    if (side.type === 'winner') return winnerOfGroup[side.group];
    if (side.type === 'runnerup') return runnerUpOfGroup[side.group];
    if (side.type === 'third') return thirdCodeForMatch[matchNo];
    throw new Error(\`unexpected R32 slot type: \${side.type}\`);
  };

  const r32 = bracket.rounds.R32.map((m) => ({
    match: m.match,
    home: slotCode(m.home, m.match),
    away: slotCode(m.away, m.match),
  }));

  // --- knockout bracket ------------------------------------------------------
  // winnerByMatch / loserByMatch: match number -> team code.
  const winnerByMatch = {};
  const loserByMatch = {};
  const reached = {};

  // Seed "reached" for everyone who made the R32.
  for (const fx of r32) {
    reached[fx.home] = ROUND_INDEX.R32;
    reached[fx.away] = ROUND_INDEX.R32;
  }

  const bump = (code, roundIdx) => {
    if (reached[code] === undefined || roundIdx > reached[code]) reached[code] = roundIdx;
  };

  // Resolve a winnerOf/loserOf side to a concrete team code (R16+ rounds).
  const sideCode = (side) => {
    if (side.type === 'winnerOf') return winnerByMatch[side.match];
    if (side.type === 'loserOf') return loserByMatch[side.match];
    throw new Error(\`unexpected knockout side type: \${side.type}\`);
  };

  // R32: play each fixture.
  const playKnockout = (homeCode, awayCode) => {
    const hb = hostBonusFor(homeCode, opts);
    const ab = hostBonusFor(awayCode, opts);
    const res = sampleKnockout(eloOf(homeCode), eloOf(awayCode), rng, {
      ...opts,
      hostBonusA: hb,
      hostBonusB: ab,
    });
    const winner = res.winner === 'A' ? homeCode : awayCode;
    const loser = res.winner === 'A' ? awayCode : homeCode;
    return { winner, loser };
  };

  for (const fx of r32) {
    const { winner, loser } = playKnockout(fx.home, fx.away);
    winnerByMatch[fx.match] = winner;
    loserByMatch[fx.match] = loser;
    bump(winner, ROUND_INDEX.R16); // winning R32 => reached R16
  }

  // Helper to run a round whose sides are winnerOf references.
  const runRound = (roundMatches, advanceRoundIdx) => {
    for (const m of roundMatches) {
      const homeCode = sideCode(m.home);
      const awayCode = sideCode(m.away);
      const { winner, loser } = playKnockout(homeCode, awayCode);
      winnerByMatch[m.match] = winner;
      loserByMatch[m.match] = loser;
      bump(winner, advanceRoundIdx);
    }
  };

  runRound(bracket.rounds.R16, ROUND_INDEX.QF);   // win R16 => reached QF
  runRound(bracket.rounds.QF, ROUND_INDEX.SF);    // win QF  => reached SF
  runRound(bracket.rounds.SF, ROUND_INDEX.Final); // win SF  => reached Final

  // Final.
  const finalM = bracket.rounds.Final[0];
  const fHome = winnerByMatch[finalM.home.match];
  const fAway = winnerByMatch[finalM.away.match];
  const { winner: champion } = playKnockout(fHome, fAway);
  winnerByMatch[finalM.match] = champion;
  bump(champion, ROUND_INDEX.Champion);

  // Third-place playoff is simulated for completeness (does not affect \`reached\`
  // beyond the SF appearance the two losers already have).
  const tpM = bracket.rounds.ThirdPlace?.[0];
  if (tpM) {
    const a = loserByMatch[tpM.home.match];
    const b = loserByMatch[tpM.away.match];
    if (a && b) {
      const { winner } = playKnockout(a, b);
      winnerByMatch[tpM.match] = winner;
    }
  }

  return { groupRank, qualifiedAs, r32, reached, champion };
}

// ----------------------------------------------------------------------------
// 7. Monte Carlo aggregation
// ----------------------------------------------------------------------------

/**
 * Run n simulations and aggregate per-team and per-R32-slot statistics.
 *
 * @param {Array} groups
 * @param {object} bracket
 * @param {object} opts  { n=10000, seed=1, hostCodes, hostBonus,
 *                          resolveThirdPlaceSlots, ...expectedGoals overrides }
 * @returns {{
 *   n:number,
 *   perTeam: Array<object>,             // sorted by pWinCup desc
 *   perR32Slot: Array<{match,home:[{code,p}],away:[{code,p}]}>,
 *   modalBracket: Array<{match, home:{code,p}, away:{code,p}}>
 * }}
 */
function monteCarlo(groups, bracket, opts = {}) {
  const n = opts.n ?? 10000;
  const seed = opts.seed ?? 1;
  const rng = makeRng(seed);

  // team metadata
  const nameByCode = new Map();
  for (const g of groups) for (const t of g.teams) nameByCode.set(t.code, t.name);

  // per-team counters
  const C = {}; // code -> counter object
  const ensure = (code) => {
    if (!C[code]) {
      C[code] = {
        code,
        name: nameByCode.get(code),
        winGroup: 0, runnerUp: 0, thirdQualify: 0,
        reachR32: 0, reachR16: 0, reachQF: 0, reachSF: 0, reachFinal: 0, winCup: 0,
      };
    }
    return C[code];
  };
  for (const code of nameByCode.keys()) ensure(code);

  // per-R32-slot tallies: 16 matches x {home: Map<code,count>, away: Map<code,count>}
  const r32Matches = bracket.rounds.R32.map((m) => m.match);
  const slotTally = {};
  for (const mNo of r32Matches) slotTally[mNo] = { home: new Map(), away: new Map() };
  const inc = (map, code) => map.set(code, (map.get(code) || 0) + 1);

  const simOpts = { ...opts };

  for (let i = 0; i < n; i++) {
    const r = simulateTournament(groups, bracket, rng, simOpts);

    // group roles
    for (const [code, role] of Object.entries(r.qualifiedAs)) {
      if (role === 'winner') C[code].winGroup++;
      else if (role === 'runnerup') C[code].runnerUp++;
      else if (role === 'third') C[code].thirdQualify++;
    }

    // furthest round reached (cumulative: reaching SF implies reached R16, etc.)
    for (const [code, idx] of Object.entries(r.reached)) {
      const c = C[code];
      if (idx >= ROUND_INDEX.R32) c.reachR32++;
      if (idx >= ROUND_INDEX.R16) c.reachR16++;
      if (idx >= ROUND_INDEX.QF) c.reachQF++;
      if (idx >= ROUND_INDEX.SF) c.reachSF++;
      if (idx >= ROUND_INDEX.Final) c.reachFinal++;
    }
    C[r.champion].winCup++;

    // R32 slot occupancy
    for (const fx of r.r32) {
      inc(slotTally[fx.match].home, fx.home);
      inc(slotTally[fx.match].away, fx.away);
    }
  }

  const perTeam = Object.values(C)
    .map((c) => ({
      code: c.code,
      name: c.name,
      pWinGroup: c.winGroup / n,
      pRunnerUp: c.runnerUp / n,
      pThirdQualify: c.thirdQualify / n,
      pReachR32: c.reachR32 / n,
      pReachR16: c.reachR16 / n,
      pReachQF: c.reachQF / n,
      pReachSF: c.reachSF / n,
      pReachFinal: c.reachFinal / n,
      pWinCup: c.winCup / n,
    }))
    .sort((a, b) => b.pWinCup - a.pWinCup);

  // per-R32-slot distributions (top candidates) + modal bracket
  const TOP = opts.topCandidates ?? 4;
  const topOf = (map) =>
    [...map.entries()]
      .map(([code, count]) => ({ code, p: count / n }))
      .sort((a, b) => b.p - a.p);

  const perR32Slot = r32Matches.map((mNo) => {
    const home = topOf(slotTally[mNo].home);
    const away = topOf(slotTally[mNo].away);
    return { match: mNo, home: home.slice(0, TOP), away: away.slice(0, TOP) };
  });

  const modalBracket = r32Matches.map((mNo) => {
    const home = topOf(slotTally[mNo].home);
    const away = topOf(slotTally[mNo].away);
    return {
      match: mNo,
      home: home[0] ?? { code: null, p: 0 },
      away: away[0] ?? { code: null, p: 0 },
    };
  });

  return { n, perTeam, perR32Slot, modalBracket };
}


self.onmessage = function (e) {
  var d = e.data;
  var groups = d.groups;
  // rebuild hostCodes Set (Sets don't survive structured clone of our payload shape)
  var hostCodes = new Set(d.hostCodes || []);
  var opts = {
    n: d.n, seed: d.seed,
    hostCodes: hostCodes,
    topCandidates: d.topCandidates || 6,
    resolveThirdPlaceSlots: function (letters, bracket) {
      return resolveThirdPlaceSlots(letters, bracket);
    }
  };
  try {
    var mc = monteCarlo(groups, d.bracket, opts);
    self.postMessage({ ok: true, mc: mc });
  } catch (err) {
    self.postMessage({ ok: false, error: String(err && err.stack || err) });
  }
};

    if(state.tab==='bracket') s=renderBracket();
    else if(state.tab==='groups') s=renderGroups();
    else s=renderScenario();
    root.appendChild(s);
    root.appendChild(about());

    // kick a projection if needed
    if(state.mode==='projected' && state.tab!=='scenario' && !state.mc && !state.simming){
      runProjection();
    }
  }

  function header(){
    var d=document.createElement('div');
    var note = 'Very-recently-finished or in-progress games may not yet be in the feed — switch to My Picks to enter a just-final result by hand.';
    d.innerHTML =
      '<h1>2026 World Cup &mdash; Bracket Projector</h1>'+
      '<div class="muted tiny">Elo&ndash;Poisson supremacy model &middot; '+SIM_N.toLocaleString()+' Monte-Carlo sims &middot; data via openfootball</div>'+
      '<div class="fresh"><div><b>Data through:</b> '+esc(FRESH.dataThrough)+
        ' &middot; '+FRESH.playedCount+'/'+FRESH.totalCount+' matches played &middot; built '+esc(localBuilt(FRESH.builtAtISO))+'</div>'+
        '<div class="note">'+note+'</div></div>';
    return d;
  }

  function controls(){
    var wrap=document.createElement('div');
    // mode toggle
    var seg=document.createElement('div'); seg.className='row';
    seg.innerHTML='<span class="seg">'+
      '<button data-m="projected" class="'+(state.mode==='projected'?'on':'')+'">Projected</button>'+
      '<button data-m="picks" class="'+(state.mode==='picks'?'on':'')+'">My Picks</button></span>'+
      '<span class="spacer"></span>';
    if(state.mode==='picks'){
      var rb=document.createElement('button'); rb.className='btn warn'; rb.textContent='Reset picks';
      rb.onclick=function(){ state.picks={}; workGroups=cloneGroups(baseGroups); state.mc=null; render(); };
      seg.appendChild(rb);
    }
    Array.prototype.forEach.call(seg.querySelectorAll('button[data-m]'),function(b){
      b.onclick=function(){ state.mode=b.getAttribute('data-m'); if(state.mode==='projected'){ state.mc=null; } render(); };
    });
    wrap.appendChild(seg);

    // tabs
    var tabs=document.createElement('div'); tabs.className='tabbar';
    [['bracket','Knockout bracket'],['groups','Group stage'],['scenario','Scenario calculator']].forEach(function(t){
      var b=document.createElement('button'); b.className='tab'+(state.tab===t[0]?' active':'');
      b.textContent=t[1]; b.onclick=function(){ state.tab=t[0]; render(); };
      tabs.appendChild(b);
    });
    wrap.appendChild(tabs);
    return wrap;
  }

  // ---------------- BRACKET ----------------
  function renderBracket(){
    var sec=document.createElement('div'); sec.className='section active';
    if(state.mode==='projected'){
      var bar=document.createElement('div'); bar.className='row tiny muted';
      if(state.simming){ bar.innerHTML='<span class="simstate"><span class="spinner"></span> simulating '+SIM_N.toLocaleString()+' tournaments&hellip;</span>'; }
      else { bar.innerHTML='<span>Each slot shows the most-likely team and the share of sims it appears there. Tap a slot for the top candidates.</span>'; }
      sec.appendChild(bar);
      if(!state.mc){ if(!state.simming){ var p=document.createElement('div'); p.className='muted'; p.textContent='Preparing simulation…'; sec.appendChild(p);} sec.appendChild(bracketShell(null)); return sec; }
      sec.appendChild(bracketShell(state.mc));
    } else {
      var info=document.createElement('div'); info.className='callout';
      info.innerHTML='<b>My Picks.</b> Group results below feed the R32; tap any knockout slot to choose who advances. Edit group scores in the Group stage tab. Empty slots stay blank until the groups (or your picks) decide them.';
      sec.appendChild(info);
      sec.appendChild(bracketShell(null));
    }
    return sec;
  }

  function bracketShell(mc){
    // build per-match modal occupant maps from mc (projected) or deterministic (picks)
    var det = state.mode==='picks'? deterministicBracket() : null;
    var slotMap={};   // R32 matchNo -> {home:[cands], away:[cands]}
    _winPoolCache={};
    if(mc){
      mc.perR32Slot.forEach(function(s){ slotMap[s.match]={ home:s.home, away:s.away }; });
    }

    var wrap=document.createElement('div'); wrap.className='bracket-wrap';
    var br=document.createElement('div'); br.className='bracket';

    var rounds=[['R32','Round of 32'],['R16','Round of 16'],['QF','Quarter-finals'],['SF','Semi-finals'],['Final','Final']];
    rounds.forEach(function(rd){
      var col=document.createElement('div'); col.className='col'+(rd[0]==='Final'?' final-col':'');
      var h=document.createElement('h3'); h.textContent=rd[1]; col.appendChild(h);
      (BRACKET.rounds[rd[0]]||[]).forEach(function(m){
        col.appendChild(matchCard(rd[0], m, mc, slotMap, det));
      });
      br.appendChild(col);
    });
    wrap.appendChild(br);
    return wrap;
  }

  function matchCard(round, m, mc, slotMap, det){
    var card=document.createElement('div'); card.className='match';
    var hdr=document.createElement('div'); hdr.className='mhdr'; hdr.textContent='M'+m.match;
    card.appendChild(hdr);

    // determine the two slots
    var homeInfo, awayInfo;
    if(state.mode==='projected' && mc){
      if(round==='R32'){
        var sm=slotMap[m.match];
        homeInfo=projSlot(sm?sm.home:null);
        awayInfo=projSlot(sm?sm.away:null);
      } else {
        // R16+ : aggregate the candidate pool feeding each side, normalized.
        homeInfo=projWinnerOf(m.home, slotMap);
        awayInfo=projWinnerOf(m.away, slotMap);
      }
    } else if(state.mode==='picks'){
      var d=det.slotByMatch[m.match]||{};
      homeInfo=pickSlot(d.home, m.match, round, 'home', m);
      awayInfo=pickSlot(d.away, m.match, round, 'away', m);
    } else {
      homeInfo={code:null,p:0}; awayInfo={code:null,p:0};
    }

    card.appendChild(slotEl(homeInfo, round, m, 'home'));
    card.appendChild(slotEl(awayInfo, round, m, 'away'));
    return card;
  }

  // cache: aggregated candidate pool for the WINNER of a given match number.
  var _winPoolCache={};
  function projSlot(info){
    if(!info||!info.length) return {code:null,p:0,cands:[]};
    var top=info[0]||{};
    return {code:top.code||null, p:top.p||0, cands:info};
  }

  // R16+ projected: the winner of a feeding match comes from the union of the
  // R32 occupants beneath it. We aggregate each candidate's R32-appearance
  // probability, then RENORMALIZE within the pool to express "given this slot is
  // reached, which team is most likely here." This is a glanceable approximation
  // (it ignores match-by-match win probability), surfaced honestly in About.
  function projWinnerOf(side, slotMap){
    var pool=winnerPool(side, slotMap);
    if(!pool.length) return {code:null,p:0,cands:[]};
    var tot=0; pool.forEach(function(c){tot+=c.p;});
    var norm=pool.map(function(c){return {code:c.code,p:tot>0?c.p/tot:0};})
      .sort(function(a,b){return b.p-a.p;});
    return {code:norm[0].code,p:norm[0].p,cands:norm.slice(0,6)};
  }
  function winnerPool(side, slotMap){
    if(side.type!=='winnerOf') return [];
    if(_winPoolCache[side.match]) return _winPoolCache[side.match];
    var fm=findMatch(side.match);
    var pool;
    if(isR32(side.match)){
      // leaf: combine this match's two R32 candidate slots
      var sm=slotMap[side.match]||{home:[],away:[]};
      pool=mergeCands((sm.home||[]),(sm.away||[]));
    } else {
      pool=mergeCands(winnerPool(fm.home, slotMap), winnerPool(fm.away, slotMap));
    }
    _winPoolCache[side.match]=pool;
    return pool;
  }
  function mergeCands(a,b){
    var m={}; [a,b].forEach(function(arr){ (arr||[]).forEach(function(c){ if(c&&c.code) m[c.code]=(m[c.code]||0)+(c.p||0); }); });
    return Object.keys(m).map(function(k){return {code:k,p:m[k]};});
  }
  function isR32(no){ return BRACKET.rounds.R32.some(function(x){return x.match===no;}); }
  function findMatch(no){
    var all=[].concat(BRACKET.rounds.R32,BRACKET.rounds.R16,BRACKET.rounds.QF,BRACKET.rounds.SF,BRACKET.rounds.Final);
    return all.filter(function(x){return x.match===no;})[0];
  }

  function pickSlot(code, matchNo, round, side, m){
    return {code:code||null, p:0, known:!!code};
  }

  function slotEl(info, round, m, side){
    var el=document.createElement('div'); el.className='slot'+(info.code?'':' empty');
    if(state.mode==='picks' && state.picks[m.match] && state.picks[m.match]===info.code){ el.className+=' winner-row'; }
    var code=info.code;
    var acc=document.createElement('div'); acc.className='accent'; acc.style.background=accentFor(code);
    el.appendChild(acc);
    var c=document.createElement('div'); c.className='code'; c.textContent=code||'—'; el.appendChild(c);
    var nm=document.createElement('div'); nm.className='nm'; nm.textContent=code?(nameByCode[code]||''):'TBD'; el.appendChild(nm);
    var pe=document.createElement('div'); pe.className='p';
    if(state.mode==='projected' && code){ pe.textContent=pct(info.p); }
    el.appendChild(pe);

    if(state.mode==='projected'){
      el.onclick=function(ev){ if(info.cands&&info.cands.length) showCandidates(ev, info.cands, m.match, side); };
    } else {
      // My Picks: clicking a slot picks that team to advance from this match
      el.onclick=function(){ if(code){ state.picks[m.match]=code; render(); } };
      if(code){ el.title='Click to advance '+(nameByCode[code]||code); }
    }
    return el;
  }

  function showCandidates(ev, cands, matchNo, side){
    closePop();
    var pop=document.createElement('div'); pop.className='pop';
    pop.innerHTML='<span class="x">&times;</span><h4>M'+matchNo+' &middot; '+side+' slot &mdash; top candidates</h4>';
    cands.slice(0,5).forEach(function(c){
      if(!c||!c.code) return;
      var row=document.createElement('div'); row.className='cand';
      row.innerHTML='<span class="code" style="color:'+accentFor(c.code)+'">'+c.code+'</span>'+
        '<span class="nm">'+esc(nameByCode[c.code]||'')+'</span>'+
        '<span class="p">'+pct1(c.p)+'</span>';
      pop.appendChild(row);
    });
    pop.querySelector('.x').onclick=closePop;
    document.body.appendChild(pop);
    var x=Math.min(ev.clientX, window.innerWidth-pop.offsetWidth-10);
    var y=Math.min(ev.clientY+8, window.innerHeight-pop.offsetHeight-10);
    pop.style.left=Math.max(8,x)+'px'; pop.style.top=Math.max(8,y)+'px';
    setTimeout(function(){ document.addEventListener('click', outsidePop, {once:true}); },0);
  }
  function outsidePop(e){ var p=document.querySelector('.pop'); if(p&&!p.contains(e.target)) closePop(); }
  function closePop(){ var p=document.querySelector('.pop'); if(p) p.remove(); }

  // ---------------- GROUP STAGE ----------------
  function renderGroups(){
    var sec=document.createElement('div'); sec.className='section active';
    if(state.mode==='picks'){
      var note=document.createElement('div'); note.className='callout';
      note.innerHTML='Edit any <b>unplayed</b> match score below (steppers) to recompute standings, the 3rd-place table, the Annex&nbsp;C allocation, and the bracket live. You can also <b>add a not-yet-in-feed result</b> by hand at the bottom of a group.';
      sec.appendChild(note);
    }
    var grid=document.createElement('div'); grid.className='groups-grid';
    var gs=groupsForCompute();
    gs.forEach(function(g){ grid.appendChild(groupCard(g)); });
    sec.appendChild(grid);
    sec.appendChild(thirdsPanel(gs));
    return sec;
  }

  function groupCard(g){
    var card=document.createElement('div'); card.className='gcard';
    var st=computeGroupStanding(g);
    var h=document.createElement('h3'); h.textContent=g.name; card.appendChild(h);
    var t=document.createElement('table');
    t.innerHTML='<thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead>';
    var tb=document.createElement('tbody');
    st.forEach(function(s){
      var tr=document.createElement('tr'); if(s.rank<=2) tr.className='q'+s.rank;
      var lots=s.tiedByLots?' <span class="lots" title="Level on all criteria incl. fair-play — separated only by drawing of lots (a real coin-flip)">⚖</span>':'';
      tr.innerHTML='<td>'+s.rank+'</td>'+
        '<td><span style="color:'+accentFor(s.code)+';font-weight:700">'+s.code+'</span> <span class="muted tiny">'+esc(s.name)+'</span>'+lots+'</td>'+
        '<td>'+s.played+'</td><td>'+s.won+'</td><td>'+s.drawn+'</td><td>'+s.lost+'</td>'+
        '<td>'+s.gf+'</td><td>'+s.ga+'</td><td>'+(s.gd>0?'+':'')+s.gd+'</td><td><b>'+s.points+'</b></td>';
      tb.appendChild(tr);
    });
    t.appendChild(tb); card.appendChild(t);

    if(state.mode==='picks'){
      // editors for each match
      g.matches.forEach(function(m){ card.appendChild(matchEditor(g,m)); });
      card.appendChild(manualAdd(g));
    }
    return card;
  }

  function matchEditor(g,m){
    var row=document.createElement('div'); row.className='editor'+(m.played?' played':'');
    var hg=(m.homeGoals==null?0:m.homeGoals), ag=(m.awayGoals==null?0:m.awayGoals);
    function stepper(val, onCh){
      var s=document.createElement('span'); s.className='stepper';
      var dec=document.createElement('button'); dec.textContent='−';
      var inp=document.createElement('input'); inp.type='number'; inp.min='0'; inp.value=val;
      var inc=document.createElement('button'); inc.textContent='+';
      dec.onclick=function(){ var v=Math.max(0,(+inp.value||0)-1); inp.value=v; onCh(v); };
      inc.onclick=function(){ var v=Math.max(0,(+inp.value||0)+1); inp.value=v; onCh(v); };
      inp.onchange=function(){ var v=Math.max(0,Math.floor(+inp.value||0)); inp.value=v; onCh(v); };
      s.appendChild(dec); s.appendChild(inp); s.appendChild(inc); return s;
    }
    var lblH=document.createElement('span'); lblH.className='lbl'; lblH.style.color=accentFor(m.home); lblH.textContent=m.home;
    var lblA=document.createElement('span'); lblA.className='lbl'; lblA.style.color=accentFor(m.away); lblA.textContent=m.away;
    var newH=hg, newA=ag;
    function commit(){ m.homeGoals=newH; m.awayGoals=newA; m.played=true; state.mc=null; render(); }
    row.appendChild(lblH);
    row.appendChild(stepper(hg,function(v){newH=v;commit();}));
    var vs=document.createElement('span'); vs.className='vs'; vs.textContent=':'; row.appendChild(vs);
    row.appendChild(stepper(ag,function(v){newA=v;commit();}));
    row.appendChild(lblA);
    var tag=document.createElement('span'); tag.className='tag';
    tag.textContent = m.played? (m.manual?'manual':'played') : 'projected→edit';
    row.appendChild(tag);
    if(m.played){
      var clr=document.createElement('button'); clr.className='btn tiny'; clr.style.padding='2px 6px'; clr.textContent='clear';
      clr.onclick=function(){ m.played=false; m.homeGoals=null; m.awayGoals=null; m.manual=false; state.mc=null; render(); };
      row.appendChild(clr);
    }
    return row;
  }

  function manualAdd(g){
    // Allow entering a just-finished real result that isn't in the feed yet,
    // for any pairing in the group that doesn't already have a match row.
    var wrap=document.createElement('div'); wrap.className='manual-add tiny muted';
    wrap.textContent='All '+g.teams.length+' teams’ fixtures are listed above. Use a row’s steppers to enter a final score the feed hasn’t picked up yet (it will be tagged “manual”).';
    return wrap;
  }

  function thirdsPanel(gs){
    var panel=document.createElement('div'); panel.className='thirds';
    var h=document.createElement('h3'); h.style.margin='2px 0 6px'; h.style.fontSize='14px';
    h.textContent='Third-place ranking (top 8 advance)'; panel.appendChild(h);
    var ranked;
    try{ ranked=rankThirdPlaceTeams(gs); }
    catch(e){ var er=document.createElement('div'); er.className='muted tiny'; er.textContent='Third-place ranking unavailable: '+e.message; panel.appendChild(er); return panel; }
    ranked.forEach(function(t,i){
      if(i===8){ var cut=document.createElement('div'); cut.className='cut'; cut.innerHTML='<span>cut line</span>'; panel.appendChild(cut); }
      var row=document.createElement('div'); row.className='trow'+(t.qualifies?' qual':'');
      var lots=t.tiedByLots?' ⚖':'';
      row.innerHTML='<span class="g">'+esc(t.group)+'</span>'+
        '<span class="cd" style="color:'+accentFor(t.code)+'">'+t.code+lots+'</span>'+
        '<span class="st">'+t.points+' pts &middot; GD '+(t.gd>0?'+':'')+t.gd+' &middot; GF '+t.gf+'</span>';
      panel.appendChild(row);
    });
    return panel;
  }

  // ---------------- SCENARIO CALCULATOR ----------------
  function renderScenario(){
    var sec=document.createElement('div'); sec.className='section active';
    var gs=baseGroups; // scenarios always against the real feed
    var callout=document.createElement('div'); callout.className='callout';
    callout.innerHTML='These are <b>within-group positions</b> (1st/2nd/3rd/4th) and are <b>deterministic</b>. They do <b>not</b> assert 3rd-place qualification or knockout opponents — those are cross-group and shown probabilistically in the bracket.';
    sec.appendChild(callout);

    // controls: group select + match select
    var ctrls=document.createElement('div'); ctrls.className='scn-controls';
    var gsel=document.createElement('select');
    gs.forEach(function(g){ var o=document.createElement('option'); o.value=letterOf(g); o.textContent=g.name; gsel.appendChild(o); });
    if(!state.scnGroup) state.scnGroup=letterOf(gs[0]);
    gsel.value=state.scnGroup;
    var msel=document.createElement('select');
    ctrls.appendChild(document.createTextNode('Group: ')); ctrls.appendChild(gsel);
    ctrls.appendChild(document.createTextNode(' Match: ')); ctrls.appendChild(msel);
    sec.appendChild(ctrls);

    var out=document.createElement('div'); sec.appendChild(out);

    function curGroup(){ return gs.filter(function(g){return letterOf(g)===state.scnGroup;})[0]; }
    function key(m){ return m.home+'-'+m.away; }

    function refillMatches(){
      msel.innerHTML='';
      var g=curGroup();
      var unplayed=g.matches.filter(function(m){return !m.played;});
      if(!unplayed.length){ var o=document.createElement('option'); o.textContent='(all matches played)'; o.value=''; msel.appendChild(o); return; }
      // detect simultaneous final pair (same date+time) -> not available in feed times here,
      // so we approximate: if exactly 2 unplayed remain in the group, offer joint mode.
      unplayed.forEach(function(m){ var o=document.createElement('option'); o.value=key(m); o.textContent=m.home+' v '+m.away; msel.appendChild(o); });
      if(unplayed.length===2){ var oj=document.createElement('option'); oj.value='JOINT'; oj.textContent='Final round — BOTH games (joint)'; msel.appendChild(oj); msel.value='JOINT'; }
    }

    function compute(){
      out.innerHTML='';
      var g=curGroup();
      var unplayed=g.matches.filter(function(m){return !m.played;});
      if(!unplayed.length){ out.innerHTML='<div class="scn-card muted">All matches in '+esc(g.name)+' are played — the group is decided.</div>'; return; }
      var keys;
      if(msel.value==='JOINT'){ keys=unplayed.slice(0,2).map(key); }
      else if(msel.value){ keys=[msel.value]; }
      else { keys=[key(unplayed[0])]; }
      var grid;
      try{ grid=scenarioGrid(g, keys, 6); }
      catch(e){ out.innerHTML='<div class="scn-card muted">Scenario unavailable: '+esc(e.message)+'</div>'; return; }
      var card=document.createElement('div'); card.className='scn-card';
      var head=document.createElement('div'); head.className='scn-note';
      head.innerHTML=(keys.length===2?'Joint final-round scenario for both remaining matches: '
        :'Scenario for the next match: ')+'<b>'+esc(grid.matches.join('  +  '))+'</b>';
      card.appendChild(head);
      g.teams.forEach(function(team){
        var s=grid.teams[team.code]; if(!s) return;
        var row=document.createElement('div'); row.className='scn-team';
        row.innerHTML='<div class="h"><span class="cd" style="color:'+accentFor(team.code)+'">'+team.code+'</span> <span class="nm">'+esc(team.name)+'</span></div>'+
          '<div class="desc">'+esc(grid.describe(team.code))+'</div>';
        card.appendChild(row);
      });
      out.appendChild(card);
    }

    gsel.onchange=function(){ state.scnGroup=gsel.value; refillMatches(); compute(); };
    msel.onchange=compute;
    refillMatches(); compute();
    return sec;
  }

  // ---------------- ABOUT ----------------
  function about(){
    var d=document.createElement('details'); d.className='about';
    d.innerHTML='<summary>About this model &amp; method</summary>'+
      '<p><b>Strength signal:</b> soccer Elo ratings (eloratings.net-style). A rating gap maps to expected goal <i>supremacy</i> ('+
        '~0.0036 goals per Elo point), split into a Poisson mean for each side around a '+
        'base of 2.6 total goals. Co-host bonus (+80 Elo) for USA/Mexico/Canada.</p>'+
      '<p><b>Projection:</b> '+SIM_N.toLocaleString()+' Monte-Carlo tournaments. Each unplayed group game is a Poisson scoreline draw; '+
        'standings use the full FIFA tiebreaker cascade (points → GD → GF → head-to-head → fair-play → drawing of lots). '+
        'The best 8 third-place teams are mapped into the Round of 32 by FIFA’s Annex C table. '+
        'Knockout ties go to an Elo-weighted shootout coin.</p>'+
      '<p><b>Coin-flips are real:</b> a ⚖ marks teams a standing could separate only by drawing of lots — a genuine random draw, '+
        'which we render deterministically (alphabetical) but flag honestly.</p>'+
      '<p><b>Data:</b> openfootball/worldcup.json (public domain). '+FRESH.playedCount+' of 104 matches in the build. '+
        'Re-run the build as games finish to refresh. In-progress or very-recently-final games may lag the feed — use My Picks to enter them by hand.</p>'+
      '<p class="muted tiny">Within-group positions in the Scenario tab are exact; everything probabilistic (qualification odds, opponents, title odds) is a model estimate, not a guarantee.</p>';
    return d;
  }

  // first paint
  render();
})();

</script>
