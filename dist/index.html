<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>2026 World Cup Bracket Projector</title>
<style>

:root{
  --bg:#eef0f3; --panel:#ffffff; --panel2:#e7ebf1; --line:#d3d8e0;
  --txt:#171a20; --dim:#56606e; --dim2:#878f9c;
  --accent:#1565d8; --good:#127a42; --warn:#a66a00; --bad:#cc3a3a;
  --qual:#e3f3ea; --qualline:#1f9d54;
  --qual3:#fbf0d4; --qual3line:#cf9a1f;
  --chip:#e7ebf1;
  --r32:#2f6ea5; --r16:#4a7d2a; --qf:#8a5a2a; --sf:#7a3a6a; --fin:#a04040;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.4;overflow-x:hidden;-webkit-text-size-adjust:100%}
a{color:var(--accent)}
#app{max-width:1280px;margin:0 auto;padding:12px 14px 80px}
h1{font-size:20px;margin:0 0 2px}
h2{font-size:16px;margin:18px 0 8px;font-weight:650}
.muted{color:var(--dim)}
.tiny{font-size:12px}
.fresh{background:var(--panel);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;margin:8px 0 12px;font-size:13px}
.fresh b{color:var(--txt)}
.fresh .note{color:var(--warn);margin-top:4px;font-size:12px}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.spacer{flex:1}

/* tabs + toggles */
.tabbar{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 4px}
.tab{background:var(--panel);border:1px solid var(--line);color:var(--dim);
  padding:7px 12px;border-radius:8px;cursor:pointer;font-size:13px}
.tab.active{background:var(--panel2);color:var(--txt);border-color:var(--accent)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{background:var(--panel);color:var(--dim);border:0;padding:7px 14px;
  cursor:pointer;font-size:13px}
.seg button.on{background:var(--accent);color:#ffffff;font-weight:650}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
  padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px}
.btn:hover{border-color:var(--accent)}
.btn.warn{border-color:var(--warn)}

.section{display:none}
.section.active{display:block}

/* bracket — now rendered as inline SVG (single source of truth on-screen) */
.bracket-wrap{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
  border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:10px}
.bracket-wrap svg.bracket-svg{display:block}
/* SVG slot interactivity (geometry/colors are inline attrs so it serializes standalone) */
.bracket-svg .slot-hit{cursor:pointer}
.bracket-svg .slot-hit:hover .slot-bg{fill:#eef2f7}

/* export controls */
.export-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0 4px}
.export-bar .lbl{color:var(--dim);font-size:12px;margin-right:2px}

/* candidate popover */
.pop{position:fixed;z-index:50;background:var(--panel2);border:1px solid var(--accent);
  border-radius:10px;padding:8px;min-width:200px;max-width:80vw;
  max-height:70vh;overflow-y:auto;
  box-shadow:0 10px 40px rgba(0,0,0,.6)}
.pop h4{margin:0 0 6px;font-size:12px;color:var(--dim)}
.pop .cand{display:flex;gap:8px;align-items:center;padding:5px 6px;border-radius:6px;cursor:pointer}
.pop .cand:hover{background:#eef2f7}
.pop .cand .code{font-weight:700;min-width:38px}
.pop .cand .nm{flex:1;color:var(--dim);font-size:12px}
.pop .cand .p{color:var(--accent);font-variant-numeric:tabular-nums}
.pop .x{position:absolute;top:4px;right:8px;color:var(--dim);cursor:pointer;font-size:16px}

/* group tables */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px}
.gcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
.gcard h3{margin:2px 0 6px;font-size:14px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:4px 5px;text-align:right}
th:nth-child(2),td:nth-child(2){text-align:left}
th{color:var(--dim);font-weight:600;border-bottom:1px solid var(--line)}
td{border-bottom:1px solid var(--line)}
tr.q1 td,tr.q2 td{background:var(--qual)}
tr.q1 td:first-child,tr.q2 td:first-child{box-shadow:inset 3px 0 0 var(--qualline)}
tr.q3 td{background:var(--qual3)}
tr.q3 td:first-child{box-shadow:inset 3px 0 0 var(--qual3line)}
.glegend{display:flex;flex-wrap:wrap;gap:16px;margin:0 0 10px;font-size:12px;color:var(--dim)}
.glegend .lg{display:inline-flex;align-items:center;gap:6px}
.glegend .sw{display:inline-block;width:13px;height:13px;border-radius:3px;border:1px solid var(--line)}
.glegend .sw.q1{background:var(--qual);box-shadow:inset 3px 0 0 var(--qualline)}
.glegend .sw.q3{background:var(--qual3);box-shadow:inset 3px 0 0 var(--qual3line)}
.lots{color:var(--warn);cursor:help}
.thirds{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin-top:8px}
.thirds .thlegend{margin:0 0 6px}
.thirds .thlegend .sw{display:inline-block;width:10px;height:10px;border-radius:2px;vertical-align:middle;margin:0 2px 0 6px}
.thirds .thlegend .sw.clinch{background:var(--good)}
.thirds .thlegend .sw.elim{background:var(--bad)}
.thirds .cut{border-top:2px dashed var(--warn);margin:5px 0;position:relative}
.thirds .cut span{position:absolute;right:0;top:-9px;background:var(--panel);
  color:var(--warn);font-size:10px;padding:0 4px}
.thirds .titem{border-bottom:1px solid var(--line)}
.thirds .titem .trow{border-bottom:none}
.thirds .topp{font-size:11px;color:var(--dim);padding:0 6px 5px 50px;display:flex;flex-wrap:wrap;gap:2px 8px;align-items:center;line-height:1.5}
.thirds .topp .opplbl{opacity:.8}
.thirds .topp .oc{font-weight:700}
.thirds .trow{display:flex;align-items:center;gap:8px;padding:4px 6px;font-size:12.5px;border-bottom:1px solid var(--line);border-radius:4px}
.thirds .trow.qual{border-left:3px solid var(--warn);padding-left:5px}
.thirds .trow.clinch{background:rgba(18,122,66,.16);border-left:3px solid var(--good)}
.thirds .trow.elim{background:rgba(204,58,58,.10);color:var(--dim);border-left:3px solid var(--bad)}
.thirds .trow .g{min-width:44px;color:var(--dim)}
.thirds .trow .cd{font-weight:700;min-width:36px}
.thirds .trow .nm{flex:1;min-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thirds .trow .pl{min-width:40px;color:var(--dim);text-align:center;font-variant-numeric:tabular-nums}
.thirds .trow .pp{min-width:118px;color:var(--dim);text-align:right;font-variant-numeric:tabular-nums}
.thirds .trow .adv{min-width:94px;text-align:right;font-weight:600;font-variant-numeric:tabular-nums;display:flex;align-items:center;justify-content:flex-end;gap:6px}
.thirds .trow .adv .advbar{display:inline-block;width:40px;height:6px;background:var(--line);border-radius:3px;overflow:hidden}
.thirds .trow .adv .advbar i{display:block;height:100%;background:var(--accent)}
.qbadge{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.04em;padding:1px 6px;border-radius:4px;text-transform:uppercase;vertical-align:middle}
.qbadge.in{background:var(--good);color:#fff}
.qbadge.out{background:var(--bad);color:#fff}
.thlegend .qbadge{font-size:9px;padding:0 4px}
.scn-final-table{width:auto !important;min-width:360px;max-width:580px}
.fx .fxs{color:var(--txt);font-variant-numeric:tabular-nums}
.fx .fxv{color:var(--dim)}

/* score editor */
.editor{display:flex;align-items:center;gap:4px;font-size:12px;margin:3px 0;
  padding:3px 5px;background:var(--panel2);border-radius:6px}
.editor .vs{color:var(--dim)}
.editor .stepper{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:6px}
.editor .stepper button{background:var(--panel);border:0;color:var(--txt);width:22px;height:24px;cursor:pointer;font-size:14px}
.editor .stepper input{width:26px;height:24px;background:#ffffff;border:0;color:var(--txt);text-align:center;font-size:13px}
.editor .lbl{min-width:34px;font-weight:700}
.editor.played{opacity:.85}
.editor .tag{font-size:10px;color:var(--dim2)}
.manual-add{margin-top:6px}
.manual-add input.team{width:70px}

/* scenario */
.scn-controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px}
select,input[type=number],input[type=text]{background:#ffffff;color:var(--txt);
  border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:13px}
.scn-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.scn-team{padding:8px 6px;border-bottom:1px solid var(--line)}
.scn-team:last-child{border-bottom:0}
.scn-team .h{display:flex;gap:8px;align-items:baseline}
.scn-team .h .cd{font-weight:700}
.scn-team .h .nm{color:var(--dim);font-size:12px}
.scn-team .desc{color:var(--txt);font-size:13px;margin-top:3px}
.scn-team .descline{padding-left:14px;text-indent:-14px;margin-top:1px}
.scn-note{color:var(--warn);font-size:12px;margin:8px 0}
.scn-stage{font-size:14px;margin:2px 0 8px;color:var(--txt)}
.scn-stage b{color:var(--txt)}
.scn-print-btn{float:right;margin:-2px 0 0 8px}
.scn-print-stamp{display:none;font-size:12px;color:var(--dim);margin:0 0 8px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.scn-chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 12px}
.gchip{background:var(--panel);border:1px solid var(--line);color:var(--dim);
  width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700}
.gchip.on{background:var(--panel2);color:var(--txt);border-color:var(--accent)}
.scn-headline{font-weight:650;font-size:13px;color:var(--txt);margin-top:3px}
.scn-pts{color:var(--dim);font-size:11.5px;margin-left:6px;white-space:nowrap}
.scn-elo{margin-top:5px;font-size:11px;color:var(--dim)}
.scn-elo .lbl{display:inline-block;color:var(--dim2);text-transform:uppercase;letter-spacing:.5px;font-size:10px;margin-right:6px}
.scn-bar{display:inline-flex;width:160px;max-width:60%;height:8px;border-radius:4px;overflow:hidden;vertical-align:middle;background:var(--panel2);border:1px solid var(--line)}
.scn-bar .seg{display:block;height:100%}
.scn-legend{margin-top:3px;color:var(--dim);font-size:10.5px}
.scn-legend .lg{white-space:nowrap}
.scn-legend .lg i{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:3px;vertical-align:baseline}
/* compact inline finish distribution (uncertain teams), sits to the right of the name */
.scn-dist{margin-left:auto;font-size:11.5px;color:var(--dim);font-variant-numeric:tabular-nums;white-space:nowrap}
.scn-dist .p1{color:var(--good)}
.scn-dist .p2{color:var(--accent)}
.scn-dist .p3{color:var(--warn)}
.scn-dist .p4{color:var(--bad)}
.scn-dist .elo{color:var(--dim2);font-size:10px;margin-left:6px}
@media(max-width:680px){
  .scn-team .h{flex-wrap:wrap}
  .scn-dist{margin-left:0;flex-basis:100%;white-space:normal;margin-top:2px}
}
/* remaining fixtures list at top of a group scenario view */
.scn-fixtures{margin:2px 0 12px;padding:8px 10px;background:var(--panel2);border:1px solid var(--line);border-radius:8px}
.scn-fixtures .fx-h{color:var(--dim2);text-transform:uppercase;letter-spacing:.5px;font-size:10px;margin-bottom:5px}
.scn-fixtures .fx{font-size:13px;color:var(--txt);padding:2px 0}
.scn-fixtures .fx .when{color:var(--dim)}
.scn-fixtures .fx.fxclick{cursor:pointer;border-radius:4px;margin:0 -4px;padding-left:4px;padding-right:4px}
.scn-fixtures .fx.fxclick:hover{background:var(--panel)}
.scn-fixtures .fx.fxclick .fxs{text-decoration:underline;text-decoration-color:var(--line);text-underline-offset:2px}
.scn-next{margin-top:10px;border-top:1px solid var(--line);padding-top:8px}
.scn-triggers{margin:4px 0 0;padding-left:18px;font-size:13px;color:var(--txt)}
.scn-triggers li{margin:3px 0}
.callout{background:#eaf1fc;border-left:3px solid var(--accent);padding:8px 10px;border-radius:0 8px 8px 0;font-size:13px;color:var(--dim);margin:6px 0}

details.about{margin-top:18px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px}
details.about summary{cursor:pointer;color:var(--dim);font-size:13px}
details.about p{font-size:12.5px;color:var(--dim);margin:8px 0}

.simstate{display:inline-flex;align-items:center;gap:8px;color:var(--dim);font-size:13px}
.spinner{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:680px){
  #app{padding:10px 10px 80px}
  .groups-grid{grid-template-columns:1fr}
  h1{font-size:18px}
}

/* ---- print / Save-as-PDF: print the ACTIVE tab (bracket OR a group's scenario) ----
   Only one .section is in the DOM at a time (render() swaps it), so printing the
   active section prints whatever tab you're on. Orientation is routed per tab via
   named pages: the wide bracket tree prints landscape; a tall group scenario card
   prints portrait. body.tab-<name> is set in render(). */
@page{ margin:8mm; }
@page landscapePage{ size:landscape; margin:8mm; }
@page portraitPage{ size:portrait; margin:10mm; }
@media print{
  html,body{ background:#ffffff !important; color:#171a20 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  #app{ max-width:none; padding:0; }
  /* hide chrome on every tab */
  .export-bar, .tabbar, .seg, .row, details.about, .callout, .simstate, .app-header,
  .scn-chips, .scn-print-btn, .hint{ display:none !important; }
  /* show only the active tab's section */
  .section{ display:none !important; }
  .section.active{ display:block !important; }
  /* bracket: let the SVG scale to the page width */
  body.tab-bracket{ page:landscapePage; }
  .bracket-wrap{ overflow:visible !important; border:0 !important; padding:0 !important; }
  .bracket-svg{ width:100% !important; height:auto !important; }
  /* scenario: portrait, surface the print-only stamp, don't split a team mid-page */
  body.tab-scenario{ page:portraitPage; }
  .scn-print-stamp{ display:block !important; }
  .scn-card{ border:0 !important; padding:0 !important; }
  .scn-team{ break-inside:avoid; }
}

/* ---- poster mode (?poster=1): full natural width, no scroll clip, for hi-res capture ---- */
body.poster{ overflow:visible; }
body.poster #app{ max-width:none; padding:18px 20px; width:max-content; }
body.poster .export-bar, body.poster .tabbar, body.poster .seg, body.poster .row,
body.poster details.about, body.poster .callout, body.poster .simstate,
body.poster .app-header{ display:none !important; }
body.poster .bracket-wrap{ overflow:visible !important; border:0; background:transparent; padding:0; }

</style>
</head>

<div id="app"></div>

// engine.js
// Deterministic core engine for a 2026 FIFA World Cup bracket projector.
//
// Pure ES module, browser-safe (no Node-only APIs in exported logic).
//
// Public API:
//   computeGroupStanding(group)            -> 4 teams ranked 1st..4th
//   rankThirdPlaceTeams(groups)            -> all 12 third-place teams ranked, top 8 qualify
//   scenarioGrid(group, upcomingMatchKeys, maxGoals=6)
//                                          -> collapsed scenario summary per team + describe()
//
// Data shapes
//   group   = { name, teams:[{code,name,fairPlay?}], matches:[match,...] }
//   match   = { home, away, homeGoals, awayGoals, played:bool }
//             home/away are team codes. A match "key" is `${home}-${away}`.
//
// Conventions
//   - Only PLAYED matches contribute to a standing.
//   - `fairPlay` is an optional per-team integer; LOWER is better; default 0.
//   - Where a tie can only be resolved by "drawing of lots", we deterministically
//     fall back to alphabetical-by-code ordering and flag the affected teams
//     `tiedByLots:true` so a UI can surface the coin-flip.

// ----------------------------------------------------------------------------
// Low-level stat aggregation
// ----------------------------------------------------------------------------

/**
 * Build a blank stat record for a team.
 * @param {{code:string,name:string,fairPlay?:number}} team
 */
function blankStats(team) {
  return {
    code: team.code,
    name: team.name,
    fairPlay: Number.isFinite(team.fairPlay) ? team.fairPlay : 0,
    elo: Number.isFinite(team.elo) ? team.elo : 0,
    worldRank: Number.isFinite(team.worldRank) ? team.worldRank : null,
    played: 0,
    won: 0,
    drawn: 0,
    lost: 0,
    gf: 0,
    ga: 0,
    gd: 0,
    points: 0,
  };
}

/**
 * Aggregate played matches into per-team stat records.
 * Only matches whose `played` flag is truthy AND whose home & away codes are
 * both in `teamCodes` count.
 *
 * @param {Array} teams   list of {code,name,fairPlay?}
 * @param {Array} matches list of match objects
 * @returns {Map<string,object>} code -> stats
 */
function aggregate(teams, matches) {
  const byCode = new Map();
  for (const t of teams) byCode.set(t.code, blankStats(t));

  for (const m of matches) {
    if (!m.played) continue;
    const home = byCode.get(m.home);
    const away = byCode.get(m.away);
    if (!home || !away) continue; // match references a team not in this subset

    const hg = m.homeGoals;
    const ag = m.awayGoals;

    home.played++; away.played++;
    home.gf += hg; home.ga += ag;
    away.gf += ag; away.ga += hg;

    if (hg > ag) {
      home.won++; away.lost++;
      home.points += 3;
    } else if (hg < ag) {
      away.won++; home.lost++;
      away.points += 3;
    } else {
      home.drawn++; away.drawn++;
      home.points += 1; away.points += 1;
    }
  }

  for (const s of byCode.values()) s.gd = s.gf - s.ga;
  return byCode;
}

// ----------------------------------------------------------------------------
// Tiebreaker comparators
// ----------------------------------------------------------------------------

/**
 * Compare two stat records on the OVERALL group criteria (a,b,c):
 *   points desc, goal-difference desc, goals-for desc.
 * Returns negative if `x` ranks ahead of `y`, positive if behind, 0 if level.
 */
function cmpOverall(x, y) {
  if (y.points !== x.points) return y.points - x.points;
  if (y.gd !== x.gd) return y.gd - x.gd;
  if (y.gf !== x.gf) return y.gf - x.gf;
  return 0;
}

/**
 * Compare two stat records on disciplinary (fair-play) points: LOWER is better.
 * Returns negative if `x` ahead, positive if behind, 0 if level.
 */
function cmpFairPlay(x, y) {
  return x.fairPlay - y.fairPlay;
}

/** Points-only comparator (more points first) — FIFA's first ranking criterion. */
function cmpPoints(x, y) {
  return y.points - x.points;
}

/**
 * FIFA World Ranking tiebreaker (criterion 7 for 2026; drawing of lots was
 * abolished). We do not yet carry the official FIFA ranking, so we PROXY it
 * with Elo (higher Elo = better rank). Swap in real ranks via team.worldRank.
 */
function cmpWorldRank(x, y) {
  if (x.worldRank != null && y.worldRank != null) return x.worldRank - y.worldRank;
  return (y.elo || 0) - (x.elo || 0);
}

// ----------------------------------------------------------------------------
// Head-to-head resolution
// ----------------------------------------------------------------------------

/**
 * Given a set of tied teams (stat records) and the full match list, compute the
 * head-to-head mini-table among ONLY those teams (matches where both sides are
 * in the tied set), and split them by h2h criteria:
 *   (d) h2h points, (e) h2h goal-difference, (f) h2h goals-for.
 *
 * Returns an array of "buckets": each bucket is an array of stat records that
 * remain tied after applying h2h. Buckets are ordered best->worst. A bucket of
 * length > 1 means h2h did not separate those teams and the caller must go on
 * to fair-play / lots.
 *
 * @param {Array<object>} tied  stat records (>=2) currently tied on (a,b,c)
 * @param {Array} allMatches    the group's full match list
 */
function headToHeadSplit(tied, allMatches) {
  const codes = new Set(tied.map((t) => t.code));
  const teamsSubset = tied.map((t) => ({ code: t.code, name: t.name, fairPlay: t.fairPlay }));
  const subMatches = allMatches.filter(
    (m) => m.played && codes.has(m.home) && codes.has(m.away)
  );
  const h2h = aggregate(teamsSubset, subMatches); // code -> h2h stats

  // Sort the tied teams by their h2h overall criteria.
  const ordered = [...tied].sort((a, b) => cmpOverall(h2h.get(a.code), h2h.get(b.code)));

  // Group consecutive teams that are still level on h2h (a,b,c).
  const buckets = [];
  let cur = [ordered[0]];
  for (let i = 1; i < ordered.length; i++) {
    const prev = ordered[i - 1];
    const team = ordered[i];
    if (cmpOverall(h2h.get(prev.code), h2h.get(team.code)) === 0) {
      cur.push(team);
    } else {
      buckets.push(cur);
      cur = [team];
    }
  }
  buckets.push(cur);
  return buckets;
}

/**
 * Fully resolve an ordering of a set of tied stat records, applying the FIFA
 * sequence FROM the head-to-head step onward:
 *   (d-f) head-to-head, (g) fair-play, (h) drawing of lots (alpha fallback).
 *
 * The h2h step is recursive in spirit: if h2h splits the set into smaller tied
 * groups, each of those is re-resolved from h2h again on its own subset — but
 * because a smaller tied subset's h2h is computed only among its members, a set
 * that h2h could not split will not split on a re-run, so we proceed to
 * fair-play then lots for any bucket length > 1.
 *
 * @returns {Array<object>} ordered stat records (best first); each record may
 *          gain `tiedByLots:true`.
 */
function resolveTiedGroup(tied, allMatches) {
  if (tied.length === 1) return [tied[0]];

  // (d-f) head-to-head among exactly these tied teams.
  const buckets = headToHeadSplit(tied, allMatches);

  // If h2h fully kept them together (a single bucket of the same size), h2h has
  // failed to separate -> go to fair-play / lots for the whole set.
  if (buckets.length === 1 && buckets[0].length === tied.length) {
    return resolveByOverallThenDiscipline(tied);
  }

  // h2h produced >=2 buckets (a partial or full split). Resolve each bucket:
  //  - length 1: settled
  //  - length >1: these are tied on h2h too; recompute their OWN h2h subgroup
  //               first (FIFA: re-apply criteria to the still-tied subset), and
  //               if that still doesn't split, fair-play then lots.
  const result = [];
  for (const bucket of buckets) {
    if (bucket.length === 1) {
      result.push(bucket[0]);
    } else {
      result.push(...resolveStillTiedSubset(bucket, allMatches));
    }
  }
  return result;
}

/**
 * A subset that was tied within a larger h2h table. FIFA restarts the criteria
 * for the reduced subgroup. We recompute h2h among ONLY this subset; if that
 * splits them further we recurse, otherwise fair-play then lots.
 */
function resolveStillTiedSubset(subset, allMatches) {
  const buckets = headToHeadSplit(subset, allMatches);
  if (buckets.length === 1 && buckets[0].length === subset.length) {
    return resolveByOverallThenDiscipline(subset);
  }
  const result = [];
  for (const bucket of buckets) {
    if (bucket.length === 1) result.push(bucket[0]);
    else result.push(...resolveStillTiedSubset(bucket, allMatches));
  }
  return result;
}

/**
 * Resolve a set that head-to-head (criteria 1-3) could NOT separate, using the
 * FIFA 2026 fallback criteria in order:
 *   (4) overall goal difference, (5) overall goals scored,

    const fp = cmpFairPlay(a, b);
    if (fp !== 0) return fp;
    return cmpWorldRank(a, b);

// ----------------------------------------------------------------------------
// Group standing
// ----------------------------------------------------------------------------

/**
 * Compute the full ranked standing of a group.
 *
 * @param {{name:string,teams:Array,matches:Array}} group

  // resolved by the head-to-head cascade (criteria 1-3) and, only if that cannot
  // separate them, by overall GD -> overall GF -> fair-play -> FIFA World Ranking.
  // (For 2026, head-to-head OUTRANKS overall goal difference, and lots are gone.)
  all.sort(cmpPoints);

  const ranked = [];
  let i = 0;
  while (i < all.length) {
    let j = i + 1;
    while (j < all.length && all[j].points === all[i].points) j++;
    const tiedSlice = all.slice(i, j);
    if (tiedSlice.length === 1) {
      ranked.push(tiedSlice[0]);
    } else {
      ranked.push(...resolveTiedGroup(tiedSlice, group.matches));
    }
    i = j;
  }

  return ranked.map((s, idx) => ({
    code: s.code,
    name: s.name,
    played: s.played,
    won: s.won,
    drawn: s.drawn,
    lost: s.lost,
    gf: s.gf,
    ga: s.ga,
    gd: s.gd,
    points: s.points,

// ----------------------------------------------------------------------------
// Third-place ranking across groups
// ----------------------------------------------------------------------------

/**
 * Rank the 3rd-place teams of all groups against each other.
 * Criteria: points -> GD -> goals-for -> disciplinary -> lots(alpha).
 *
 * @param {Array} groups  array of group objects (any count; WC2026 has 12)
 * @returns {Array<object>} all 3rd-place teams ranked best->worst, each with
 *          `group` (group name), `rank` (1-based), `qualifies` (true for top 8),
 *          and possibly `tiedByLots:true`.
 */

 * Cross-group THIRD-PLACE comparator (negative => `a` ranks ABOVE `b`).
 * Third-place teams come from different groups and never met, so there is NO
 * head-to-head step. FIFA 2026 order: points -> overall GD -> overall GF ->

 * computeGroupStanding entries (which carry points/gd/gf/fairPlay/worldRank/elo).

  });

  // Sort with the full cascade (see compareThirdPlace).
  thirds.sort(compareThirdPlace);

  return thirds.map((t, idx) => ({
    ...t,
    rank: idx + 1,
    qualifies: idx < 8,

}

// ----------------------------------------------------------------------------
// Scenario grid
// ----------------------------------------------------------------------------

const matchKey = (m) => `${m.home}-${m.away}`;

/** All scorelines 0-0 .. maxGoals-maxGoals, inclusive. */
function* scorelines(maxGoals) {
  for (let h = 0; h <= maxGoals; h++) {
    for (let a = 0; a <= maxGoals; a++) {
      yield [h, a];
    }
  }
}

/**
 * Classify a scoreline for the team identified by `code` in a given match.
 * @returns {{result:'win'|'draw'|'loss', margin:number}} margin is the signed
 *          goal margin from the team's perspective (positive = ahead).
 */
function outcomeFor(code, match, hg, ag) {
  if (match.home === code) {
    const margin = hg - ag;
    return { result: margin > 0 ? 'win' : margin < 0 ? 'loss' : 'draw', margin };
  }
  // team is the away side
  const margin = ag - hg;
  return { result: margin > 0 ? 'win' : margin < 0 ? 'loss' : 'draw', margin };

/**
 * scenarioGrid — enumerate every scoreline combination for the unplayed
 * match(es) named by `upcomingMatchKeys`, holding played matches fixed, and
 * collapse the resulting WITHIN-GROUP ranks into a per-team summary.
 *
 * IMPORTANT: This asserts ONLY within-group rank (1/2/3/4). It says nothing
 * about 3rd-place qualification or knockout opponents (cross-group concerns).
 *
 * @param {object} group
 * @param {string[]} upcomingMatchKeys  1 or 2 keys `${home}-${away}` of unplayed matches
 * @param {number} [maxGoals=6]
 * @returns {object} {
 *   teams: { [code]: teamSummary },
 *   matches: [matchKey,...],          // the enumerated matches, in order
 *   describe(code): string,           // English digest for a team
 * }
 *
 * teamSummary shape:
 *   {
 *     code, name,
 *     ranks: number[],                // distinct ranks achievable (sorted)
 *     // single-match case:
 *     byOutcome: { win:{ranks,marginRules}, draw:{rank|ranks}, loss:{ranks,marginRules} }
 *     // two-match case:
 *     joint: [ { outcomes:[{key,result,margin?}...], rank } ... ]  // raw-ish, collapsed by rank
 *     needs: { rankN: <condition tree> }   // "what they need" digest per achievable rank
 *   }
 */function scenarioGrid(group, upcomingMatchKeys, maxGoals = 6) {

    throw new Error('upcomingMatchKeys must contain 1 or 2 match keys');
  }

  // Resolve the upcoming match objects (must exist and be unplayed).
  const upcoming = upcomingMatchKeys.map((key) => {
    const m = group.matches.find((mm) => matchKey(mm) === key);
    if (!m) throw new Error(`upcoming match not found: ${key}`);
    return m;
  });

  const playedMatches = group.matches.filter((m) => m.played);
  const teams = group.teams;

  // Enumerate. For each combination we build a synthetic match list = played +
  // the upcoming matches with assigned scores, compute the standing, and read
  // off each team's rank.
  //
  // We record, per combination, the full scoreline tuple and the resulting rank
  // for every team.
  const combos = []; // { scores:[[hg,ag],...], rankByCode:{code:rank} }

  const enumerate = (idx, acc) => {
    if (idx === upcoming.length) {
      const synthetic = playedMatches.concat(
        upcoming.map((m, k) => ({
          home: m.home,
          away: m.away,
          homeGoals: acc[k][0],
          awayGoals: acc[k][1],
          played: true,
        }))
      );
      const standing = computeGroupStanding({ ...group, matches: synthetic });
      const rankByCode = {};
      for (const t of standing) rankByCode[t.code] = t.rank;
      combos.push({ scores: acc.map((s) => s.slice()), rankByCode });
      return;
    }
    for (const sl of scorelines(maxGoals)) {
      acc.push(sl);
      enumerate(idx + 1, acc);
      acc.pop();
    }

  // Build per-team summaries.
  const teamSummaries = {};
  for (const team of teams) {
    teamSummaries[team.code] =
      upcoming.length === 1
        ? summarizeSingle(team, upcoming[0], combos, maxGoals)
        : summarizeDouble(team, upcoming, combos);
  }

  return {
    matches: upcoming.map(matchKey),
    teams: teamSummaries,
    describe(code) {
      const s = teamSummaries[code];
      if (!s) throw new Error(`unknown team: ${code}`);
      return s.description;
    },
  };
}

// --- single upcoming match -------------------------------------------------

/**
 * Collapse the grid for the SINGLE-match case for one team.
 *
 * For a team PLAYING in the match, outcome is win/draw/loss and within each
 * outcome rank can vary only by margin -> we collapse to margin thresholds.
 * For a team NOT playing, its rank can still vary with the scoreline (it affects
 * GD/GF of the two participants), so we map the participants' margin -> rank.
 */
function summarizeSingle(team, match, combos, maxGoals) {
  const code = team.code;
  const isPlaying = match.home === code || match.away === code;

  if (isPlaying) {
    // Group combos by outcome, then within outcome by team-margin -> rank.
    const buckets = { win: new Map(), draw: new Map(), loss: new Map() };
    for (const c of combos) {
      const [hg, ag] = c.scores[0];
      const { result, margin } = outcomeFor(code, match, hg, ag);
      const m = buckets[result];
      const rank = c.rankByCode[code];
      if (!m.has(margin)) m.set(margin, new Set());
      m.get(margin).add(rank);
    }

    const byOutcome = {};
    for (const result of ['win', 'draw', 'loss']) {
      byOutcome[result] = collapseMarginMap(buckets[result], result);
    }

    const ranks = collectRanks(combos, code);
    const description = describeSinglePlaying(byOutcome, maxGoals);
    return { code, name: team.name, isPlaying: true, ranks, byOutcome, description };
  }

  // Non-playing team: rank depends on the participants' result/margin.
  // Map (participantMargin from home perspective) -> set of ranks.
  const map = new Map();
  for (const c of combos) {
    const [hg, ag] = c.scores[0];
    const homeMargin = hg - ag; // signed, home perspective
    const rank = c.rankByCode[code];
    const keyM = homeMargin;
    if (!map.has(keyM)) map.set(keyM, new Set());
    map.get(keyM).add(rank);
  }
  const ranks = collectRanks(combos, code);
  // Collapse contiguous home-margins sharing the same rank-set into bands.
  const sortedM = [...map.entries()].sort((a, b) => a[0] - b[0]);
  const sig = (set) => [...set].sort((a, b) => a - b).join(',');
  const byMargin = [];
  let bStart = sortedM[0][0];
  let bSig = sig(sortedM[0][1]);
  let bRanks = [...sortedM[0][1]].sort((a, b) => a - b);
  let bPrev = sortedM[0][0];
  const flushBand = (end) => byMargin.push({ homeMarginLo: bStart, homeMarginHi: end, ranks: bRanks });
  for (let i = 1; i < sortedM.length; i++) {
    const [m, set] = sortedM[i];
    if (sig(set) === bSig && m === bPrev + 1) {
      bPrev = m;
    } else {
      flushBand(bPrev);
      bStart = m; bSig = sig(set); bRanks = [...set].sort((a, b) => a - b); bPrev = m;
    }
  }
  flushBand(bPrev);
  const description = describeNonPlaying(team, match, ranks, byMargin, maxGoals);
  return { code, name: team.name, isPlaying: false, ranks, byMargin, description };

/**
 * Given a Map<margin,Set<rank>> for a single outcome, collapse to clean rules.
 * In the common deterministic case each margin yields exactly one rank, so we
 * collapse contiguous margins that share a rank into threshold "runs".
 *
 * Margins are signed from the team's perspective: wins are positive (+1..+max),
 * losses negative (-1..-max), a draw is exactly 0. Each rule records `marginLo`
 * <= `marginHi` (the contiguous signed-margin span) and either a single `rank`
 * (deterministic run) or a `ranks` array (margin alone didn't decide — rare,
 * happens only when other-table lots intrude).

function collapseMarginMap(marginMap, result) {
  if (marginMap.size === 0) return { possible: false, rules: [], ranks: [] };

  const entries = [...marginMap.entries()].sort((a, b) => a[0] - b[0]);
  const allRanks = new Set();
  for (const [, set] of entries) for (const r of set) allRanks.add(r);

  // Merge contiguous margins that share the SAME rank-set (singleton or tied)
  // into one threshold rule. A rule with one rank also exposes `.rank` for
  // convenience; a tied rule exposes only `.ranks`.
  const sig = (set) => [...set].sort((a, b) => a - b).join(',');
  const rules = [];
  let runStart = entries[0][0];
  let runSig = sig(entries[0][1]);
  let runRanks = [...entries[0][1]].sort((a, b) => a - b);
  let prevMargin = entries[0][0];
  const flush = (endMargin) => {
    const rule = { marginLo: runStart, marginHi: endMargin, ranks: runRanks };
    if (runRanks.length === 1) rule.rank = runRanks[0];
    rules.push(rule);
  };
  for (let i = 1; i < entries.length; i++) {
    const [m, set] = entries[i];
    if (sig(set) === runSig && m === prevMargin + 1) {
      prevMargin = m;
    } else {
      flush(prevMargin);
      runStart = m;
      runSig = sig(set);
      runRanks = [...set].sort((a, b) => a - b);
      prevMargin = m;
    }

  return {
    possible: true,
    ranks: [...allRanks].sort((a, b) => a - b),

  };

  for (const c of combos) s.add(c.rankByCode[code]);
  return [...s].sort((a, b) => a - b);

const ordinal = (n) =>
  n === 1 ? '1st' : n === 2 ? '2nd' : n === 3 ? '3rd' : `${n}th`;

/**
 * English digest for a team playing in a single decisive match, e.g.
 * "1st with any win; 2nd on a draw; 3rd if they lose by 1; 4th if they lose by 2+".
 */
function describeSinglePlaying(byOutcome, maxGoals) {
  const parts = [];
  if (byOutcome.win.possible) parts.push(...phrasesForOutcome(byOutcome.win, 'win', maxGoals));
  if (byOutcome.draw.possible) parts.push(...phrasesForOutcome(byOutcome.draw, 'draw', maxGoals));
  if (byOutcome.loss.possible) parts.push(...phrasesForOutcome(byOutcome.loss, 'loss', maxGoals));
  return parts.join('; ');
}

/**
 * Turn a collapsed outcome (win/draw/loss) into English phrases.
 *  - draw: a single margin (0); usually one rank, multiple only under lots.
 *  - win/loss: margin-threshold rules, ordered best-rank-first, with the rule
 *    that reaches the enumeration edge (|margin| === maxGoals) rendered as "N+".
 */
function phrasesForOutcome(outcome, result, maxGoals) {
  if (result === 'draw') {
    const ranks = outcome.ranks;
    if (ranks.length === 1) return [`${rankWord(ranks[0])} on a draw`];
    return [`${ranks.map(rankWord).join(' or ')} on a draw (depends on the other result)`];
  }

  const rules = outcome.rules;

  // Constant rank across the whole outcome -> "Nth with any win/loss".
  const allDeterministic = rules.every((r) => r.rank != null);
  const uniqueRanks = new Set(rules.flatMap((r) => (r.rank != null ? [r.rank] : r.ranks)));
  if (allDeterministic && uniqueRanks.size === 1) {
    const rank = [...uniqueRanks][0];
    return [`${rankWord(rank)} with any ${result}`];
  }

  // Order rules by goal-margin magnitude ascending (smallest margin first); this
  // reads naturally as the result gets more lopsided.
  const ordered = [...rules].sort((a, b) => Math.abs(a.marginLo) - Math.abs(b.marginLo));
  const verb = result === 'win' ? 'win' : 'lose';

  return ordered.map((r) => {
    const loMag = Math.abs(r.marginLo);
    const hiMag = Math.abs(r.marginHi);
    const lo = Math.min(loMag, hiMag);
    const hi = Math.max(loMag, hiMag);
    const reachesEdge = hi === maxGoals;
    let cond;
    if (lo === hi) cond = `if they ${verb} by ${lo}`;
    else if (reachesEdge) cond = `if they ${verb} by ${lo}+`;
    else cond = `if they ${verb} by ${lo}–${hi}`;
    const label = r.rank != null ? rankWord(r.rank) : r.ranks.map(rankWord).join('/');
    return `${label} ${cond}`;
  });

function describeNonPlaying(team, match, ranks, byMargin, maxGoals) {
  if (ranks.length === 1) {
    return `${rankWord(ranks[0])} regardless of ${match.home} v ${match.away}`;
  }
  // Summarize by participant (home-perspective) margin bands.
  const sideCond = (lo, hi) => {
    // lo<=hi signed home margins within the band.
    const band = (mLo, mHi, who, edge) => {
      const a = Math.abs(mLo), b = Math.abs(mHi);
      const x = Math.min(a, b), y = Math.max(a, b);
      if (x === y) return `${who} win by ${x}`;
      if (y === maxGoals && edge) return `${who} win by ${x}+`;
      return `${who} win by ${x}–${y}`;
    };
    if (lo === 0 && hi === 0) return 'a draw';
    if (lo > 0) return band(lo, hi, match.home, true);   // home wins
    if (hi < 0) return band(lo, hi, match.away, true);   // away wins
    // Band straddles 0: it covers a draw plus wins on one (or both) sides.
    const segs = [];
    if (lo < 0) segs.push(band(lo, -1, match.away, lo === -maxGoals)); // away-win part
    if (lo <= 0 && hi >= 0) segs.push('a draw');
    if (hi > 0) segs.push(band(1, hi, match.home, hi === maxGoals));   // home-win part
    return segs.join(' or ');
  };
  const parts = byMargin.map((b) =>
    `${b.ranks.map(rankWord).join('/')} on ${sideCond(b.homeMarginLo, b.homeMarginHi)}`

  return parts.join('; ');

// --- two simultaneous upcoming matches -------------------------------------

/**
 * Collapse the grid for the TWO-match (final round) case for one team.
 *
 * We produce:
 *   joint: array of { outcomes, rank } where outcomes describes each match by
 *          result (and, where rank depends on it, margin) — collapsed so that
 *          all scorelines yielding the same rank for this team share an entry.
 *   needs: per achievable rank, a compact description of sufficient conditions.
 *
 * For readability we first reduce each match to (result, margin) from the
 * perspective of its HOME team, then group combos by (resultA, resultB) and,
 * within that, report the rank(s) and whether margin matters.
 */
function summarizeDouble(team, upcoming, combos) {
  const code = team.code;
  const [mA, mB] = upcoming;

  // Group by (homeResultA, homeResultB) coarse outcome; collect rank sets and
  // whether margins within that coarse cell affect the rank.
  const cells = new Map(); // key "rA|rB" -> { rA,rB, rankSet:Set, marginVaries:bool, detail:Map }
  for (const c of combos) {
    const [aHg, aAg] = c.scores[0];
    const [bHg, bAg] = c.scores[1];
    const rA = aHg > aAg ? 'win' : aHg < aAg ? 'loss' : 'draw'; // home A perspective
    const rB = bHg > bAg ? 'win' : bHg < bAg ? 'loss' : 'draw';
    const key = `${rA}|${rB}`;
    if (!cells.has(key)) cells.set(key, { rA, rB, rankSet: new Set(), detail: new Map() });
    const cell = cells.get(key);
    const rank = c.rankByCode[code];
    cell.rankSet.add(rank);
    // detail keyed by (marginA, marginB) for margin-sensitivity analysis
    const dk = `${aHg - aAg},${bHg - bAg}`;
    cell.detail.set(dk, rank);
  }

  const joint = [];
  for (const cell of cells.values()) {
    const ranks = [...cell.rankSet].sort((a, b) => a - b);
    const marginVaries = ranks.length > 1;
    joint.push({
      outcomes: [
        { key: matchKey(mA), home: mA.home, away: mA.away, result: cell.rA },
        { key: matchKey(mB), home: mB.home, away: mB.away, result: cell.rB },
      ],
      ranks,
      marginVaries,
    });
  }

  // "What they need": for each achievable rank, list the coarse outcome cells
  // where that rank is GUARANTEED (rank set === [rank]) vs merely possible.
  const ranks = collectRanks(combos, code);
  const needs = {};
  for (const rank of ranks) {
    const guaranteed = [];
    const possible = [];
    for (const j of joint) {
      if (j.ranks.length === 1 && j.ranks[0] === rank) guaranteed.push(j.outcomes);
      else if (j.ranks.includes(rank)) possible.push(j.outcomes);
    }
    needs[rank] = { guaranteed, possible };
  }

  const description = describeDouble(team, upcoming, ranks, joint);
  return { code, name: team.name, ranks, joint, needs, description };
}

function describeDouble(team, upcoming, ranks, joint) {
  const [mA, mB] = upcoming;
  const resultPhrase = (o) => {
    if (o.result === 'win') return `${o.home} beat ${o.away}`;
    if (o.result === 'loss') return `${o.away} beat ${o.home}`;
    return `${o.home}-${o.away} draw`;
  };
  // Build "rank: when ..." clauses, listing guaranteed coarse cells.
  const clauses = [];
  for (const rank of ranks) {
    const guaranteedCells = joint.filter((j) => j.ranks.length === 1 && j.ranks[0] === rank);
    if (guaranteedCells.length === 0) {
      clauses.push(`${rankWord(rank)} possible (margin-dependent)`);
      continue;
    }
    const cellPhrases = guaranteedCells.map((j) => j.outcomes.map(resultPhrase).join(' & '));
    clauses.push(`${rankWord(rank)} if: ${cellPhrases.join('  OR  ')}`);
  }
  return clauses.join(' | ');
}

// allocation.js
// FIFA 2026 World Cup "Annex C" third-place allocation: maps which eight
// third-placed groups qualify to which round-of-32 third-place slot they fill.
//
// allocation.json is keyed by the canonical combination key: the 8 qualifying
// group letters, sorted alphabetically and concatenated (e.g. "ABCDEFGH").
// Each value maps a slot label ("1A","1B","1D","1E","1G","1I","1K","1L") to the

  }

    throw new Error(`expected 8 distinct group letters, got ${uniq.length}: ${uniq.join("")}`);

  }

// model.js
// Probabilistic projection engine for the 2026 World Cup bracket:
//   - an Elo-driven Poisson scoreline model ("supremacy" model), and
//   - a Monte Carlo tournament simulator built on top of engine.js + allocation.
//
// BROWSER-SAFE ES module. NO node: imports, no fs/process in exported logic.
// It imports ONLY from engine.js (pure) and receives the Annex-C allocation
// resolution as an injected dependency, so it never touches the filesystem.
//
// The caller (verify-model.mjs in Node, or the HTML build in the browser) is

//
// All randomness flows through an injected rng function ()->[0,1). We NEVER

// ----------------------------------------------------------------------------
// Tunable constants (exported so they can be overridden / re-fit)
// ----------------------------------------------------------------------------

// of expected-margin per 400 Elo (a 400-Elo gap is the classic "10x odds" gap).
//
// MODEL MARK 2 NOTE: this slope now governs ONLY the *scoreline detail* (the
// goal MARGIN sampled once a winner is decided), NOT the win probability. The
// win/draw/loss probabilities are now set DIRECTLY from Elo (see outcomeProbs).
// So this value no longer needs to be inflated to hit win-probs — it just has to
// produce realistic goal margins. 0.0036 keeps the historical margin sizes.
//   (Mark 1 used this slope to drive an independent-Poisson scoreline whose
//    win-prob came out ~6–11pp short of the Elo curve; see GIT history / the
//    ELO_SUPREMACY_COEF=0.0055 single-knob re-tune that fixed win-probs but

//    fixes win-probs by construction and frees the scoreline to be realistic.)const ELO_SUPREMACY_COEF = 0.0036;

// Draw probability as a function of |ΔElo|: P(draw) = DRAW_BASE * exp(-|Δ|/DRAW_SCALE).
// Evenly-matched sides draw ~ DRAW_BASE of the time; the draw rate decays as the
// gap widens (a strong favorite rarely draws). Calibrated so the field-wide draw
// rate lands in the historical 22–26% band and the per-match curve is sane.
//   At |Δ|=0   ~30% ; |Δ|=200 ~22% ; |Δ|=400 ~16% ; |Δ|=500 ~13%.

// the dog at 0.00%). 0.45 → the dog keeps ≥45% of its q as an outright win
// (e.g. Δ≈500 favorite: dog ~2.4% win / ~6% draw instead of 0% / ~11%). Only

// Rejection almost always succeeds in 1–3 tries; this only bounds the tail.

// Default host-nation Elo bonus (points). Applied to USA/MEX/CAN in every match
// via opts.hostCodes. Home-field in soccer is worth roughly +0.3–0.4 goals;
// at the supremacy slope above, ~80 Elo ≈ +0.29 goals of supremacy. Kept modest

  QF: 2,

  Final: 4,

// ----------------------------------------------------------------------------
// 1. Seedable PRNG — mulberry32
// ----------------------------------------------------------------------------

// ----------------------------------------------------------------------------
// 2. Poisson sampler — Knuth's algorithm
// ----------------------------------------------------------------------------

 * Fine for the small lambdas (~0.2–2.5) we draw here.
 * @param {number} lambda  mean (>= 0)

// ----------------------------------------------------------------------------
// 3. Expected goals — the "supremacy" model
// ----------------------------------------------------------------------------

// ----------------------------------------------------------------------------
// 3b. MARK 2 — Elo-faithful outcome layer (win / draw / loss probabilities)
// ----------------------------------------------------------------------------

/**

/**

 *

 *   E       = eloExpectedScore(effA, effB)              // Elo win-expectation
 *   pDraw   = DRAW_BASE · exp(-|Δ|/DRAW_SCALE)          // calibrated draw model
 *   pWin    = E - pDraw/2
 *   pLoss   = (1 - E) - pDraw/2

 * expectation equals the Elo expectation at every Δ). pDraw is clamped so the
 * smaller of pWin/pLoss never goes negative at extreme gaps (the underdog side's

 *

  let E = eloExpectedScore(effA, effB);

  // flip by factor opts.eShrink ∈ [0,1].  E' = 0.5 + λ·(E−0.5).  λ=1 → pure Elo
  // (no change); λ<1 → more single-game upset variance (knockout realism); λ=0 →
  // coin flip.  Set ONLY by sampleKnockout (from opts.koLambda); group calls
  // never pass eShrink, so the group stage stays exactly Elo-faithful.
  if (opts.eShrink != null) E = 0.5 + opts.eShrink * (E - 0.5);
  const drawBase = opts.drawBase ?? DRAW_BASE;
  const drawScale = opts.drawScale ?? DRAW_SCALE;
  const floorFrac = opts.underdogWinFloor ?? UNDERDOG_WIN_FLOOR;
  let pDraw = drawBase * Math.exp(-Math.abs(effA - effB) / drawScale);
  // A draw "spends" pDraw/2 from each side's mass, so pDraw <= 2q (q = the
  // underdog's Elo mass) just to keep the underdog win >= 0. But that raw cap
  // spends the WHOLE underdog mass on draws -> underdog win = 0 for big mismatches.
  // Instead cap at 2q(1-floorFrac), reserving floorFrac·q as an outright underdog
  // win. Trimming the draw lifts BOTH win probs equally, so pWin+0.5pDraw=E exactly.
  const q = Math.min(E, 1 - E);

// ----------------------------------------------------------------------------
// 4 & 5. Scoreline samplers (MARK 2: outcome-first, then a conditional scoreline)
// ----------------------------------------------------------------------------

/**

 *   result: 'A' (A wins), 'B' (B wins), or 'D' (draw).

 * a bounded fallback constructs a minimal consistent scoreline so we never loop.

// ----------------------------------------------------------------------------
// 6. One full tournament simulation
// ----------------------------------------------------------------------------

/**

      const ab = hostBonusFor(m.away, opts, vc);

        ...opts,
        hostBonusA: hb,

      m.awayGoals = gb;

  const qualifiedAs = {};     // code -> role | null
  const standings = {};       // letter -> ranked array

    const standing = computeGroupStanding(g);
    standings[letter] = standing;

      groupRank[s.code] = s.rank;
      groupPoints[s.code] = s.points;
      qualifiedAs[s.code] = null;
      if (s.rank === 1) winnerOfGroup[letter] = s.code;
      else if (s.rank === 2) runnerUpOfGroup[letter] = s.code;
    }

    qualifiedAs[runnerUpOfGroup[letter]] = 'runnerup';

  const loserByMatch = {};

  // Collect EVERY knockout match's resolved occupants + winner for this sim,
  // so the aggregator can build true per-round occupancy frequencies.

  // Seed "reached" for everyone who made the R32.

  };

  const sideCode = (side) => {
    if (side.type === 'winnerOf') return winnerByMatch[side.match];
    if (side.type === 'loserOf') return loserByMatch[side.match];
    throw new Error(`unexpected knockout side type: ${side.type}`);

    const vc = opts.koVenueCountry ? (opts.koVenueCountry[matchNo] ?? null) : null;
    const hb = hostBonusFor(homeCode, opts, vc);
    const ab = hostBonusFor(awayCode, opts, vc);
    const res = sampleKnockout(eloOf(homeCode), eloOf(awayCode), rng, {
      ...opts,
      hostBonusA: hb,
      hostBonusB: ab,

    const winner = res.winner === 'A' ? homeCode : awayCode;
    const loser = res.winner === 'A' ? awayCode : homeCode;
    return { winner, loser };
  };

  for (const fx of r32) {
    const { winner, loser } = playKnockout(fx.home, fx.away, fx.match);
    winnerByMatch[fx.match] = winner;
    loserByMatch[fx.match] = loser;
    bump(winner, ROUND_INDEX.R16); // winning R32 => reached R16

  }

  const runRound = (roundMatches, roundName, advanceRoundIdx) => {
    for (const m of roundMatches) {
      const homeCode = sideCode(m.home);
      const awayCode = sideCode(m.away);
      const { winner, loser } = playKnockout(homeCode, awayCode, m.match);
      winnerByMatch[m.match] = winner;
      loserByMatch[m.match] = loser;
      bump(winner, advanceRoundIdx);
      knockout.push({ match: m.match, round: roundName, home: homeCode, away: awayCode, winner });
    }

  runRound(bracket.rounds.QF, 'QF', ROUND_INDEX.SF);     // win QF  => reached SF
  runRound(bracket.rounds.SF, 'SF', ROUND_INDEX.Final);  // win SF  => reached Final

  const finalM = bracket.rounds.Final[0];
  const fHome = winnerByMatch[finalM.home.match];
  const fAway = winnerByMatch[finalM.away.match];
  const { winner: champion } = playKnockout(fHome, fAway, finalM.match);
  winnerByMatch[finalM.match] = champion;
  bump(champion, ROUND_INDEX.Champion);
  knockout.push({ match: finalM.match, round: 'Final', home: fHome, away: fAway, winner: champion });

  // beyond the SF appearance the two losers already have).
  const tpM = bracket.rounds.ThirdPlace?.[0];

    const a = loserByMatch[tpM.home.match];
    const b = loserByMatch[tpM.away.match];
    if (a && b) {
      const { winner } = playKnockout(a, b, tpM.match);
      winnerByMatch[tpM.match] = winner;
      knockout.push({ match: tpM.match, round: 'ThirdPlace', home: a, away: b, winner });

  return { groupRank, groupPoints, qualifiedAs, r32, reached, champion, knockout };
}

// ----------------------------------------------------------------------------
// 7. Monte Carlo aggregation
